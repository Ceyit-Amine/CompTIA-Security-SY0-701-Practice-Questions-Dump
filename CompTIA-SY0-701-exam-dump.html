 of the following would be the primary benefit of this enhancement?", "options": ["It increases complexity.", "It removes technical debt.", "It adds additional guard rails.", "It acts as a workforce multiplier."], "answer": "D", "explanation": ""}, {"number": 158, "question": "Which of the following aspects of the data management life cycle is most directly impacted by local and international regulations?", "options": ["Destruction", "Certification", "Retention", "Sanitization"], "answer": "C", "explanation": "Detailed Explanation:\n\nRetention policies dictate how long data must be stored to comply with local and international regulations.\n\nNon-compliance can result in legal and financial penalties. Reference: CompTIA Security+ SY0-701 Study\n\nGuide, Domain 5: Security Program Management, Section: \"Data Retention and Legal Requirements\"."}, {"number": 159, "question": "A company’s web filter is configured to scan the URL for strings and deny access when matches are found.\nWhich of the following search strings should an analyst employ to prohibit access to non-encrypted websites?", "options": ["encryption=off\\ http:// www.*.com :443"], "answer": "B", "explanation": "A web filter is a device or software that can monitor, block, or allow web traffic based on predefined rules or policies. One of the common methods of web filtering is to scan the URL for strings and deny access when matches are found. For example, a web filter can block access to websites that contain the words “gambling”,\n\n“porn”, or “malware” in their URLs. A URL is a uniform resource locator that identifies the location and protocol of a web resource. A URL typically consists of the following components: protocol://domain:port /path?query#fragment. The protocol specifies the communication method used to access the web resource, such as HTTP, HTTPS, FTP, or SMTP. The domain is the name of the web server that hosts the web resource, such as www.google.com or www.bing.com. The port is an optional number that identifies the specific service or application running on the web server, such as 80 for HTTP or 443 for HTTPS. The path is the specific folder or file name of the web resource, such as /index.html or /images/logo.png. The query is an optional string that contains additional information or parameters for the web resource, such as ?q=security or ?lang=en. The fragment is an optional string that identifies a specific part or section of the web resource, such as #introduction or #summary.\n\nTo prohibit access to non-encrypted websites, an analyst should employ a search string that matches the protocol of non-encrypted web traffic, which is HTTP. HTTP stands for hypertext transfer protocol, and it is a standard protocol for transferring data between web servers and web browsers. However, HTTP does not provide any encryption or security for the data, which means that anyone who intercepts the web traffic can read or modify the data. Therefore, non-encrypted websites are vulnerable to eavesdropping, tampering, or spoofing attacks. To access a non-encrypted website, the URL usually starts with http://, followed by the domain name and optionally the port number. For example, http://www.example.com or http://www.example.com:80.\n\nBy scanning the URL for the string http://, the web filter can identify and block non-encrypted websites.\n\nThe other options are not correct because they do not match the protocol of non-encrypted web traffic.\n\nEncryption=off is a possible query string that indicates the encryption status of the web resource, but it is not a standard or mandatory parameter. Https:// is the protocol of encrypted web traffic, which uses hypertext transfer protocol secure (HTTPS) to provide encryption and security for the data. Www.*.com is a possible domain name that matches any website that starts with www and ends with .com, but it does not specify the protocol. :443 is the port number of HTTPS, which is the protocol of encrypted web traffic. References = CompTIA Security+ Study Guide (SY0-701), Chapter 2: Securing Networks, page 69. Professor Messer’s CompTIA SY0-701 Security+ Training Course, Section 2.1: Network Devices and\n\nTechnologies, video: Web Filter (5:16)."}, {"number": 160, "question": "An accounting clerk sent money to an attacker's bank account after receiving fraudulent instructions over the phone to use a new account. Which of the following would most likely prevent this activity in the future?", "options": ["Standardizing security incident reporting", "Executing regular phishing campaigns", "Implementing insider threat detection measures", "Updating processes for sending wire transfers"], "answer": "D", "explanation": "Comprehensive and Detailed In-Depth Explanation:\n\nUpdating wire transfer processes to include verification steps (such as requiring dual approval or verifying account changes via a secondary communication method) can . Attackers prevent fraudulent transactions often use business email compromise (BEC) or pretexting to trick employees into transferring funds to fraudulent accounts.\n\nStandardizing security incident reporting is useful for tracking security events but does not prevent fraud in real time.\n\nExecuting regular phishing campaigns improves awareness but does not enforce a verification process for financial transactions.\n\nImplementing insider threat detection focuses on internal risks but does not specifically prevent external fraud.\n\nA  with additional verification steps is the most effective measure against more secure wire transfer process fraudulent transactions."}, {"number": 161, "question": "A cybersecurity incident response team at a large company receives notification that malware is present on several corporate desktops No known Indicators of compromise have been found on the network. Which of the following should the team do first to secure the environment?", "options": ["Contain the Impacted hosts", "Add the malware to the application blocklist.", "Segment the core database server.", "Implement firewall rules to block outbound beaconing"], "answer": "A", "explanation": "The first step in responding to a cybersecurity incident, particularly when malware is detected, is to contain the impacted hosts. This action prevents the spread of malware to other parts of the network, limiting the potential damage while further investigation and remediation actions are planned.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly on incident response procedures and the importance of containment in managing security incidents."}, {"number": 162, "question": "Which of the following considerations is the most important for an organization to evaluate as it establishes and maintains a data privacy program?", "options": ["Reporting structure for the data privacy officer", "Request process for data subject access", "Role as controller or processor", "Physical location of the company"], "answer": "C", "explanation": "The most important consideration when establishing a data privacy program is defining the organization's role as a controller or processor. These roles, as outlined in privacy regulations such as the General Data\n\nProtection Regulation (GDPR), determine the responsibilities regarding the handling of personal data. A controller is responsible for determining the purpose and means of data processing, while a processor acts on behalf of the controller. This distinction is crucial for compliance with data privacy laws.\n\nReporting structure for the data privacy officer is important, but it is a secondary consideration compared to legal roles.\n\nRequest process for data subject access is essential for compliance but still depends on the organization's role as controller or processor.\n\nPhysical location of the company can affect jurisdiction, but the role as controller or processor has a broader and more immediate impact."}, {"number": 163, "question": "Which of the following topics would most likely be included within an organization's SDLC?", "options": ["Service-level agreements", "Information security policy", "Penetration testing methodology", "Branch protection requirements"], "answer": "B", "explanation": "Within an organization's Software Development Life Cycle (SDLC), an Information Security Policy is a vital component. It outlines the rules and procedures for ensuring that the organization’s IT assets and data are protected throughout the development process. Ensuring secure coding practices, access controls, and regular security testing is fundamental in preventing vulnerabilities in applications.\n\nOther options like service-level agreements and branch protection requirements are less likely to be integral to\n\nSDLC processes. Penetration testing methodology, while useful, is generally considered outside the scope of the SDLC."}, {"number": 164, "question": "An IT manager is putting together a documented plan describing how the organization will keep operating in the event of a global incident. Which of the following plans is the IT manager creating?", "options": ["Business continuity", "Physical security", "Change management", "Disaster recovery"], "answer": "A", "explanation": "The IT manager is creating a Business Continuity Plan (BCP). A BCP describes how an organization will continue to operate during and after a disaster or global incident. It ensures that critical business functions remain operational despite adverse conditions, with a focus on minimizing downtime and maintaining essential services.\n\nPhysical security relates to protecting physical assets.\n\nChange management ensures changes in IT systems are introduced smoothly, without disrupting operations.\n\nDisaster recovery is a subset of business continuity but focuses specifically on recovering from IT-related incidents."}, {"number": 165, "question": "A company's end users are reporting that they are unable to reach external websites. After reviewing the performance data for the DNS severs, the analyst discovers that the CPU, disk, and memory usage are minimal, but the network interface is flooded with inbound traffic. Network logs show only a small number of\nDNS queries sent to this server. Which of the following best describes what the security analyst is seeing?", "options": ["Concurrent session usage", "Secure DNS cryptographic downgrade", "On-path resource consumption", "Reflected denial of service"], "answer": "D", "explanation": "A reflected denial of service (RDoS) attack is a type of DDoS attack that uses spoofed source IP addresses to send requests to a third-party server, which then sends responses to the victim server. The attacker exploits the difference in size between the request and the response, which can amplify the amount of traffic sent to the victim server. The attacker also hides their identity by using the victim’s IP address as the source. A RDoS attack can target DNS servers by sending forged DNS queries that generate large DNS responses. This can flood the network interface of the DNS server and prevent it from serving legitimate requests from end users. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 215-216 1"}, {"number": 166, "question": "An organization has recently decided to implement SSO. The requirements are to leverage access tokens and focus on application authorization rather than user authentication. Which of the following solutions would the engineering team most likely configure?", "options": ["LDAP", "Federation", "SAML", "OAuth"], "answer": "D", "explanation": ""}, {"number": 167, "question": "Which of the following is the most likely to be included as an element of communication in a security awareness program?", "options": ["Reporting phishing attempts or other suspicious activities", "Detecting insider threats using anomalous behavior recognition", "Verifying information when modifying wire transfer data", "Performing social engineering as part of third-party penetration testing"], "answer": "A", "explanation": "A security awareness program is a set of activities and initiatives that aim to educate and inform the users and employees of an organization about the security policies, procedures, and best practices. A security awareness program can help to reduce the human factor in security risks, such as social engineering, phishing, malware, data breaches, and insider threats. A security awareness program should include various elements of communication, such as newsletters, posters, videos, webinars, quizzes, games, simulations, and feedback mechanisms, to deliver the security messages and reinforce the security culture. One of the most likely elements of communication to be included in a security awareness program is reporting phishing attempts or other suspicious activities, as this can help to raise the awareness of the users and employees about the common types of cyberattacks and how to respond to them. Reporting phishing attempts or other suspicious activities can also help to alert the security team and enable them to take appropriate actions to prevent or mitigate the impact of the attacks. Therefore, this is the best answer among the given options.\n\nThe other options are not as likely to be included as elements of communication in a security awareness program, because they are either technical or operational tasks that are not directly related to the security awareness of the users and employees. Detecting insider threats using anomalous behavior recognition is a technical task that involves using security tools or systems to monitor and analyze the activities and behaviors of the users and employees and identify any deviations or anomalies that may indicate malicious or unauthorized actions. This task is usually performed by the security team or the security operations center, and it does not require the communication or participation of the users and employees. Verifying information when modifying wire transfer data is an operational task that involves using verification methods, such as phone calls, emails, or digital signatures, to confirm the authenticity and accuracy of the information related to wire transfers, such as the account number, the amount, or the recipient. This task is usually performed by the financial or accounting department, and it does not involve the security awareness of the users and employees. Performing social engineering as part of third-party penetration testing is a technical task that involves using deception or manipulation techniques, such as phishing, vishing, or impersonation, to test the security posture and the vulnerability of the users and employees to social engineering attacks. This task is usually performed by external security professionals or consultants, and it does not require the communication or consent of the users and employees. Therefore, these options are not the best answer for this question. References = Security Awareness and Training – CompTIA Security+ SY0-701: 5.2, video at 0: 00; CompTIA Security+ SY0-701 Certification Study Guide, page 263."}, {"number": 168, "question": "A client asked a security company to provide a document outlining the project, the cost, and the completion time frame. Which of the following documents should the company provide to the client?", "options": ["MSA", "SLA", "BPA", "SOW"], "answer": "D", "explanation": "An ISOW is a document that outlines the project, the cost, and the completion time frame for a security company to provide a service to a client. ISOW stands for Information Security Operations Work, and it is a type of contract that specifies the scope, deliverables, milestones, and payment terms of a security project. An\n\nISOW is usually used for one-time or short-term projects that have a clear and defined objective and outcome.\n\nFor example, an ISOW can be used for a security assessment, a penetration test, a security audit, or a security training.\n\nThe other options are not correct because they are not documents that outline the project, the cost, and the completion time frame for a security company to provide a service to a client. A MSA is a master service agreement, which is a type of contract that establishes the general terms and conditions for a long-term or ongoing relationship between a security company and a client. A MSA does not specify the details of each individual project, but rather sets the framework for future projects that will be governed by separate statements of work (SOWs). A SLA is a service level agreement, which is a type of contract that defines the quality and performance standards for a security service provided by a security company to a client. A SLA usually includes the metrics, targets, responsibilities, and penalties for measuring and ensuring the service level. A BPA is a business partnership agreement, which is a type of contract that establishes the roles and expectations for a strategic alliance between two or more security companies that collaborate to provide a joint service to a client. A BPA usually covers the objectives, benefits, risks, and obligations of the partnership. References = CompTIA Security+ Study Guide (SY0-701), Chapter 8: Governance, Risk, and\n\nCompliance, page 387. Professor Messer’s CompTIA SY0-701 Security+ Training Course, Section 8.2:\n\nCompliance and Controls, video: Contracts and Agreements (5:12)."}, {"number": 169, "question": "During a recent log review, an analyst discovers evidence of successful injection attacks. Which of the following will best address this issue?", "options": ["Authentication", "Secure cookies", "Static code analysis", "Input validation"], "answer": "D", "explanation": "Input validation is the primary defense against , such as SQL injection or command injection attacks injection. It ensures that  before processing, preventing attackers user-supplied data is properly sanitized from injecting malicious code.\n\nAuthentication (A) helps verify user identity but does not prevent injection attacks.\n\nSecure cookies (B) improve session security but do not address injection vulnerabilities.\n\nStatic code analysis (C) helps identify vulnerabilities in source code but does not actively prevent attacks in real-time."}, {"number": 170, "question": "A company wants to improve the availability of its application with a solution that requires minimal effort in the event a server needs to be replaced or added. Which of the following would be the best solution to meet these objectives?", "options": ["Load balancing", "Fault tolerance", "Proxy servers", "Replication"], "answer": "A", "explanation": "Detailed Explanation:Load balancing improves application availability by distributing traffic across multiple servers. If one server fails, traffic is automatically routed to other available servers with minimal intervention.\n\nReference: CompTIA Security+ SY0-701 Study Guide, Domain 3: Security Architecture, Section: \"High\n\nAvailability Solutions\"."}, {"number": 171, "question": "Which of the following activities is included in the post-incident review phase?", "options": ["Determining the root cause of the incident", "Developing steps to mitigate the risks of the incident", "Validating the accuracy of the evidence collected during the investigation", "Reestablishing the compromised system's configuration and settings"], "answer": "A", "explanation": ""}, {"number": 172, "question": "A company is concerned about the theft of client data from decommissioned laptops. Which of the following is the most cost-effective method to decrease this risk?", "options": ["Wiping", "Recycling", "Shredding", "Deletion"], "answer": "A", "explanation": "Wiping involves securely erasing data by overwriting the hard drive, ensuring the information is unrecoverable. It is cost-effective compared to physical destruction methods like shredding.\n\n================="}, {"number": 173, "question": "A systems administrator is concerned users are accessing emails through a duplicate site that is not run by the company. Which of the following is used in this scenario?", "options": ["Impersonation", "Replication", "Phishing", "Smishing"], "answer": "A", "explanation": ""}, {"number": 174, "question": "Which of the following tools is best for logging and monitoring in a cloud environment?", "options": ["IPS", "FIM", "NAC", "SIEM"], "answer": "D", "explanation": ""}, {"number": 175, "question": "During a security incident, the security operations team identified sustained network traffic from a malicious\nIP address: 10.1.4.9. A security analyst is creating an inbound firewall rule to block the IP address from accessing the organization’s network. Which of the following fulfills this request?", "options": ["access-list inbound deny ig source 0.0.0.0/0 destination 10.1.4.9/32 access-list inbound deny ig source 10.1.4.9/32 destination 0.0.0.0/0 access-list inbound permit ig source 10.1.4.9/32 destination 0.0.0.0/0 access-list inbound permit ig source 0.0.0.0/0 destination 10.1.4.9/32"], "answer": "B", "explanation": "A firewall rule is a set of criteria that determines whether to allow or deny a packet to pass through the firewall. A firewall rule consists of several elements, such as the action, the protocol, the source address, the destination address, and the port number. The syntax of a firewall rule may vary depending on the type and vendor of the firewall, but the basic logic is the same. In this question, the security analyst is creating an inbound firewall rule to block the IP address 10.1.4.9 from accessing the organization’s network. This means that the action should be deny, the protocol should be any (or ig for IP), the source address should be 10.1.4.9 /32 (which means a single IP address), the destination address should be 0.0.0.0/0 (which means any IP address), and the port number should be any. Therefore, the correct firewall rule is: access-list inbound deny ig source 10.1.4.9/32 destination 0.0.0.0/0\n\nThis rule will match any packet that has the source IP address of 10.1.4.9 and drop it. The other options are incorrect because they either have the wrong action, the wrong source address, or the wrong destination address. For example, option A has the source and destination addresses reversed, which means that it will block any packet that has the destination IP address of 10.1.4.9, which is not the intended goal. Option C has the wrong action, which is permit, which means that it will allow the packet to pass through the firewall, which is also not the intended goal. Option D has the same problem as option A, with the source and destination addresses reversed.\n\nReferences = Firewall Rules – CompTIA Security+ SY0-401: 1.2, Firewalls – SY0-601 CompTIA Security+ : 3.3, Firewalls – CompTIA Security+ SY0-501, Understanding Firewall Rules – CompTIA Network+ N10- 005: 5.5, Configuring Windows Firewall – CompTIA A+ 220-1102 – 1.6."}, {"number": 176, "question": "An organization has a new regulatory requirement to implement corrective controls on a financial system.\nWhich of the following is the most likely reason for the new requirement?", "options": ["To defend against insider threats altering banking details", "To ensure that errors are not passed to other systems", "To allow for business insurance to be purchased", "To prevent unauthorized changes to financial data"], "answer": "D", "explanation": "Detailed Explanation:\n\nCorrective controls, such as auditing and versioning, help prevent unauthorized changes to financial data, ensuring data integrity and compliance with regulations. Reference: CompTIA Security+ SY0-701 Study\n\nGuide, Domain 5: Security Program Management, Section: \"Controls for Financial Systems\"."}, {"number": 177, "question": "A legacy device is being decommissioned and is no longer receiving updates or patches. Which of the following describes this scenario?", "options": ["End of business", "End of testing", "End of support", "End of life"], "answer": "D", "explanation": "When a legacy device is no longer receiving updates or patches, it is considered to be at the end of life (EOL).\n\nThis means the manufacturer has ceased support for the device, and it will no longer receive updates, security patches, or technical assistance. EOL devices pose security risks and are often decommissioned or replaced.\n\nEnd of support may seem similar but typically refers to the cessation of technical support, whereas EOL means the device is fully retired.\n\nEnd of business and End of testing do not apply in this context."}, {"number": 178, "question": "A university employee logged on to the academic server and attempted to guess the system administrators' log- in credentials. Which of the following security measures should the university have implemented to detect the employee's attempts to gain access to the administrators' accounts?", "options": ["Two-factor authentication", "Firewall", "Intrusion prevention system", "User activity logs"], "answer": "D", "explanation": ""}, {"number": 179, "question": "A security analyst locates a potentially malicious video file on a server and needs to identify both the creation date and the file's creator. Which of the following actions would most likely give the security analyst the information required?", "options": ["Obtain the file's SHA-256 hash.", "Use hexdump on the file's contents.", "Check endpoint logs.", "Query the file's metadata."], "answer": "D", "explanation": "Metadata is data that describes other data, such as its format, origin, creation date, author, and other attributes.\n\nVideo files, like other types of files, can contain metadata that can provide useful information for forensic analysis. For example, metadata can reveal the camera model, location, date and time, and software used to create or edit the video file. To query the file’s metadata, a security analyst can use various tools, such as\n\nMediaInfo1, ffprobe2, or hexdump3, to extract and display the metadata from the video file. By querying the file’s metadata, the security analyst can most likely identify both the creation date and the file’s creator, as well as other relevant information. Obtaining the file’s SHA-256 hash, checking endpoint logs, or using hexdump on the file’s contents are other possible actions, but they are not the most appropriate to answer the question. The file’s SHA-256 hash is a cryptographic value that can be used to verify the integrity or uniqueness of the file, but it does not reveal any information about the file’s creation date or creator. Checking endpoint logs can provide some clues about the file’s origin or activity, but it may not be reliable or accurate, especially if the logs are tampered with or incomplete. Using hexdump on the file’s contents can show the raw binary data of the file, but it may not be easy or feasible to interpret the metadata from the hex output, especially if the file is large or encrypted. References: 1: How do I get the meta-data of a video file? 2: How to check if an mp4 file contains malware? 3: [Hexdump - Wikipedia]"}, {"number": 180, "question": "Which of the following would be the best way to block unknown programs from executing?", "options": ["Access control list", "Application allow list.", "Host-based firewall", "DLP solution"], "answer": "B", "explanation": "An application allow list is a security technique that specifies which applications are permitted to run on a system or a network. An application allow list can block unknown programs from executing by only allowing the execution of programs that are explicitly authorized and verified. An application allow list can prevent malware, unauthorized software, or unwanted applications from running and compromising the security of the system or the network12.\n\nThe other options are not the best ways to block unknown programs from executing:\n\nAccess control list: This is a security technique that specifies which users or groups are granted or denied access to a resource or an object. An access control list can control the permissions and privileges of users or groups, but it does not directly block unknown programs from executing13.\n\nHost-based firewall: This is a security device that monitors and filters the incoming and outgoing network traffic on a single host or system. A host-based firewall can block or allow network connections based on predefined rules, but it does not directly block unknown programs from executing1 .\n\nDLP solution: This is a security system that detects and prevents the unauthorized transmission or leakage of sensitive data. A DLP solution can protect the confidentiality and integrity of data, but it does not directly block unknown programs from executing1 .\n\nReferences = 1: CompTIA Security+ SY0-701 Certification Study Guide, page 972: Application Whitelisting\n\n– CompTIA Security+ SY0-701 – 3.5, video by Professor Messer3: CompTIA Security+ SY0-701\n\nCertification Study Guide, page 98. : CompTIA Security+ SY0-701 Certification Study Guide, page 99. :\n\nCompTIA Security+ SY0-701 Certification Study Guide, page 100."}, {"number": 181, "question": "An organization is evaluating new regulatory requirements associated with the implementation of corrective controls on a group of interconnected financial systems. Which of the following is the most likely reason for the new requirement?", "options": ["To defend against insider threats altering banking details", "To ensure that errors are not passed to other systems", "To allow for business insurance to be purchased", "To prevent unauthorized changes to financial data"], "answer": "B", "explanation": "The primary goal of corrective controls in financial systems is to ensure that errors do not propagate\n\n. Financial transactions are often , meaning one incorrect or across interconnected systems interdependent unauthorized change can affect multiple systems. Regulations often mandate these controls to maintain\n\n.accuracy and prevent cascading failures\n\nA (insider threats altering banking details) is a concern, but this scenario focuses on corrective\n\n.controls, not insider threats specifically\n\nC (business insurance) is unrelated to why corrective controls are implemented.\n\nD (preventing unauthorized changes) falls under , not  controls.preventive corrective"}, {"number": 182, "question": "Which of the following exercises should an organization use to improve its incident response process?", "options": ["Tabletop", "Replication", "Failover", "Recovery"], "answer": "A", "explanation": "A tabletop exercise is a simulated scenario that tests the organization’s incident response plan and procedures.\n\nIt involves key stakeholders and decision-makers who discuss their roles and actions in response to a hypothetical incident. It can help identify gaps, weaknesses, and improvement areas in the incident response process. It can also enhance communication, coordination, and collaboration among the participants. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 525 1"}, {"number": 183, "question": "A security analyst needs to propose a remediation plan 'or each item in a risk register. The item with the highest priority requires employees to have separate logins for SaaS solutions and different password complexity requirements for each solution. Which of the following implementation plans will most likely resolve this security issue?", "options": ["Creating a unified password complexity standard", "Integrating each SaaS solution with the Identity provider", "Securing access to each SaaS by using a single wildcard certificate", "Configuring geofencing on each SaaS solution"], "answer": "B", "explanation": "Integrating each SaaS solution with an Identity Provider (IdP) is the most effective way to address the security issue. This approach allows for Single Sign-On (SSO) capabilities, where users can access multiple SaaS applications with a single set of credentials while maintaining strong password policies across all services. It simplifies the user experience and ensures consistent security enforcement across different SaaS platforms.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 05 Security Program Management and Oversight.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Identity and Access Management."}, {"number": 184, "question": "An organization is adopting cloud services at a rapid pace and now has multiple SaaS applications in use.\nEach application has a separate log-in. so the security team wants to reduce the number of credentials each employee must maintain. Which of the following is the first step the security team should take?", "options": ["Enable SAML", "Create OAuth tokens.", "Use password vaulting.", "Select an IdP"], "answer": "D", "explanation": "The first step in reducing the number of credentials each employee must maintain when using multiple SaaS applications is to select an Identity Provider (IdP). An IdP provides a centralized authentication service that supports Single Sign-On (SSO), enabling users to access multiple applications with a single set of credentials.\n\nEnabling SAML would be part of the technical implementation but comes after selecting an IdP.\n\nOAuth tokens are used for authorization, but selecting an IdP is the first step in managing authentication.\n\nPassword vaulting stores multiple passwords securely but doesn't reduce the need for separate logins."}, {"number": 185, "question": "Which of the following practices would be best to prevent an insider from introducing malicious code into a company's development process?", "options": ["Code scanning for vulnerabilities", "Open-source component usage", "Quality assurance testing", "Peer review and approval"], "answer": "D", "explanation": "Peer review and approval is a practice that involves having other developers or experts review the code before it is deployed or released. Peer review and approval can help detect and prevent malicious code, errors, bugs, vulnerabilities, and poor quality in the development process. Peer review and approval can also enforce coding standards, best practices, and compliance requirements. Peer review and approval can be done manually or with the help of tools, such as code analysis, code review, and code signing. References:\n\nCompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, Chapter 11: Secure Application\n\nDevelopment, page 543 2"}, {"number": 186, "question": "A new vulnerability enables a type of malware that allows the unauthorized movement of data from a system.\nWhich of the following would detect this behavior?", "options": ["Implementing encryption", "Monitoring outbound traffic", "Using default settings", "Closing all open ports"], "answer": "B", "explanation": "Monitoring outbound traffic is essential for detecting unauthorized data exfiltration from a system. A new vulnerability that allows malware to move data unauthorizedly would typically attempt to send this data out of the network. By monitoring outbound traffic, security tools can detect unusual data transfers, trigger alerts, and help prevent the exfiltration of sensitive information.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 04 Security Operations.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Threat Detection and Response."}, {"number": 187, "question": "An attacker used XSS to compromise a web server. Which of the following solutions could have been used to prevent this attack?", "options": ["NGFW", "UTM", "WAF", "NAC"], "answer": "C", "explanation": "Comprehensive and Detailed In-Depth Explanation:\n\nA  is designed to  such as Web Application Firewall (WAF) protect web applications from attacks Cross- by filtering and monitoring HTTP traffic between the internet and a web application.Site Scripting (XSS)\n\nNext-Generation Firewalls (NGFW) (A) provide advanced network security but are not specifically designed to protect web applications from XSS attacks.\n\nUnified Threat Management (UTM) (B) provides multiple security functions but lacks the specialized application-layer protection needed to mitigate XSS.\n\nNetwork Access Control (NAC) (D) controls device access to the network but does not prevent web- based attacks.\n\nA  for protecting web servers from WAF is the best solution XSS, SQL injection, and other web-based\n\n.threats"}, {"number": 188, "question": "A Chief Information Security Officer would like to conduct frequent, detailed reviews of systems and procedures to track compliance objectives. Which of the following is the best method to achieve this objective?", "options": ["Third-party attestation", "Penetration testing", "Internal auditing", "Vulnerability scans"], "answer": "C", "explanation": ""}, {"number": 189, "question": "Which of the following is the best way to securely store an encryption key for a data set in a manner that allows multiple entities to access the key when needed?", "options": ["Public key infrastructure", "Open public ledger", "Public key encryption", "Key escrow"], "answer": "D", "explanation": ""}, {"number": 190, "question": "Which of the following are the best for hardening end-user devices? (Select )two", "options": ["Full disk encryption", "Group-level permissions", "Account lockout", "Endpoint protection", "Proxy server", "Segmentation"], "answer": "A D", "explanation": "Full disk encryption (A) ensures that data stored on the device is protected even if the device is physically stolen. This is a fundamental security control for end-user devices, especially laptops and mobile devices, to prevent data breaches.\n\nEndpoint protection (D) refers to anti-malware, antivirus, and host-based firewall solutions that safeguard end-user devices from malware, ransomware, and unauthorized access.\n\nThese measures are explicitly referenced in the  exam objective CompTIA Security+ SY0-701 2.2: Given a under .scenario, apply security concepts in support of organizational risk mitigation Device hardening"}, {"number": 191, "question": "A security engineer is installing an IPS to block signature-based attacks in the environment. Which of the following modes will best accomplish this task?", "options": ["Monitor", "Sensor", "Audit", "Active"], "answer": "D", "explanation": "To block signature-based attacks, the Intrusion Prevention System (IPS) must be in active mode. In this mode, the IPS can actively monitor and block malicious traffic in real time based on predefined signatures. This is the best mode to prevent known attack types from reaching the internal network.\n\nMonitor mode and sensor mode are typically passive, meaning they only observe and log traffic without actively blocking it.\n\nAudit mode is used for review purposes and does not actively block traffic."}, {"number": 192, "question": "Which of the following is the final step of the modem response process?", "options": ["Lessons learned", "Eradication", "Containment", "Recovery"], "answer": "A", "explanation": "The final step in the incident response process is \"Lessons learned.\" This step involves reviewing and analyzing the incident to understand what happened, how it was handled, and what could be improved. The goal is to improve future response efforts and prevent similar incidents from occurring. It's essential for refining the incident response plan and enhancing overall security posture.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of incident response and recovery."}, {"number": 193, "question": "A company is in the process of migrating to cloud-based services. The company's IT department has limited resources for migration and ongoing support. Which of the following best meets the company's needs?", "options": ["IPS", "WAF", "SASE", "IAM"], "answer": "C", "explanation": ""}, {"number": 194, "question": "An organization is implementing a COPE mobile device management policy. Which of the following should the organization include in the COPE policy? (Select two).", "options": ["Remote wiping of the device", "Data encryption", "Requiring passwords with eight characters", "Data usage caps", "Employee data ownership", "Personal application store access"], "answer": "A B", "explanation": ""}, {"number": 195, "question": "A network administrator wants to ensure that network traffic is highly secure while in transit. Which of the following actions best describes the actions the network administrator should take?", "options": ["Ensure that NAC is enforced on all network segments, and confirm that firewalls have updated policies to block unauthorized traffic.", "Ensure only TLS and other encrypted protocols are selected for use on the network, and only permit authorized traffic via secure protocols.", "Configure the perimeter IPS to block inbound HTTPS directory traversal traffic, and verify that signatures are updated on a daily basis.", "Ensure the EDR software monitors for unauthorized applications that could be used by threat actors, and configure alerts for the security team."], "answer": "B", "explanation": ""}, {"number": 196, "question": "Which of the following is the best way to provide secure remote access for employees while minimizing the exposure of a company's internal network?", "options": ["VPN", "LDAP", "FTP", "RADIUS"], "answer": "A", "explanation": "A VPN (Virtual Private Network) is a secure method to provide employees with remote access to a company's network. It encrypts data, protecting it from interception and ensuring secure communication between the user and the internal network.References: Security+ SY0-701 Course Content, Security+ SY0-601 Book."}, {"number": 197, "question": "A systems administrator discovers a system that is no longer receiving support from the vendor. However, this system and its environment are critical to running the business, cannot be modified, and must stay online.\nWhich of the following risk treatments is the most appropriate in this situation?", "options": ["Refect", "Accept", "Transfer", "Avoid"], "answer": "C", "explanation": ""}, {"number": 198, "question": "Which of the following activities is the first stage in the incident response process?", "options": ["Detection", "Declaration", "Containment", "Vacation"], "answer": "A", "explanation": ""}, {"number": 199, "question": "Client files can only be accessed by employees who need to know the information and have specified roles in the company. Which of the following best describes this security concept?", "options": ["Availability", "Confidentiality", "Integrity", "Non-repudiation"], "answer": "B", "explanation": "The scenario described, where client files are only accessible to employees who \"need to know\" the information, reflects the concept of confidentiality. Confidentiality ensures that sensitive information is only accessible to those who are authorized to view it, preventing unauthorized access.\n\nAvailability ensures that data is accessible when needed but doesn’t focus on restricting access.\n\nIntegrity ensures that data remains accurate and unaltered but doesn’t pertain to access control.\n\nNon-repudiation ensures that actions cannot be denied after they are performed, but this concept is unrelated to access control."}, {"number": 200, "question": "An organization is struggling with scaling issues on its VPN concentrator and internet circuit due to remote work. The organization is looking for a software solution that will allow it to reduce traffic on the VPN and internet circuit, while still providing encrypted tunnel access to the data center and monitoring of remote employee internet traffic. Which of the following will help achieve these objectives?", "options": ["Deploying a SASE solution to remote employees", "Building a load-balanced VPN solution with redundant internet", "Purchasing a low-cost SD-WAN solution for VPN traffic", "Using a cloud provider to create additional VPN concentrators"], "answer": "A", "explanation": "SASE stands for Secure Access Service Edge. It is a cloud-based service that combines network and security functions into a single integrated solution. SASE can help reduce traffic on the VPN and internet circuit by providing secure and optimized access to the data center and cloud applications for remote employees. SASE can also monitor and enforce security policies on the remote employee internet traffic, regardless of their location or device. SASE can offer benefits such as lower costs, improved performance, scalability, and flexibility compared to traditional VPN solutions. References: CompTIA Security+ Study Guide: Exam SY0- 701, 9th Edition, page 457-458 1"}, {"number": 201, "question": "During a SQL update of a database, a temporary field used as part of the update sequence was modified by an attacker before the update completed in order to allow access to the system. Which of the following best describes this type of vulnerability?", "options": ["Race condition", "Memory injection", "Malicious update", "Side loading"], "answer": "A", "explanation": "A  occurs when race condition two or more processes attempt to access and modify a shared resource , leading to unintended behavior. In this scenario, the attacker was able to modify a temporary simultaneously field , indicating a before the SQL update completed time-of-check to time-of-use (TOCTOU) , which is a type of race condition.vulnerability\n\nMemory injection (B) refers to inserting malicious code into a running process’s memory, but that is what is happening here.not\n\nMalicious update (C) is too broad and does not specifically describe this scenario.\n\nSide loading (D) is a technique where malicious software is loaded via a trusted application, unrelated to this case."}, {"number": 202, "question": "An employee fell for a phishing scam, which allowed an attacker to gain access to a company PC. The attacker scraped the PC’s memory to find other credentials. Without cracking these credentials, the attacker used them to move laterally through the corporate network. Which of the following describes this type of attack?", "options": ["Privilege escalation", "Buffer overflow", "SQL injection", "Pass-the-hash"], "answer": "D", "explanation": "The scenario describes an attacker who obtained credentials from a compromised system's memory and used them without cracking to move laterally within the network. This technique is known as a \"pass-the-hash\" attack, where the attacker captures hashed credentials (e.g., NTLM hashes) and uses them to authenticate and gain access to other systems without needing to know the plaintext password. This is a common attack method in environments where weak security practices or outdated protocols are in use.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: The course discusses credential-based attacks like pass-the- hash, emphasizing their impact and the importance of protecting credential stores."}, {"number": 203, "question": "The Chief Information Security Officer of an organization needs to ensure recovery from ransomware would likely occur within the organization's agreed-upon RPOs end RTOs. Which of the following backup scenarios would best ensure recovery?", "options": ["Hourly differential backups stored on a local SAN array", "Dally full backups stored on premises in magnetic offline media", "Daly differential backups maintained by a third-party cloud provider", "Weekly full backups with daily incremental stored on a NAS drive"], "answer": "D", "explanation": "A backup strategy that combines weekly full backups with daily incremental backups stored on a NAS\n\n(Network Attached Storage) drive is likely to meet an organization's Recovery Point Objectives (RPOs) and\n\nRecovery Time Objectives (RTOs). This approach ensures that recent data is regularly backed up and that recovery can be done efficiently, without significant data loss or lengthy downtime.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 05 Security Program Management and Oversight.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Disaster Recovery and Backup Strategies."}, {"number": 204, "question": "A security administrator would like to protect data on employees’ laptops. Which of the following encryption techniques should the security administrator use?", "options": ["Partition", "Asymmetric", "Full disk", "Database"], "answer": "C", "explanation": "Full disk encryption (FDE) is a technique that encrypts all the data on a hard drive, including the operating system, applications, and files. FDE protects the data from unauthorized access in case the laptop is lost, stolen, or disposed of without proper sanitization. FDE requires the user to enter a password, a PIN, a smart card, or a biometric factor to unlock the drive and boot the system. FDE can be implemented by using software solutions, such as BitLocker, FileVault, or VeraCrypt, or by using hardware solutions, such as self- encrypting drives (SEDs) or Trusted Platform Modules (TPMs). FDE is a recommended encryption technique for laptops and other mobile devices that store sensitive data.\n\nPartition encryption is a technique that encrypts only a specific partition or volume on a hard drive, leaving the rest of the drive unencrypted. Partition encryption is less secure than FDE, as it does not protect the entire drive and may leave traces of data on unencrypted areas. Partition encryption is also less convenient than\n\nFDE, as it requires the user to mount and unmount the encrypted partition manually.\n\nAsymmetric encryption is a technique that uses a pair of keys, one public and one private, to encrypt and decrypt data. Asymmetric encryption is mainly used for securing communication, such as email, web, or\n\nVPN, rather than for encrypting data at rest. Asymmetric encryption is also slower and more computationally intensive than symmetric encryption, which is the type of encryption used by FDE and partition encryption.\n\nDatabase encryption is a technique that encrypts data stored in a database, such as tables, columns, rows, or cells. Database encryption can be done at the application level, the database level, or the file system level.\n\nDatabase encryption is useful for protecting data from unauthorized access by database administrators, hackers, or malware, but it does not protect the data from physical theft or loss of the device that hosts the database.\n\nReferences = Data Encryption – CompTIA Security+ SY0-401: 4.4, CompTIA Security+ Cheat Sheet and\n\nPDF | Zero To Mastery, CompTIA Security+ SY0-601 Certification Course - Cybr, Application Hardening –\n\nSY0-601 CompTIA Security+ : 3.2."}, {"number": 205, "question": "Which of the following scenarios describes a possible business email compromise attack?", "options": ["An employee receives a gift card request in an email that has an executive's name in the display field of the email.", "Employees who open an email attachment receive messages demanding payment in order to access files.", "A service desk employee receives an email from the HR director asking for log-in credentials to a cloud administrator account.", "An employee receives an email with a link to a phishing site that is designed to look like the company's email portal."], "answer": "A", "explanation": "A business email compromise (BEC) attack is a type of phishing attack that targets employees who have access to company funds or sensitive information. The attacker impersonates a trusted person, such as an executive, a vendor, or a client, and requests a fraudulent payment, a wire transfer, or confidential data. The attacker often uses social engineering techniques, such as urgency, pressure, or familiarity, to convince the victim to comply with the request12.\n\nIn this scenario, option A describes a possible BEC attack, where an employee receives a gift card request in an email that has an executive’s name in the display field of the email. The email may look like it is coming from the executive, but the actual email address may be spoofed or compromised. The attacker may claim that the gift cards are needed for a business purpose, such as rewarding employees or clients, and ask the employee to purchase them and send the codes. This is a common tactic used by BEC attackers to steal money from unsuspecting victims34.\n\nOption B describes a possible ransomware attack, where malicious software encrypts the files on a device and demands a ransom for the decryption key. Option C describes a possible credential harvesting attack, where an attacker tries to obtain the login information of a privileged account by posing as a legitimate authority.\n\nOption D describes a possible phishing attack, where an attacker tries to lure the victim to a fake website that mimics the company’s email portal and capture their credentials. These are all types of cyberattacks, but they are not examples of BEC attacks. References = 1: Business Email Compromise - CompTIA Security+ SY0- 701 - 2.2 2: CompTIA Security+ SY0-701 Certification Study Guide 3: Business Email Compromise: The 12\n\nBillion Dollar Scam 4: TOTAL: CompTIA Security+ Cert (SY0-701) | Udemy"}, {"number": 206, "question": "Which of the following vulnerabilities is associated with installing software outside of a manufacturer’s approved software repository?", "options": ["Jailbreaking", "Memory injection", "Resource reuse", "Side loading"], "answer": "D", "explanation": "Side loading is the process of installing software outside of a manufacturer’s approved software repository.\n\nThis can expose the device to potential vulnerabilities, such as malware, spyware, or unauthorized access.\n\nSide loading can also bypass security controls and policies that are enforced by the manufacturer or the organization. Side loading is often done by users who want to access applications or features that are not available or allowed on their devices. References = Sideloading - CompTIA Security + Video Training |\n\nInterface Technical Training, Security+ (Plus) Certification | CompTIA IT Certifications, Load Balancers –\n\nCompTIA Security+ SY0-501 – 2.1, CompTIA Security+ SY0-601 Certification Study Guide."}, {"number": 207, "question": "Which of the following types of identification methods can be performed on a deployed application during runtime?", "options": ["Dynamic analysis", "Code review", "Package monitoring", "Bug bounty"], "answer": "A", "explanation": "Dynamic analysis is performed on software during execution to identify vulnerabilities based on how the software behaves in real-world scenarios. It is useful in detecting security issues that only appear when the application is running.References: CompTIA SY0-701 Course Content."}, {"number": 208, "question": "A company must ensure sensitive data at rest is rendered unreadable. Which of the following will the company most likely use?", "options": ["Hashing", "Tokenization", "Encryption", "Segmentation"], "answer": "C", "explanation": "Encryption is a method of transforming data in a way that makes it unreadable without a secret key necessary to decrypt the data back into plaintext. Encryption is one of the most common and effective ways to protect data at rest, as it prevents unauthorized access, modification, or theft of the data. Encryption can be applied to different types of data at rest, such as block storage, object storage, databases, archives, and so on. Hashing, tokenization, and segmentation are not methods of rendering data at rest unreadable, but rather of protecting data in other ways. Hashing is a one-way function that generates a fixed-length output, called a hash or digest, from an input, such that the input cannot be recovered from the output. Hashing is used to verify the integrity and authenticity of data, but not to encrypt it. Tokenization is a process that replaces sensitive data with non- sensitive substitutes, called tokens, that have no meaning or value on their own. Tokenization is used to reduce the exposure and compliance scope of sensitive data, but not to encrypt it. Segmentation is a technique that divides a network or a system into smaller, isolated units, called segments, that have different levels of access and security. Segmentation is used to limit the attack surface and contain the impact of a breach, but not to encrypt data at rest. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, pages 77-781; Protecting data at rest - Security Pillar3"}, {"number": 209, "question": "An administrator assists the legal and compliance team with ensuring information about customer transactions is archived for the proper time period. Which of the following data policies is the administrator carrying out?", "options": ["Compromise", "Retention", "Analysis", "Transfer", "Inventory"], "answer": "B", "explanation": "A data retention policy is a set of rules that defines how long data should be stored and when it should be deleted or archived. An administrator assists the legal and compliance team with ensuring information about customer transactions is archived for the proper time period by following the data retention policy of the organization. This policy helps the organization to comply with legal and regulatory requirements, optimize storage space, and protect data privacy and security.\n\nReferences\n\nCompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, Chapter 3, Section 3.4, page 1211\n\nCompTIA Security+ Practice Tests: Exam SY0-701, 3rd Edition, Chapter 3, Question 15, page 832"}, {"number": 210, "question": "A company is considering an expansion of access controls for an application that contractors and internal employees use to reduce costs. Which of the following risk elements should the implementation team understand before granting access to the application?", "options": ["Threshold", "Appetite", "Avoidance", "Register"], "answer": "B", "explanation": "Risk appetite refers to the  before implementing security level of risk an organization is willing to accept measures. When expanding access controls, the company must assess how much risk is acceptable in terms of\n\n.data exposure, unauthorized access, and compliance obligations"}, {"number": 211, "question": "A company is adding a clause to its AUP that states employees are not allowed to modify the operating system on mobile devices. Which of the following vulnerabilities is the organization addressing?", "options": ["Cross-site scripting", "Buffer overflow", "Jailbreaking", "Side loading"], "answer": "C", "explanation": "Jailbreaking is the process of removing the restrictions imposed by the manufacturer or carrier on a mobile device, such as an iPhone or iPad. Jailbreaking allows users to install unauthorized applications, modify system settings, and access root privileges. However, jailbreaking also exposes the device to potential security risks, such as malware, spyware, unauthorized access, data loss, and voided warranty. Therefore, an organization may prohibit employees from jailbreaking their mobile devices to prevent these vulnerabilities and protect the corporate data and network. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, Chapter 10: Mobile Device Security, page 507 2"}, {"number": 212, "question": "The Chief Information Officer (CIO) asked a vendor to provide documentation detailing the specific objectives within the compliance framework that the vendor's services meet. The vendor provided a report and a signed letter stating that the services meet 17 of the 21 objectives. Which of the following did the vendor provide to the CIO?", "options": ["Penetration test results", "Self-assessment findings", "Attestation of compliance", "Third-party audit report"], "answer": "C", "explanation": ""}, {"number": 213, "question": "A security consultant needs secure, remote access to a client environment. Which of the following should the security consultant most likely use to gain access?", "options": ["EAP", "DHCP", "IPSec", "NAT"], "answer": "C", "explanation": "IPSec is a protocol suite that provides secure communication over IP networks. IPSec can be used to create virtual private networks (VPNs) that encrypt and authenticate the data exchanged between two or more parties. IPSec can also provide data integrity, confidentiality, replay protection, and access control. A security consultant can use IPSec to gain secure, remote access to a client environment by establishing a VPN tunnel with the client’s network. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition,\n\nChapter 8: Secure Protocols and Services, page 385 1"}, {"number": 214, "question": "Which of the following phases of an incident response involves generating reports?", "options": ["Recovery", "Preparation", "Lessons learned", "Containment"], "answer": "C", "explanation": "The lessons learned phase of an incident response process involves reviewing the incident and generating reports. This phase helps identify what went well, what needs improvement, and what changes should be made to prevent future incidents. Documentation and reporting are essential parts of this phase to ensure that the findings are recorded and used for future planning.\n\nRecovery focuses on restoring services and normal operations.\n\nPreparation involves creating plans and policies for potential incidents, not reporting.\n\nContainment deals with isolating and mitigating the effects of the incident, not generating reports."}, {"number": 215, "question": "Which of the following automation use cases would best enhance the security posture of an organization by rapidly updating permissions when employees leave a company?", "options": ["Provisioning resources", "Disabling access", "Reviewing change approvals", "Escalating permission requests"], "answer": "B", "explanation": "Disabling access is an automation use case that would best enhance the security posture of an organization by rapidly updating permissions when employees leave a company. Disabling access is the process of revoking or suspending the access rights of a user account, such as login credentials, email, VPN, cloud services, etc.\n\nDisabling access can prevent unauthorized or malicious use of the account by former employees or attackers who may have compromised the account. Disabling access can also reduce the attack surface and the risk of data breaches or leaks. Disabling access can be automated by using scripts, tools, or workflows that can trigger the action based on predefined events, such as employee termination, resignation, or transfer.\n\nAutomation can ensure that the access is disabled in a timely, consistent, and efficient manner, without relying on manual intervention or human error."}, {"number": 216, "question": "A company implemented an MDM policy 10 mitigate risks after repealed instances of employees losing company-provided mobile phones. In several cases. The lost phones were used maliciously to perform social engineering attacks against other employees. Which of the following MDM features should be configured to best address this issue? (Select two).", "options": ["Screen locks", "Remote wipe", "Full device encryption", "Push notifications", "Application management", "Geolocation"], "answer": "A B", "explanation": "Integrating each SaaS solution with an Identity Provider (IdP) is the most effective way to address the security issue. This approach allows for Single Sign-On (SSO) capabilities, where users can access multiple SaaS applications with a single set of credentials while maintaining strong password policies across all services. It simplifies the user experience and ensures consistent security enforcement across different SaaS platforms.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 05 Security Program Management and Oversight.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Identity and Access Management."}, {"number": 217, "question": "Which of the following actions must an organization take to comply with a person's request for the right to be forgotten?", "options": ["Purge all personally identifiable attributes.", "Encrypt all of the data.", "Remove all of the person’s data.", "Obfuscate all of the person’s data."], "answer": "C", "explanation": "Comprehensive and Detailed In-Depth Explanation:\n\nThe , as outlined in regulations such as the right to be forgotten General Data Protection Regulation , requires organizations to  upon request, unless (GDPR) permanently delete an individual's personal data there is a legal or contractual obligation to retain it.\n\nPurging personally identifiable attributes (A) removes some identifying data but does not fully satisfy the request.\n\nEncrypting the data (B) does not remove it, and the data is still accessible with the decryption key.\n\nObfuscating data (D) makes data unreadable but does not permanently remove it.\n\nTo comply with , organizations must  unless an the right to be forgotten remove all of the person's data exception applies."}, {"number": 218, "question": "The management team notices that new accounts that are set up manually do not always have correct access or permissions.\nWhich of the following automation techniques should a systems administrator use to streamline account creation?", "options": ["Guard rail script", "Ticketing workflow", "Escalation script", "User provisioning script"], "answer": "D", "explanation": "A user provisioning script is an automation technique that uses a predefined set of instructions or commands to create, modify, or delete user accounts and assign appropriate access or permissions. A user provisioning script can help to streamline account creation by reducing manual errors, ensuring consistency and compliance, and saving time and resources12.\n\nThe other options are not automation techniques that can streamline account creation:\n\nGuard rail script: This is a script that monitors and enforces the security policies and rules on a system or a network. A guard rail script can help to prevent unauthorized or malicious actions, such as changing security settings, accessing restricted resources, or installing unwanted software3.\n\nTicketing workflow: This is a process that tracks and manages the requests, issues, or incidents that are reported by users or customers. A ticketing workflow can help to improve the communication, collaboration, and resolution of problems, but it does not automate the account creation process4.\n\nEscalation script: This is a script that triggers an alert or a notification when a certain condition or threshold is met or exceeded. An escalation script can help to inform the relevant parties or authorities of a critical situation, such as a security breach, a performance degradation, or a service outage.\n\nReferences = 1: CompTIA Security+ SY0-701 Certification Study Guide, page 1022: User Provisioning –\n\nCompTIA Security+ SY0-701 – 5.1, video by Professor Messer3: CompTIA Security+ SY0-701 Certification\n\nStudy Guide, page 1034: CompTIA Security+ SY0-701 Certification Study Guide, page 104. : CompTIA\n\nSecurity+ SY0-701 Certification Study Guide, page 105."}, {"number": 219, "question": "Which of the following would be the best ways to ensure only authorized personnel can access a secure facility? (Select two).", "options": ["Fencing", "Video surveillance", "Badge access", "Access control vestibule", "Sign-in sheet", "Sensor"], "answer": "C D", "explanation": "Badge access and access control vestibule are two of the best ways to ensure only authorized personnel can access a secure facility. Badge access requires the personnel to present a valid and authenticated badge to a reader or scanner that grants or denies access based on predefined rules and permissions. Access control vestibule is a physical security measure that consists of a small room or chamber with two doors, one leading to the outside and one leading to the secure area. The personnel must enter the vestibule and wait for the first door to close and lock before the second door can be opened. This prevents tailgating or piggybacking by unauthorized individuals. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition,\n\nChapter 4, pages 197-1981"}, {"number": 220, "question": "A forensic engineer determines that the root cause of a compromise is a SQL injection attack. Which of the following should the engineer review to identify the command used by the threat actor?", "options": ["Metadata", "Application log", "System log", "Netflow log"], "answer": "B", "explanation": "To identify the exact  during a SQL injection attack, the  is the command or input used application log (B) most relevant. It records inputs, errors, and processing activities within the application layer.\n\nUnder , CompTIA emphasizes reviewing  to detect indicators of malicious Domain 2.1 application logs activity, including  like SQL injection.web application attacks"}, {"number": 221, "question": "While investigating a recent security breach an analyst finds that an attacker gained access by SOL infection through a company website. Which of the following should the analyst recommend to the website developers to prevent this from reoccurring?", "options": ["Secure cookies", "Input sanitization", "Code signing", "Blocklist"], "answer": "B", "explanation": "Input sanitization is a critical security measure to prevent SQL injection attacks, which occur when an attacker exploits vulnerabilities in a website's input fields to execute malicious SQL code. By properly sanitizing and validating all user inputs, developers can prevent malicious code from being executed, thereby securing the website against such attacks.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of web application security and common vulnerability mitigation strategies."}, {"number": 222, "question": "A security administrator is addressing an issue with a legacy system that communicates data using an unencrypted protocol to transfer sensitive data to a third party. No software updates that use an encrypted protocol are available, so a compensating control is needed. Which of the following are the most appropriate for the administrator to suggest? (Select two.)", "options": ["Tokenization", "Cryptographic downgrade", "SSH tunneling", "Segmentation", "Patch installation", "Data masking"], "answer": "C D", "explanation": "Detailed Explanation:SSH tunneling can secure the unencrypted protocol by encapsulating traffic in an encrypted tunnel. Segmentation isolates the legacy system, reducing the risk of unauthorized access.\n\nReference: CompTIA Security+ SY0-701 Study Guide, Domain 2: Threats, Section: \"Compensating Controls for Legacy Systems\"."}, {"number": 223, "question": "A security analyst is assessing several company firewalls. Which of the following cools would The analyst most likely use to generate custom packets to use during the assessment?", "options": ["hping", "Wireshark", "PowerShell netstat"], "answer": "A", "explanation": "Monitoring outbound traffic is essential for detecting unauthorized data exfiltration from a system. A new vulnerability that allows malware to move data unauthorizedly would typically attempt to send this data out of the network. By monitoring outbound traffic, security tools can detect unusual data transfers, trigger alerts, and help prevent the exfiltration of sensitive information.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 04 Security Operations.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Threat Detection and Response."}, {"number": 224, "question": "An attorney prints confidential documents to a copier in an office space near multiple workstations and a reception desk. When the attorney goes to the copier to retrieve the documents, the documents are missing.\nWhich of the following would best prevent this from reoccurring?", "options": ["Place the copier in the legal department.", "Configure DLP on the attorney's workstation.", "Set up LDAP authentication on the printer.", "Conduct a physical penetration test."], "answer": "C", "explanation": "LDAP authentication on the printer (C) would require users to , enabling authenticate before printing\n\n. This ensures that documents are secure print release not printed until the authorized user is physically , which directly addresses the issue of missing confidential documents.present\n\nAs per , Domain 3.1 (Access management), integrating CompTIA Security+ SY0-701 authentication improves physical and document security in shared environments.mechanisms like LDAP"}, {"number": 225, "question": "An administrator finds that all user workstations and servers are displaying a message that is associated with files containing an extension of .ryk. Which of the following types of infections is present on the systems?", "options": ["Virus", "Trojan", "Spyware", "Ransomware"], "answer": "D", "explanation": "Ransomware is a type of malware that encrypts the victim’s files and demands a ransom for the decryption key. The ransomware usually displays a message on the infected system with instructions on how to pay the ransom and recover the files. The .ryk extension is associated with a ransomware variant called Ryuk, which targets large organizations and demands high ransoms1."}, {"number": 226, "question": "Which of the following is a hardware-specific vulnerability?", "options": ["Firmware version", "Buffer overflow", "SQL injection", "Cross-site scripting"], "answer": "A", "explanation": "Firmware is a type of software that is embedded in a hardware device, such as a router, a printer, or a BIOS chip. Firmware controls the basic functions and operations of the device, and it can be updated or modified by the manufacturer or the user. Firmware version is a hardware-specific vulnerability, as it can expose the device to security risks if it is outdated, corrupted, or tampered with. An attacker can exploit firmware vulnerabilities to gain unauthorized access, modify device settings, install malware, or cause damage to the device or the network. Therefore, it is important to keep firmware updated and verify its integrity and authenticity. References = CompTIA Security+ Study Guide with over 500 Practice Test Questions: Exam\n\nSY0-701, 9th Edition, Chapter 2, page 67. CompTIA Security+ SY0-701 Exam Objectives, Domain 2.1, page 10."}, {"number": 227, "question": "Which of the following types of vulnerabilities is primarily caused by improper use and management of cryptographic certificates?", "options": ["Misconfiguration", "Resource reuse", "Insecure key storage", "Weak cipher suites"], "answer": "C", "explanation": "Detailed Explanation:Insecure key storage refers to vulnerabilities caused by improper handling of cryptographic keys and certificates, such as storing them in plaintext or lacking access controls. Reference:\n\nCompTIA Security+ SY0-701 Study Guide, Domain 2: Threats, Section: \"Cryptographic Vulnerabilities and\n\nMitigation\"."}, {"number": 228, "question": "Which of the following best describe a penetration test that resembles an actual external attach?", "options": ["Known environment", "Partially known environment", "Bug bounty", "Unknown environment"], "answer": "D", "explanation": "An unknown environment in penetration testing, also known as a black-box test, simulates an actual external attack where the tester has no prior knowledge of the system. This type of penetration test is designed to mimic real-world attack scenarios, where an attacker has little to no information about the target environment.\n\nThe tester must rely on various reconnaissance and attack techniques to uncover vulnerabilities, much like a real-world attacker would. This approach helps organizations understand their security posture from an external perspective, providing insights into how their defenses would hold up against a true outsider threat.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: The course highlights the importance of understanding different penetration testing environments, including black-box testing, which aligns with the \"unknown environment\" in the provided answer.\n\nCompTIA Security+ SY0-601 Study Guide: The guide details penetration testing methodologies, including black-box testing, which is crucial for simulating real external attacks."}, {"number": 229, "question": "An administrator was notified that a user logged in remotely after hours and copied large amounts of data to a personal device.\nWhich of the following best describes the user’s activity?", "options": ["Penetration testing", "Phishing campaign", "External audit", "Insider threat"], "answer": "D", "explanation": "An insider threat is a security risk that originates from within the organization, such as an employee, contractor, or business partner, who has authorized access to the organization’s data and systems. An insider threat can be malicious, such as stealing, leaking, or sabotaging sensitive data, or unintentional, such as falling victim to phishing or social engineering. An insider threat can cause significant damage to the organization’s reputation, finances, operations, and legal compliance. The user’s activity of logging in remotely after hours and copying large amounts of data to a personal device is an example of a malicious insider threat, as it violates the organization’s security policies and compromises the confidentiality and integrity of the data. References = Insider Threats – CompTIA Security+ SY0-701: 3.2, video at 0:00; CompTIA Security+\n\nSY0-701 Certification Study Guide, page 133."}, {"number": 230, "question": "A company wants to track modifications to the code used to build new virtual servers. Which of the following will the company most likely deploy?", "options": ["Change management ticketing system", "Behavioral analyzer", "Collaboration platform", "Version control tool"], "answer": "D", "explanation": "Detailed Explanation:A version control tool, such as Git, tracks changes made to code, maintains history, and allows developers to manage and revert to earlier versions when needed. This ensures accountability and control over modifications. Reference: CompTIA Security+ SY0-701 Study Guide, Domain 3: Security\n\nArchitecture, Section: \"Version Control and Documentation\"."}, {"number": 231, "question": "A program manager wants to ensure contract employees can only use the company’s computers Monday through Friday from 9 a.m. to 5 p.m. Which of the following would best enforce this access control?", "options": ["Creating a GPO for all contract employees and setting time-of-day log-in restrictions", "Creating a discretionary access policy and setting rule-based access for contract employees", "Implementing an OAuth server and then setting least privilege for contract employees", "Implementing SAML with federation to the contract employees' authentication server"], "answer": "A", "explanation": "The most appropriate method is to use a . Group Policy Object (GPO) with time-of-day restrictions (A)\n\nThis is a native capability in Windows environments that allows administrators to control when users are to domain-joined systems.allowed to log in\n\nThis aligns with , Domain 3.1: Given a scenario, apply identity and access management (IAM) concepts especially under “Access controls (e.g., time-based restrictions, GPOs, least privilege).”"}, {"number": 232, "question": "A growing company would like to enhance the ability of its security operations center to detect threats but reduce the amount of manual work required tor the security analysts. Which of the following would best enable the reduction in manual work?", "options": ["SOAR", "SIEM", "MDM", "DLP"], "answer": "A", "explanation": "Security Orchestration, Automation, and Response (SOAR) systems help organizations automate repetitiv
