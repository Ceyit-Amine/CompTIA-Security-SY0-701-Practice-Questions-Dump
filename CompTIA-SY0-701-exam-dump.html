ences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 03 Security Architecture.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Threats and Vulnerability Management."}, {"number": 391, "question": "A spoofed identity was detected for a digital certificate. Which of the following are the type of unidentified key and the certificate mat could be in use on the company domain?", "options": ["Private key and root certificate", "Public key and expired certificate", "Private key and self-signed certificate", "Public key and wildcard certificate"], "answer": "C", "explanation": "A self-signed certificate is a certificate that is signed by its own private key rather than by a trusted certificate authority (CA). This means that the authenticity of the certificate relies solely on the issuer's own authority. If a spoofed identity was detected, it could indicate that a private key associated with a self-signed certificate was compromised. Self-signed certificates are often used internally within organizations, but they carry higher risks since they are not validated by a third-party CA, making them more susceptible to spoofing.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly the domains discussing Public Key\n\nInfrastructure (PKI) and certificate management."}, {"number": 392, "question": "During a penetration test, a vendor attempts to enter an unauthorized area using an access badge Which of the following types of tests does this represent?", "options": ["Defensive", "Passive", "Offensive", "Physical"], "answer": "D", "explanation": "Attempting to enter an unauthorized area using an access badge during a penetration test is an example of a physical test. This type of test evaluates the effectiveness of physical security controls, such as access badges, security guards, and locks, in preventing unauthorized access to restricted areas.\n\nDefensive and offensive testing typically refer to digital or network-based penetration testing strategies.\n\nPassive testing involves observing or monitoring but not interacting with the environment."}, {"number": 393, "question": "A group of developers has a shared backup account to access the source code repository. Which of the following is the best way to secure the backup account if there is an SSO failure?", "options": ["RAS", "EAP", "SAML", "PAM"], "answer": "D", "explanation": "Detailed Explanation:Privileged Access Management (PAM) solutions enhance security by enforcing strong authentication, rotation of credentials, and access control for shared accounts. This is especially critical in scenarios like SSO failures. Reference: CompTIA Security+ SY0-701 Study Guide, Domain 5: Security\n\nProgram Management, Section: \"Privileged Access and Identity Management\"."}, {"number": 394, "question": "Which of the following security concepts is accomplished when granting access after an individual has logged into a computer network?", "options": ["Authorization", "Identification", "Non-repudiation", "Authentication"], "answer": "A", "explanation": "Detailed Explanation:Authorization refers to the process of granting or denying specific rights to a user after verifying their identity through authentication. Reference: CompTIA Security+ SY0-701 Study Guide,\n\nDomain 1: General Security Concepts, Section: \"Authentication, Authorization, and Accounting (AAA)\"."}, {"number": 395, "question": "A company is working with a vendor to perform a penetration test Which of the following includes an estimate about the number of hours required to complete the engagement?", "options": ["SOW", "BPA", "SLA", "NDA"], "answer": "A", "explanation": "A statement of work (SOW) is a document that defines the scope, objectives, deliverables, timeline, and costs of a project or service. It typically includes an estimate of the number of hours required to complete the engagement, as well as the roles and responsibilities of the parties involved. A SOW is often used for penetration testing projects to ensure that both the client and the vendor have a clear and mutual understanding of what is expected and how the work will be performed. A business partnership agreement\n\n(BPA), a service level agreement (SLA), and a non-disclosure agreement (NDA) are different types of contracts that may be related to a penetration testing project, but they do not include an estimate of the number of hours required to complete the engagement. References: CompTIA Security+ Study Guide: Exam\n\nSY0-701, 9th Edition, page 492; What to Look For in a Penetration Testing Statement of Work?"}, {"number": 396, "question": "Select the appropriate attack and remediation from each drop-down list to label the corresponding attack with its remediation.\nINSTRUCTIONS\nNot all attacks and remediation actions will be used.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.", "options": [], "answer": "", "explanation": "Web serverBotnet Enable DDoS protectionUser RAT Implement a host-based IPSDatabase server Worm\n\nChange the default application passwordExecutive KeyloggerDisable vulnerable servicesApplication\n\nBackdoor Implement 2FA using push notification\n\nA screenshot of a computer program Description automatically generated with low confidence"}, {"number": 397, "question": "An engineer needs to find a solution that creates an added layer of security by preventing unauthorized access to internal company resources. Which of the following would be the best solution?", "options": ["RDP server", "Jump server", "Proxy server", "Hypervisor"], "answer": "B", "explanation": ""}, {"number": 398, "question": "Employees located off-site must have access to company resources in order to complete their assigned tasks\nThese employees utilize a solution that allows remote access without interception concerns. Which of the following best describes this solution?", "options": ["Proxy server", "NGFW", "VPN", "Security zone"], "answer": "C", "explanation": "A Virtual Private Network (VPN) is the best solution to allow remote employees secure access to company resources without interception concerns. A VPN establishes an encrypted tunnel over the internet, ensuring that data transferred between remote employees and the company is secure from eavesdropping.\n\nProxy server helps with web content filtering and anonymization but does not provide encrypted access.\n\nNGFW (Next-Generation Firewall) enhances security but is not the primary tool for enabling remote access.\n\nSecurity zone is a network segmentation technique but does not provide remote access capabilities."}, {"number": 399, "question": "A security administrator observed the following in a web server log while investigating an incident:\nWhich of the following attacks did the security administrator most likely see?", "options": ["Privilege escalation", "Credential replay", "Brute force", "Directory traversal"], "answer": "D", "explanation": ""}, {"number": 400, "question": "An administrator needs to perform server hardening before deployment. Which of the following steps should the administrator take? (Select two).", "options": ["Disable default accounts.", "Add the server to the asset inventory.", "Remove unnecessary services.", "Document default passwords.", "Send server logs to the SIEM.", "Join the server to the corporate domain."], "answer": "A C", "explanation": ""}, {"number": 401, "question": "A security analyst receives alerts about an internal system sending a large amount of unusual DNS queries to systems on the internet over short periods of time during non-business hours. Which of the following is most likely occurring?", "options": ["A worm is propagating across the network.", "Data is being exfiltrated.", "A logic bomb is deleting data.", "Ransomware is encrypting files."], "answer": "B", "explanation": "Data exfiltration is a technique that attackers use to steal sensitive data from a target system or network by transmitting it through DNS queries and responses. This method is often used in advanced persistent threat\n\n(APT) attacks, in which attackers seek to persistently evade detection in the target environment. A large amount of unusual DNS queries to systems on the internet over short periods of time during non-business hours is a strong indicator of data exfiltration. A worm, a logic bomb, and ransomware would not use DNS queries to communicate with their command and control servers or perform their malicious actions. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 487; Introduction to\n\nDNS Data Exfiltration; Identifying a DNS Exfiltration Attack That Wasn’t Real — This Time"}, {"number": 402, "question": "A company hired a consultant to perform an offensive security assessment covering penetration testing and social engineering.\nWhich of the following teams will conduct this assessment activity?", "options": ["White", "Purple", "Blue", "Red"], "answer": "D", "explanation": "A red team is a group of security professionals who perform offensive security assessments covering penetration testing and social engineering. A red team simulates real-world attacks and exploits the vulnerabilities of a target organization, system, or network. A red team aims to test the effectiveness of the security controls, policies, and procedures of the target, as well as the awareness and response of the staff and the blue team. A red team can be hired as an external consultant or formed internally within the organization. References = CompTIA Security+ Study Guide with over 500 Practice Test Questions: Exam\n\nSY0-701, 9th Edition, Chapter 1, page 18. CompTIA Security+ (SY0-701) Certification Exam Objectives,\n\nDomain 1.8, page 4. Security Teams – SY0-601 CompTIA Security+ : 1.8"}, {"number": 403, "question": "A data administrator is configuring authentication for a SaaS application and would like to reduce the number of credentials employees need to maintain. The company prefers to use domain credentials to access new\nSaaS applications. Which of the following methods would allow this functionality?", "options": ["SSO", "LEAP", "MFA", "PEAP"], "answer": "A", "explanation": "SSO stands for single sign-on, which is a method of authentication that allows users to access multiple applications or services with one set of credentials. SSO reduces the number of credentials employees need to maintain and simplifies the login process. SSO can also improve security by reducing the risk of password reuse, phishing, and credential theft. SSO can be implemented using various protocols, such as SAML,\n\nOAuth, OpenID Connect, and Kerberos, that enable the exchange of authentication information between different domains or systems. SSO is commonly used for accessing SaaS applications, such as Office 365,\n\nGoogle Workspace, Salesforce, and others, using domain credentials123.\n\nB. LEAP stands for Lightweight Extensible Authentication Protocol, which is a Cisco proprietary protocol that provides authentication for wireless networks. LEAP is not related to SaaS applications or domain credentials4.\n\nC. MFA stands for multi-factor authentication, which is a method of authentication that requires users to provide two or more pieces of evidence to prove their identity. MFA can enhance security by adding an extra layer of protection beyond passwords, such as tokens, biometrics, or codes. MFA is not related to SaaS applications or domain credentials, but it can be used in conjunction with SSO.\n\nD. PEAP stands for Protected Extensible Authentication Protocol, which is a protocol that provides secure authentication for wireless networks. PEAP uses TLS to create an encrypted tunnel between the client and the server, and then uses another authentication method, such as MS-CHAPv2 or EAP-GTC, to verify the user’s identity. PEAP is not related to SaaS applications or domain credentials.\n\nReferences = 1: Security+ (SY0-701) Certification Study Guide | CompTIA IT Certifications 2: What is\n\nSingle Sign-On (SSO)? - Definition from WhatIs.com 3: Single sign-on - Wikipedia 4: Lightweight\n\nExtensible Authentication Protocol - Wikipedia : What is Multi-Factor Authentication (MFA)? - Definition from WhatIs.com : Protected Extensible Authentication Protocol - Wikipedia"}, {"number": 404, "question": "A new security regulation was announced that will take effect in the coming year. A company must comply with it to remain in business. Which of the following activities should the company perform next?", "options": ["Gap analysis", "Policy review", "Security procedure evaluation", "Threat scope reduction"], "answer": "A", "explanation": ""}, {"number": 405, "question": "Which of the following are cases in which an engineer should recommend the decommissioning of a network device? (Select two).", "options": ["The device has been moved from a production environment to a test environment.", "The device is configured to use cleartext passwords.", "The device is moved to an isolated segment on the enterprise network.", "The device is moved to a different location in the enterprise.", "The device's encryption level cannot meet organizational standards.", "The device is unable to receive authorized updates."], "answer": "E", "explanation": "An engineer should recommend the decommissioning of a network device when the device poses a security risk or a compliance violation to the enterprise environment. A device that cannot meet the encryption standards or receive authorized updates is vulnerable to attacks and breaches, and may expose sensitive data or compromise network integrity. Therefore, such a device should be removed from the network and replaced with a more secure and updated one.\n\nReferences\n\nCompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, Chapter 2, Section 2.2, page 671\n\nCompTIA Security+ Practice Tests: Exam SY0-701, 3rd Edition, Chapter 2, Question 16, page 512"}, {"number": 406, "question": "A company wants to ensure secure remote access to its internal network. The company has only one public IP and would like to avoid making any changes to the current network setup. Which of the following solutions would best accomplish this goal?", "options": ["PAT", "IPSec VPN", "Perimeter network", "Reverse proxy"], "answer": "B", "explanation": ""}, {"number": 407, "question": "A security engineer configured a remote access VPN. The remote access VPN allows end users to connect to the network by using an agent that is installed on the endpoint, which establishes an encrypted tunnel. Which of the following protocols did the engineer most likely implement?", "options": ["GRE", "IPSec", "SD-WAN", "EAP"], "answer": "B", "explanation": ""}, {"number": 408, "question": "Which of the following most accurately describes the order in which a security engineer should implement secure baselines?", "options": ["Deploy, maintain, establish", "Establish, maintain, deploy", "Establish, deploy, maintain", "Deploy, establish, maintain"], "answer": "C", "explanation": "Detailed Explanation:The correct sequence is to first establish secure baselines by determining the required configurations, deploy those configurations across systems, and finally maintain the configurations through regular updates and auditing. Reference: CompTIA Security+ SY0-701 Study Guide, Domain 4: Security\n\nOperations, Section: \"Secure Baseline Development\"."}, {"number": 409, "question": "Which of the following is die most important security concern when using legacy systems to provide production service?", "options": ["Instability", "Lack of vendor support", "Loss of availability", "Use of insecure protocols"], "answer": "B", "explanation": "The most important security concern when using legacy systems is the lack of vendor support. Without support from the vendor, systems may not receive critical security patches and updates, leaving them vulnerable to exploitation. This lack of support can result in increased risk of security breaches, as vulnerabilities discovered in the software may never be addressed.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the context of risk management and the challenges posed by legacy systems."}, {"number": 410, "question": "A company installed cameras and added signs to alert visitors that they are being recorded. Which of the following controls did the company implement? (Select two).", "options": ["Directive", "Deterrent", "Preventive", "Detective", "Corrective", "Technical"], "answer": "B D", "explanation": ""}, {"number": 411, "question": "During the onboarding process, an employee needs to create a password for an intranet account. The password must include ten characters, numbers, and letters, and two special characters. Once the password is created, the company will grant the employee access to other company-owned websites based on the intranet profile.\nWhich of the following access management concepts is the company most likely using to safeguard intranet accounts and grant access to multiple sites based on a user's intranet account? (Select two).", "options": ["Federation", "Identity proofing", "Password complexity", "Default password changes", "Password manager", "Open authentication"], "answer": "A C", "explanation": "Federation is an access management concept that allows users to authenticate once and access multiple resources or services across different domains or organizations. Federation relies on a trusted third party that stores the user’s credentials and provides them to the requested resources or services without exposing them.\n\nPassword complexity is a security measure that requires users to create passwords that meet certain criteria, such as length, character types, and uniqueness. Password complexity can help prevent brute-force attacks, password guessing, and credential stuffing by making passwords harder to crack or guess. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 308-309 and 312- 313 1"}, {"number": 412, "question": "A new employee logs in to the email system for the first time and notices a message from human resources about onboarding. The employee hovers over a few of the links within the email and discovers that the links do not correspond to links associated with the company. Which of the following attack vectors is most likely being used?", "options": ["Business email", "Social engineering", "Unsecured network", "Default credentials"], "answer": "B", "explanation": "The employee notices that the links in the email do not correspond to the company's official URLs, indicating that this is likely a social engineering attack. Social engineering involves manipulating individuals into divulging confidential information or performing actions that may compromise security. Phishing emails, like the one described, often contain fraudulent links to trick the recipient into providing sensitive information or downloading malware.\n\nBusiness email refers to business email compromise (BEC), which typically involves impersonating a high- level executive to defraud the company.\n\nUnsecured network is unrelated to the email content.\n\nDefault credentials do not apply here, as the issue is with suspicious links, not login credentials."}, {"number": 413, "question": "After a company was compromised, customers initiated a lawsuit. The company's attorneys have requested that the security team initiate a legal hold in response to the lawsuit. Which of the following describes the action the security team will most likely be required to take?", "options": ["Retain the emails between the security team and affected customers for 30 days.", "Retain any communications related to the security breach until further notice.", "Retain any communications between security members during the breach response.", "Retain all emails from the company to affected customers for an indefinite period of time."], "answer": "B", "explanation": "A legal hold (also known as a litigation hold) is a notification sent from an organization’s legal team to employees instructing them not to delete electronically stored information (ESI) or discard paper documents that may be relevant to a new or imminent legal case. A legal hold is intended to preserve evidence and prevent spoliation, which is the intentional or negligent destruction of evidence that could harm a party’s case. A legal hold can be triggered by various events, such as a lawsuit, a regulatory investigation, or a subpoena12\n\nIn this scenario, the company’s attorneys have requested that the security team initiate a legal hold in response to the lawsuit filed by the customers after the company was compromised. This means that the security team will most likely be required to retain any communications related to the security breach until further notice.\n\nThis could include emails, instant messages, reports, logs, memos, or any other documents that could be relevant to the lawsuit. The security team should also inform the relevant custodians (the employees who have access to or control over the ESI) of their preservation obligations and monitor their compliance. The security team should also document the legal hold process and its scope, as well as take steps to protect the ESI from alteration, deletion, or loss34"}, {"number": 414, "question": "Which of the following actors attacking an organization is the most likely to be motivated by personal beliefs?", "options": ["Nation-state", "Organized crime", "Hacktvist", "Insider threat"], "answer": "C", "explanation": ""}, {"number": 415, "question": "A software development manager wants to ensure the authenticity of the code created by the company. Which of the following options is the most appropriate?", "options": ["Testing input validation on the user input fields", "Performing code signing on company-developed software", "Performing static code analysis on the software", "Ensuring secure cookies are use"], "answer": "B", "explanation": "Code signing is a technique that uses cryptography to verify the authenticity and integrity of the code created by the company. Code signing involves applying a digital signature to the code using a private key that only the company possesses. The digital signature can be verified by anyone who has the corresponding public key, which can be distributed through a trusted certificate authority. Code signing can prevent unauthorized modifications, tampering, or malware injection into the code, and it can also assure the users that the code is from a legitimate source. References = CompTIA Security+ Study Guide with over 500 Practice Test\n\nQuestions: Exam SY0-701, 9th Edition, Chapter 2, page 74. CompTIA Security+ (SY0-701) Certification\n\nExam Objectives, Domain 3.2, page 11. Application Security – SY0-601 CompTIA Security+ : 3.2"}, {"number": 416, "question": "An organization's web servers host an online ordering system. The organization discovers that the servers are vulnerable to a malicious JavaScript injection, which could allow attackers to access customer payment information. Which of the following mitigation strategies would be most effective for preventing an attack on the organization's web servers? (Select two).", "options": ["Regularly updating server software and patches", "Implementing strong password policies", "Encrypting sensitive data at rest and in transit", "Utilizing a web-application firewall", "Performing regular vulnerability scans", "Removing payment information from the servers"], "answer": "A D", "explanation": ""}, {"number": 417, "question": "A systems administrator is changing the password policy within an enterprise environment and wants this update implemented on all systems as quickly as possible. Which of the following operating system security measures will the administrator most likely use?", "options": ["Deploying PowerShell scripts", "Pushing GPO update", "Enabling PAP", "Updating EDR profiles"], "answer": "B", "explanation": "A group policy object (GPO) is a mechanism for applying configuration settings to computers and users in an\n\nActive Directory domain. By pushing a GPO update, the systems administrator can quickly and uniformly enforce the new password policy across all systems in the domain. Deploying PowerShell scripts, enabling\n\nPAP, and updating EDR profiles are not the most efficient or effective ways to change the password policy within an enterprise environment. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 115; Password Policy - Windows Security"}, {"number": 418, "question": "Which of the following is the best way to improve the confidentiality of remote connections to an enterprise's infrastructure?", "options": ["Firewalls", "Virtual private networks", "Extensive logging", "Intrusion detection systems"], "answer": "B", "explanation": "A  encrypts all data transmitted between remote users and the enterprise Virtual Private Network (VPN) (B) infrastructure, ensuring . VPNs are essential in protecting sensitive data from interception over confidentiality untrusted networks.\n\nThis is covered under , where  are listed as a key control for Domain 3.3: Secure network designs VPNs\n\n.ensuring confidentiality of remote connections"}, {"number": 419, "question": "A security analyst is reviewing logs and discovers the following:\nWhich of the following should be used lo best mitigate this type of attack?", "options": ["Input sanitization", "Secure cookies", "Static code analysis", "Sandboxing"], "answer": "A", "explanation": ""}, {"number": 420, "question": "During a recent log review, an analyst discovers evidence of successful injection attacks. Which of the following will best address this issue?", "options": ["Authentication", "Secure cookies", "Static code analysis", "Input validation"], "answer": "D", "explanation": "Input validation (D) is the most effective way to prevent , such as , injection attacks SQL injection, XSS etc. It ensures that only correctly formatted and expected inputs are processed by the application.\n\nThis is clearly identified under , where  is Domain 2.3: Application security techniques input validation listed as a .primary defense against injection attacks"}, {"number": 421, "question": "The security team at a large global company needs to reduce the cost of storing data used for performing investigations. Which of the following types of data should have its retention length reduced?", "options": ["Packet capture", "Endpoint logs", "OS security logs", "Vulnerability scan"], "answer": "A", "explanation": "Packet capture data can be very large and may not need to be stored for extended periods compared to other logs essential for security audits.\n\n================="}, {"number": 422, "question": "Malware spread across a company's network after an employee visited a compromised industry blog. Which of the following best describes this type of attack?", "options": ["Impersonation", "Disinformation", "Watering-hole", "Smishing"], "answer": "C", "explanation": "A watering-hole attack is a type of cyberattack that targets groups of users by infecting websites that they commonly visit. The attackers exploit vulnerabilities to deliver a malicious payload to the organization’s network. The attack aims to infect users’ computers and gain access to a connected corporate network. The attackers target websites known to be popular among members of a particular organization or demographic. The attack differs from phishing and spear-phishing attacks, which typically attempt to steal data or install malware onto users’ devices1\n\nIn this scenario, the compromised industry blog is the watering hole that the attackers used to spread malware across the company’s network. The attackers likely chose this blog because they knew that the employees of the company were interested in its content and visited it frequently. The attackers may have injected malicious code into the blog or redirected the visitors to a spoofed website that hosted the malware. The malware then infected the employees’ computers and propagated to the network.\n\nReferences1: Watering Hole Attacks: Stages, Examples, Risk Factors & Defense …"}, {"number": 423, "question": "Which of the following would best explain why a security analyst is running daily vulnerability scans on all corporate endpoints?", "options": ["To track the status of patching installations", "To find shadow IT cloud deployments", "To continuously the monitor hardware inventory", "To hunt for active attackers in the network"], "answer": "A", "explanation": "Running daily vulnerability scans on all corporate endpoints is primarily done to track the status of patching installations. These scans help identify any missing security patches or vulnerabilities that could be exploited by attackers. Keeping the endpoints up-to-date with the latest patches is critical for maintaining security.\n\nFinding shadow IT cloud deployments and monitoring hardware inventory are better achieved through other tools.\n\nHunting for active attackers would typically involve more real-time threat detection methods than daily vulnerability scans."}, {"number": 424, "question": "A financial institution would like to store its customer data m the cloud but still allow the data to be accessed and manipulated while encrypted. Doing so would prevent the cloud service provider from being able to decipher the data due to its sensitivity. The financial institution Is not concerned about computational overheads and slow speeds. Which of the following cryptographic techniques would best meet the requirement?", "options": ["Asymmetric", "Symmetric", "Homomorphic", "Ephemeral"], "answer": "C", "explanation": "Homomorphic encryption allows data to be encrypted and manipulated without needing to decrypt it first.\n\nThis cryptographic technique would allow the financial institution to store customer data securely in the cloud while still permitting operations like searching and calculations to be performed on the encrypted data. This ensures that the cloud service provider cannot decipher the sensitive data, meeting the institution’s security requirements.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 03 Security Architecture.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Cryptographic Techniques."}, {"number": 425, "question": "An organization wants a third-party vendor to do a penetration test that targets a specific device. The organization has provided basic information about the device. Which of the following best describes this kind of penetration test?", "options": ["Partially known environment", "Unknown environment", "Integrated", "Known environment"], "answer": "A", "explanation": "A partially known environment is a type of penetration test where the tester has some information about the target, such as the IP address, the operating system, or the device type. This can help the tester focus on specific vulnerabilities and reduce the scope of the test. A partially known environment is also called a gray box test1."}, {"number": 426, "question": "A security analyst wants to automate a task that shares data between systems. Which of the following is the best option for the analyst to use?", "options": ["SOAR", "API", "SFTP", "RDP"], "answer": "B", "explanation": "An  or Application Programming Interface is the best option when you want to API (B) automate data between systems. APIs provide structured, secure, and efficient ways for systems to communicate exchange and are widely used in automation and orchestration tasks.\n\nSOAR (A) is used for broader security orchestration and may use APIs under the hood but is more complex.\n\nSFTP (C) is for manual/automated file transfers.\n\nRDP (D) is for remote desktop access, not data automation.\n\nThis is referenced in Domain 1.5: Explain the importance of automation and orchestration in under cybersecurity “Application programming interfaces (APIs).”"}, {"number": 427, "question": "Sine© a recent upgrade (o a WLAN infrastructure, several mobile users have been unable to access the internet from the lobby. The networking team performs a heat map survey of the building and finds several\nWAPs in the area. The WAPs are using similar frequencies with high power settings. Which of the following installation considerations should the security team evaluate next?", "options": ["Channel overlap", "Encryption type", "New WLAN deployment", "WAP placement"], "answer": "A", "explanation": "When multiple Wireless Access Points (WAPs) are using similar frequencies with high power settings, it can cause channel overlap, leading to interference and connectivity issues. This is likely the reason why mobile users are unable to access the internet in the lobby. Evaluating and adjusting the channel settings on the\n\nWAPs to avoid overlap is crucial to resolving the connectivity problems.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly the domain on Wireless and Mobile\n\nSecurity, which covers WLAN deployment considerations."}, {"number": 428, "question": "A client demands at least 99.99% uptime from a service provider's hosted security services. Which of the following documents includes the information the service provider should return to the client?", "options": ["MOA", "SOW", "MOU", "SLA"], "answer": "D", "explanation": "A service level agreement (SLA) is a document that defines the level of service expected by a customer from a service provider, indicating the metrics by which that service is measured, and the remedies or penalties, if any, should the agreed-upon levels not be achieved. An SLA can specify the minimum uptime or availability of a service, such as 99.99%, and the consequences for failing to meet that standard. A memorandum of agreement (MOA), a statement of work (SOW), and a memorandum of understanding (MOU) are other types of documents that can be used to establish a relationship between parties, but they do not typically include the details of service levels and performance metrics that an SLA does. References: CompTIA Security+ Study\n\nGuide: Exam SY0-701, 9th Edition, page 16-17"}, {"number": 429, "question": "The executive management team is mandating the company develop a disaster recovery plan. The cost must be kept to a minimum, and the money to fund additional internet connections is not available. Which of the following would be the best option?", "options": ["Hot site", "Cold site", "Failover site", "Warm site"], "answer": "B", "explanation": ""}, {"number": 430, "question": "Which of the following provides the details about the terms of a test with a third-party penetration tester?", "options": ["Rules of engagement", "Supply chain analysis", "Right to audit clause", "Due diligence"], "answer": "A", "explanation": "Rules of engagement are the detailed guidelines and constraints regarding the execution of information security testing, such as penetration testing. They define the scope, objectives, methods, and boundaries of the test, as well as the roles and responsibilities of the testers and the clients. Rules of engagement help to ensure that the test is conducted in a legal, ethical, and professional manner, and that the results are accurate and reliable. Rules of engagement typically include the following elements:\n\nThe type and scope of the test, such as black box, white box, or gray box, and the target systems, networks, applications, or data.\n\nThe client contact details and the communication channels for reporting issues, incidents, or emergencies during the test.\n\nThe testing team credentials and the authorized tools and techniques that they can use.\n\nThe sensitive data handling and encryption requirements, such as how to store, transmit, or dispose of any data obtained during the test.\n\nThe status meeting and report schedules, formats, and recipients, as well as the confidentiality and non- disclosure agreements for the test results.\n\nThe timeline and duration of the test, and the hours of operation and testing windows.\n\nThe professional and ethical behavior expectations for the testers, such as avoiding unnecessary damage, disruption, or disclosure of information.\n\nSupply chain analysis, right to audit clause, and due diligence are not related to the terms of a test with a third- party penetration tester. Supply chain analysis is the process of evaluating the security and risk posture of the suppliers and partners in a business network. Right to audit clause is a provision in a contract that gives one party the right to audit another party to verify their compliance with the contract terms and conditions. Due diligence is the process of identifying and addressing the cyber risks that a potential vendor or partner brings to an organization.\n\nReferences = https://www.yeahhub.com/every-penetration-tester-you-should-know-about-this-rules-of- engagement/ https://bing.com/search?q=rules+of+engagement+penetration+testing"}, {"number": 431, "question": "Which of the following architecture models ensures that critical systems are physically isolated from the network to prevent access from users with remote access privileges?", "options": ["Segmentation", "Virtualized", "Air-gapped", "Serverless"], "answer": "C", "explanation": "An  system is completely isolated from unsecured networks (like the internet) and other air-gapped (C) systems, preventing any form of remote access. This is often used in highly sensitive environments such as military, nuclear, or critical infrastructure systems.\n\nThis is mentioned under  in the Domain 3.4: Given a scenario, apply cybersecurity resilience concepts , specifically under .CompTIA Security+ SY0-701 Exam Objectives “Isolation (e.g., air-gapped)”"}, {"number": 432, "question": "Which of the following security measures is required when using a cloud-based platform for loT management?", "options": ["Encrypted connection", "Federated identity", "Firewall", "Single sign-on"], "answer": "A", "explanation": ""}, {"number": 433, "question": "An employee receives a text message that appears to have been sent by the payroll department and is asking for credential verification. Which of the following social engineering techniques are being attempted?\n(Choose two.)", "options": ["Typosquatting", "Phishing", "Impersonation", "Vishing", "Smishing", "Misinformation"], "answer": "B E", "explanation": "Smishing is a type of social engineering technique that uses text messages (SMS) to trick victims into revealing sensitive information, clicking malicious links, or downloading malware. Smishing messages often appear to come from legitimate sources, such as banks, government agencies, or service providers, and use urgent or threatening language to persuade the recipients to take action12. In this scenario, the text message that claims to be from the payroll department is an example of smishing.\n\nImpersonation is a type of social engineering technique that involves pretending to be someone else, such as an authority figure, a trusted person, or a colleague, to gain the trust or cooperation of the target. Impersonation can be done through various channels, such as phone calls, emails, text messages, or in- person visits, and can be used to obtain information, access, or money from the victim34. In this scenario, the text message that pretends to be from the payroll department is an example of impersonation.\n\nA. Typosquatting is a type of cyberattack that involves registering domain names that are similar to popular or well-known websites, but with intentional spelling errors or different extensions. Typosquatting aims to exploit the common mistakes that users make when typing web addresses, and redirect them to malicious or fraudulent sites that may steal their information, install malware, or display ads56. Typosquatting is not related to text messages or credential verification.\n\nB. Phishing is a type of social engineering technique that uses fraudulent emails to trick recipients into revealing sensitive information, clicking malicious links, or downloading malware. Phishing emails often mimic the appearance and tone of legitimate organizations, such as banks, retailers, or service providers, and use deceptive or urgent language to persuade the recipients to take action78. Phishing is not related to text messages or credential verification.\n\nD. Vishing is a type of social engineering technique that uses voice calls to trick victims into revealing sensitive information, such as passwords, credit card numbers, or bank account details. Vishing calls often appear to come from legitimate sources, such as law enforcement, government agencies, or technical support, and use scare tactics or false promises to persuade the recipients to comply9 . Vishing is not related to text messages or credential verification.\n\nF. Misinformation is a type of social engineering technique that involves spreading false or misleading information to influence the beliefs, opinions, or actions of the target. Misinformation can be used to manipulate public perception, create confusion, damage reputation, or promote an agenda . Misinformation is not related to text messages or credential verification.\n\nReferences = 1: What is Smishing? | Definition and Examples | Kaspersky 2: Smishing - Wikipedia 3:\n\nImpersonation Attacks: What Are They and How Do You Protect Against Them? 4: Impersonation -\n\nWikipedia 5: What is Typosquatting? | Definition and Examples | Kaspersky 6: Typosquatting -\n\nWikipedia 7: What is Phishing? | Definition and Examples | Kaspersky 8: Phishing - Wikipedia 9: What is\n\nVishing? | Definition and Examples | Kaspersky : Vishing - Wikipedia : What is Misinformation? | Definition and Examples | Britannica : Misinformation - Wikipedia"}, {"number": 434, "question": "In which of the following scenarios is tokenization the best privacy technique 10 use?", "options": ["Providing pseudo-anonymization tor social media user accounts", "Serving as a second factor for authentication requests", "Enabling established customers to safely store credit card Information", "Masking personal information inside databases by segmenting data"], "answer": "C", "explanation": "Tokenization is a process that replaces sensitive data, such as credit card information, with a non-sensitive equivalent (token) that can be used in place of the actual data. This technique is particularly useful in securely storing payment information because the token can be safely stored and transmitted without exposing the original credit card number.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 03 Security Architecture.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Cryptography and Data Protection."}, {"number": 435, "question": "A security analyst reviews domain activity logs and notices the following:\nWhich of the following is the best explanation for what the security analyst has discovered?", "options": ["The user jsmith's account has been locked out.", "A keylogger is installed on [smith's workstation", "An attacker is attempting to brute force ismith's account.", "Ransomware has been deployed in the domain."], "answer": "C", "explanation": "Brute force is a type of attack that tries to guess the password or other credentials of a user account by using a large number of possible combinations. An attacker can use automated tools or scripts to perform a brute force attack and gain unauthorized access to the account. The domain activity logs show that the user ismith has failed to log in 10 times in a row within a short period of time, which is a strong indicator of a brute force attack. The logs also show that the source IP address of the failed logins is different from the usual IP address of ismith, which suggests that the attacker is using a different device or location to launch the attack. The security analyst should take immediate action to block the attacker’s IP address, reset ismith’s password, and notify ismith of the incident. References = CompTIA Security+ Study Guide with over 500 Practice Test\n\nQuestions: Exam SY0-701, 9th Edition, Chapter 1, page 14. CompTIA Security+ (SY0-701) Certification\n\nExam Objectives, Domain 1.1, page 2. Threat Actors and Attributes – SY0-601 CompTIA Security+ : 1.1"}, {"number": 436, "question": "An employee clicked a link in an email from a payment website that asked the employee to update contact information. The employee entered the log-in information but received a “page not found” error message.\nWhich of the following types of social engineering attacks occurred?", "options": ["Brand impersonation", "Pretexting", "Typosquatting", "Phishing"], "answer": "D", "explanation": "Phishing is a type of social engineering attack that involves sending fraudulent emails that appear to be from legitimate sources, such as payment websites, banks, or other trusted entities. The goal of phishing is to trick the recipients into clicking on malicious links, opening malicious attachments, or providing sensitive information, such as log-in credentials, personal data, or financial details. In this scenario, the employee received an email from a payment website that asked the employee to update contact information. The email contained a link that directed the employee to a fake website that mimicked the appearance of the real one.\n\nThe employee entered the log-in information, but received a “page not found” error message. This indicates that the employee fell victim to a phishing attack, and the attacker may have captured the employee’s credentials for the payment website. References = Other Social Engineering Attacks – CompTIA Security+\n\nSY0-701 – 2.2, CompTIA Security+: Social Engineering Techniques & Other Attack … - NICCS, [CompTIA\n\nSecurity+ Study Guide with over 500 Practice Test Questions: Exam SY0-701, 9th Edition]"}, {"number": 437, "question": "Several employees received a fraudulent text message from someone claiming to be the Chief Executive\nOfficer (CEO). The message stated:\n“I’m in an airport right now with no access to email. I need you to buy gift cards for employee recognition awards. Please send the gift cards to following email address.”\nWhich of the following are the best responses to this situation? (Choose two).", "options": ["Cancel current employee recognition gift cards.", "Add a smishing exercise to the annual company training.", "Issue a general email warning to the company.", "Have the CEO change phone numbers.", "Conduct a forensic investigation on the CEO's phone.", "Implement mobile device management."], "answer": "B C", "explanation": "This situation is an example of smishing, which is a type of phishing that uses text messages (SMS) to entice individuals into providing personal or sensitive information to cybercriminals. The best responses to this situation are to add a smishing exercise to the annual company training and to issue a general email warning to the company. A smishing exercise can help raise awareness and educate employees on how to recognize and avoid smishing attacks. An email warning can alert employees to the fraudulent text message and remind them to verify the identity and legitimacy of any requests for information or money. References = What Is\n\nPhishing | Cybersecurity | CompTIA, Phishing – SY0-601 CompTIA Security+ : 1.1 - Professor Messer IT\n\nCertification Training Courses"}, {"number": 438, "question": "An organization is building a new backup data center with cost-benefit as the primary requirement and RTO and RPO values around two days. Which of the following types of sites is the best for this scenario?", "options": ["Real-time recovery", "Hot", "Cold", "Warm"], "answer": "C", "explanation": "A cold site is a type of backup data center that has the necessary infrastructure to support IT operations, but does not have any pre-configured hardware or software. A cold site is the cheapest option among the backup data center types, but it also has the longest recovery time objective (RTO) and recovery point objective\n\n(RPO) values. A cold site is suitable for scenarios where the cost-benefit is the primary requirement and the\n\nRTO and RPO values are not very stringent. A cold site can take up to two days or more to restore the normal operations after a disaster. References = CompTIA Security+ SY0-701 Certification Study Guide, page 387; Backup Types – SY0-601 CompTIA Security+ : 2.5, video at 4:50."}, {"number": 439, "question": "An organization wants to improve the company's security authentication method for remote employees. Given the following requirements:\n• Must work across SaaS and internal network applications\n• Must be device manufacturer agnostic\n• Must have offline capabilities\nWhich of the following would be the most appropriate authentication method?", "options": ["Username and password", "Biometrics", "SMS verification", "Time-based tokens"], "answer": "D", "explanation": ""}, {"number": 440, "question": "A cyber operations team informs a security analyst about a new tactic malicious actors are using to compromise networks.\nSIEM alerts have not yet been configured. Which of the following best describes what the security analyst should do to identify this behavior?", "options": ["[Digital forensics", "E-discovery", "Incident response", "Threat hunting"], "answer": "D", "explanation": "Threat hunting is the process of proactively searching for signs of malicious activity or compromise in a network, rather than waiting for alerts or indicators of compromise (IOCs) to appear. Threat hunting can help identify new tactics, techniques, and procedures (TTPs) used by malicious actors, as well as uncover hidden or stealthy threats that may have evaded detection by security tools. Threat hunting requires a combination of skills, tools, and methodologies, such as hypothesis generation, data collection and analysis, threat intelligence, and incident response. Threat hunting can also help improve the security posture of an organization by providing feedback and recommendations for security improvements. References = CompTIA\n\nSecurity+ Certification Exam Objectives, Domain 4.1: Given a scenario, analyze potential indicators of malicious activity. CompTIA Security+ Study Guide (SY0-701), Chapter 4: Threat Detection and Response, page 153. Threat Hunting – SY0-701 CompTIA Security+ : 4.1, Video 3:18. CompTIA Security+\n\nCertification Exam SY0-701 Practice Test 1, Question 3."}, {"number": 441, "question": "The marketing department set up its own project management software without telling the appropriate departments. Which of the following describes this scenario?", "options": ["Shadow IT", "Insider threat", "Data exfiltration", "Service disruption"], "answer": "A", "explanation": "Shadow IT is the term used to describe the use of unauthorized or unapproved IT resources within an organization. The marketing department set up its own project management software without telling the appropriate departments, such as IT, security, or compliance. This could pose a risk to the organization’s security posture, data integrity, and regulatory compliance1."}, {"number": 442, "question": "A company wants to get alerts when others are researching and doing reconnaissance on the company One approach would be to host a part of the Infrastructure online with known vulnerabilities that would appear to be company assets. Which of the following describes this approach?", "options": ["Watering hole", "Bug bounty", "DNS sinkhole", "Honeypot"], "answer": "D", "explanation": "A honeypot is a security mechanism set up to attract and detect potential attackers by simulating vulnerable assets. By hosting a part of the infrastructure online with known vulnerabilities that appear to be company assets, the company can observe and analyze the behavior of attackers conducting reconnaissance. This approach allows the company to get alerts and gather intelligence on potential threats.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly on threat detection techniques such as honeypots."}, {"number": 443, "question": "A Chief Information Security Officer (CISO) wants to explicitly raise awareness about the increase of ransomware-as-a-service in a report to the management team. Which of the following best describes the threat actor in the CISO's report?", "options": ["Insider threat", "Hacktivist", "Nation-state", "Organized crime"], "answer": "D", "explanation": "Ransomware-as-a-service is a type of cybercrime where hackers sell or rent ransomware tools or services to other criminals who use them to launch attacks and extort money from victims. This is a typical example of organized crime, which is a group of criminals who work together to conduct illegal activities for profit. Organized crime is different from other types of threat actors, such as insider threats, hacktivists, or nation-states, who may have different motives, methods, or targets. References: CompTIA Security+ Study\n\nGuide: Exam SY0-701, 9th Edition, page 17 1"}, {"number": 444, "question": "After reviewing the following vulnerability scanning report:\nServer:192.168.14.6\nService: Telnet\nPort: 23 Protocol: TCP\nStatus: Open Severity: High\nVulnerability: Use of an insecure network protocol\nA security analyst performs the following test: nmap -p 23 192.168.14.6 —script telnet-encryption\nPORT STATE SERVICE REASON 23/tcp open telnet syn-ack\nI telnet encryption: | _ Telnet server supports encryption\nWhich of the following would the security analyst conclude for this reported vulnerability?", "options": ["It is a false positive.", "A rescan is required.", "It is considered noise.", "Compensating controls exist."], "answer": "A", "explanation": "A false positive is a result that indicates a vulnerability or a problem when there is none. In this case, the vulnerability scanning report shows that the telnet service on port 23 is open and uses an insecure network protocol. However, the security analyst performs a test using nmap and a script that checks for telnet encryption support. The result shows that the telnet server supports encryption, which means that the data transmitted between the client and the server can be protected from eavesdropping. Therefore, the reported vulnerability is a false positive and does not reflect the actual security posture of the server. The security analyst should verify the encryption settings of the telnet server and client and ensure that they are configured properly3. References: 3: Telnet Protocol - Can You Encrypt Telnet?"}, {"number": 445, "question": "Which of the following threat actors would most likely deface the website of a high-profile music group?", "options": ["Unskilled attacker", "Organized crime", "Nation-state", "Insider threat"], "answer": "A", "explanation": "Detailed Explanation:An unskilled attacker, often referred to as a script kiddie, is likely to engage in website defacement. This type of attack typically requires minimal expertise and is often conducted for notoriety.\n\nReference: CompTIA Security+ SY0-701 Study Guide, Domain 2: Threats, Section: \"Threat Actors and\n\nMotivations\"."}, {"number": 446, "question": "After creating a contract for IT contractors, the human resources department changed several clauses. The contract has gone through three revisions. Which of the following processes should the human resources department follow to track revisions?", "options": ["Version validation", "Version changes", "Version updates", "Version control"], "answer": "D", "explanation": ""}, {"number": 447, "question": "Which of the following would most likely be deployed to obtain and analyze attacker activity and techniques?", "options": ["Firewall", "IDS", "Honeypot", "Layer 3 switch"], "answer": "C", "explanation": ""}, {"number": 448, "question": "Which of the following best represents an application that does not have an on-premises requirement and is accessible from anywhere?", "options": ["Pass", "Hybrid cloud", "Private cloud", "IaaS", "SaaS"], "answer": "E", "explanation": "Software as a Service (SaaS) represents an application that is hosted in the cloud and accessible via the internet from anywhere, with no requirement for on-premises infrastructure. SaaS applications are managed by a third-party provider, allowing users to access them through a web browser, making them highly scalable and flexible for remote access."}, {"number": 449, "question": "An administrator discovers that some files on a database server were recently encrypted. The administrator sees from the security logs that the data was last accessed by a domain user. Which of the following best describes the type of attack that occurred?", "options": ["Insider threat", "Social engineering", "Watering-hole", "Unauthorized attacker"], "answer": "A", "explanation": "An insider threat is a type of attack that originates from someone who has legitimate access to an organization’ s network, systems, or data. In this case, the domain user who encrypted the files on the database server is an example of an insider threat, as they abused their access privileges to cause harm to the organization. Insider threats can be motivated by various factors, such as financial gain, revenge, espionage, or sabotage."}, {"number": 450, "question": "To which of the following security categories does an EDR solution belong?", "options": ["Physical", "Operational", "Managerial", "Technical"], "answer": "D", "explanation": ""}, {"number": 451, "question": "A security analyst needs to improve the company’s authentication policy following a password audit. Which of the following should be included in the policy? (Select two).", "options": ["Length", "Complexity", "Least privilege", "Something you have", "Security keys", "Biometrics"], "answer": "A B", "explanation": "A strong authentication policy should enforce  (e.g., minimum of 12-16 characters) and password length\n\n(mix of uppercase, lowercase, numbers, and symbols). These measures significantly complexity reduce the\n\n.risk of brute-force attacks\n\nLeast privilege (C) relates to access control, not authentication policies.\n\nSomething you have (D) and  pertain to multi-factor authentication (MFA) but are not biometrics (F) password policy requirements."}, {"number": 452, "question": "An administrator at a small business notices an increase in support calls from employees who receive a blocked page message after trying to navigate to a spoofed website. Which of the following should the administrator do?", "options": ["Deploy multifactor authentication.", "Decrease the level of the web filter settings", "Implement security awareness training.", "Update the acceptable use policy"], "answer": "C", "explanation": "In this scenario, employees are attempting to navigate to spoofed websites, which is being blocked by the web filter. To address this issue, the administrator should implement security awareness training. Training helps employees recognize phishing and other social engineering attacks, reducing the likelihood that they will attempt to access malicious websites in the future.\n\nDeploying multifactor authentication (MFA) would strengthen authentication but does not directly address user behavior related to phishing websites.\n\nDecreasing the level of the web filter would expose the organization to more threats.\n\nUpdating the acceptable use policy may clarify guidelines but is not as effective as hands-on training for improving user behavior."}, {"number": 453, "question": "An administrator is creating a secure method for a contractor to access a test environment. Which of the following would provide the contractor with the best access to the test environment?", "options": ["Application server", "Jump server", "RDP server", "Proxy server"], "answer": "B", "explanation": ""}, {"number": 454, "question": "Company A jointly develops a product with Company B, which is located in a different country. Company A finds out that their intellectual property is being shared with unauthorized companies. Which of the following has been breached?", "options": ["SLA", "AUP", "SOW", "MOA"], "answer": "D", "explanation": "Detailed Explanation:A Memorandum of Agreement (MOA) outlines terms of cooperation, including restrictions on sharing intellectual property. A breach indicates the terms of the agreement were violated, compromising confidentiality or usage terms. Reference: CompTIA Security+ SY0-701 Study Guide, Domain 5: Security Program Management, Section: \"Third-Party Risk Management\"."}, {"number": 455, "question": "Which of the following is a compensating control for providing user access to a high-risk website?", "options": ["Enabling threat prevention features on the firewall", "Configuring a SIEM tool to capture all web traffic", "Setting firewall rules to allow traffic from any port to that destination", "Blocking that website on the endpoint protection software"], "answer": "A", "explanation": ""}, {"number": 456, "question": "A company's Chief Information Security Officer (CISO) wants to enhance the capabilities of the incident response team. The CISO directs the incident response team to deploy a tool that rapidly analyzes host and network data from potentially compromised systems and forwards the data for further review. Which of the following tools should the incident response team deploy?", "options": ["NAC", "IPS", "SIEM", "EDR"], "answer": "D", "explanation": "Comprehensive and Detailed In-Depth Explanation:\n\nAn  solution is designed to Endpoint Detection and Response (EDR) monitor, detect, and respond to\n\n. It , security incidents on endpoints (such as workstations and servers) collects and analyzes data detecting suspicious activity and forwarding relevant information for further investigation.\n\nNetwork Access Control (NAC) (A) enforces network access policies but does not analyze security threats on hosts.\n\nIntrusion Prevention Systems (IPS) (B) detect and block network threats but do not provide deep endpoint analytics.\n\nSecurity Information and Event Management (SIEM) (C) aggregates logs and provides security analytics but lacks direct endpoint detection and response capabilities.\n\nEDR is the best choice for analyzing and responding to endpoint security incidents."}, {"number": 457, "question": "A vendor salesperson is a personal friend of a company’s Chief Financial Officer (CFO). The company recently made a large purchase from the vendor, which was directly approved by the CFO. Which of the following best describes this situation?", "options": ["Rules of engagement", "Conflict of interest", "Due diligence", "Contractual impact", "Reputational damage"], "answer": "B", "explanation": "A  arises when personal relationships or interests could potentially influence conflict of interest (B) professional decisions. In this case, the CFO's friendship with the vendor could improperly affect the procurement decision-making process.\n\nThis scenario falls under Domain 5.3: Explain the importance of frameworks, policies, procedures, and\n\n—specifically under controls “Personnel policies (e.g., conflict of interest, mandatory vacations, job rotation).”"}, {"number": 458, "question": "Which of the following is a benefit of an RTO when conducting a business impact analysis?", "options": ["It determines the likelihood of an incident and its cost.", "It determines the roles and responsibilities for incident responders.", "It determines the state that systems should be restored to following an incident.", "It determines how long an organization can tolerate downtime after an incident."], "answer": "D", "explanation": "Recovery Time Objective (RTO) defines the  before business operations maximum acceptable downtime\n\n. It helps organizations set expectations for recovery speed and prioritize system restoration must be restored accordingly.\n\nA (likelihood of an incident and cost) relates to risk assessment, not RTO.\n\nB (roles and responsibilities) falls under , not RTO.incident response planning\n\nC (state of restored systems) is covered by , not RTO.Recovery Point Objective (RPO)"}, {"number": 459, "question": "The security operations center is researching an event concerning a suspicious IP address A security analyst looks at the following event logs and discovers that a significant portion of the user accounts have experienced faded log-In attempts when authenticating from the same IP address:\nWhich of the following most likely describes attack that took place?", "options": ["Spraying", "Brute-force", "Dictionary", "Rainbow table"], "answer": "A", "explanation": ""}, {"number": 460, "question": "Which of the following allows an exploit to go undetected by the operating system?", "options": ["Firmware vulnerabilities", "Side loading", "Memory injection", "Encrypted payloads"], "answer": "A", "explanation": ""}, {"number": 461, "question": "An enterprise has been experiencing attacks focused on exploiting vulnerabilities in older browser versions with well-known exploits. Which of the following security solutions should be configured to best provide the ability to monitor and block these known signature-based attacks?", "options": ["ACL", "DLP", "IDS", "IPS"], "answer": "D", "explanation": "An intrusion prevention system (IPS) is a security device that monitors network traffic and blocks or modifies malicious packets based on predefined rules or signatures. An IPS can prevent attacks that exploit known vulnerabilities in older browser versions by detecting and dropping the malicious packets before they reach the target system. An IPS can also perform other functions, such as rate limiting, encryption, or redirection. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, Chapter 3: Securing\n\nNetworks, page 132."}, {"number": 462, "question": "A systems administrator creates a script that validates OS version, patch levels, and installed applications when users log in. Which of the following examples best describes the purpose of this script?", "options": ["Resource scaling", "Policy enumeration", "Baseline enforcement", "Guardrails implementation"], "answer": "C", "explanation": "Detailed Explanation:\n\nBaseline enforcement ensures that all systems adhere to predefined security configurations, such as approved\n\nOS versions and patch levels, improving compliance and reducing vulnerabilities. Reference: CompTIA\n\nSecurity+ SY0-701 Study Guide, Domain 4: Security Operations, Section: \"System Baselines and\n\nMonitoring\"."}, {"number": 463, "question": "A security administrator is deploying a DLP solution to prevent the exfiltration of sensitive customer data.\nWhich of the following should the administrator do first?", "options": ["Block access to cloud storage websites.", "Create a rule to block outgoing email attachments.", "Apply classifications to the data.", "Remove all user permissions from shares on the file server."], "answer": "C", "explanation": "Data classification is the process of assigning labels or tags to data based on its sensitivity, value, and risk.\n\nData classification is the first step in a data loss prevention (DLP) solution, as it helps to identify what data needs to be protected and how. By applying classifications to the data, the security administrator can define appropriate policies and rules for the DLP solution to prevent the exfiltration of sensitive customer data. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, Chapter 8: Data Protection, page 323. CompTIA Security+ Practice Tests: Exam SY0-701, 3rd Edition, Chapter 8: Data Protection, page 327."}, {"number": 464, "question": "Which of the following should an internal auditor check for first when conducting an audit of the organization's risk management program?", "options": ["Policies and procedures", "Asset management", "Vulnerability assessment", "Business impact analysts"], "answer": "A", "explanation": ""}, {"number": 465, "question": "A user would like to install software and features that are not available with a smartphone's default software.\nWhich of the following would allow the user to install unauthorized software and enable new features?", "options": ["SOU", "Cross-site scripting", "Jailbreaking", "Side loading"], "answer": "C", "explanation": "Jailbreaking is the process of removing restrictions imposed by the manufacturer on a smartphone, allowing the user to install unauthorized software and features not available through official app stores. This action typically voids the warranty and can introduce security risks by bypassing built-in protections.\n\nSOU (Statement of Understanding) is not related to modifying devices.\n\nCross-site scripting is a web-based attack technique, unrelated to smartphone software.\n\nSide loading refers to installing apps from unofficial sources but without necessarily removing built-in restrictions like jailbreaking does."}, {"number": 466, "question": "A user is attempting to patch a critical system, but the patch fails to transfer. Which of the following access controls is most likely inhibiting the transfer?", "options": ["Attribute-based", "Time of day", "Role-based", "Least privilege"], "answer": "D", "explanation": "The least privilege principle states that users and processes should only have the minimum level of access required to perform their tasks. This helps to prevent unauthorized or unnecessary actions that could compromise security. In this case, the patch transfer might be failing because the user or process does not have the appropriate permissions to access the critical system or the network resources needed for the transfer. Applying the least privilege principle can help to avoid this issue by granting the user or process the necessary access rights for the patching activity. References: CompTIA Security+ Study Guide: Exam SY0- 701, 9th Edition, page 931"}, {"number": 467, "question": "Which of the following would a security administrator use to comply with a secure baseline during a patch update?", "options": ["Information security policy", "Service-level expectations", "Standard operating procedure", "Test result report"], "answer": "C", "explanation": "Detailed Explanation:Standard operating procedures (SOPs) outline the steps to be followed to maintain a secure baseline, such as testing and deploying patches while minimizing risk to the system. Reference:\n\nCompTIA Security+ SY0-701 Study Guide, Domain 4: Security Operations, Section: \"Patch Management and\n\nBaseline Compliance\"."}, {"number": 468, "question": "A systems administrator is working on a solution with the following requirements:\n• Provide a secure zone.\n• Enforce a company-wide access control policy.\n• Reduce the scope of threats.\nWhich of the following is the systems administrator setting up?", "options": ["Zero Trust", "AAA", "Non-repudiation", "CIA"], "answer": "A", "explanation": "Zero Trust is a security model that assumes no trust for any entity inside or outside the network perimeter and requires continuous verification of identity and permissions. Zero Trust can provide a secure zone by isolating and protecting sensitive data and resources from unauthorized access. Zero Trust can also enforce a company- wide access control policy by applying the principle of least privilege and granular segmentation for users, devices, and applications. Zero Trust can reduce the scope of threats by preventing lateral movement and minimizing the attack surface."}, {"number": 469, "question": "A security audit of an organization revealed that most of the IT staff members have domain administrator credentials and do not change the passwords regularly. Which of the following solutions should the security learn propose to resolve the findings in the most complete way?", "options": ["Creating group policies to enforce password rotation on domain administrator credentials", "Reviewing the domain administrator group, removing all unnecessary administrators, and rotating all passwords", "Integrating the domain administrator's group with an IdP and requiring SSO with MFA for all access", "Securing domain administrator credentials in a PAM vault and controlling access with role-based access control"], "answer": "D", "explanation": "Using a Privileged Access Management (PAM) vault to secure domain administrator credentials and enforcing role-based access control (RBAC) is the most comprehensive solution. PAM systems help manage and control access to privileged accounts, ensuring that only authorized personnel can access sensitive credentials. This approach also facilitates password rotation, auditing, and ensures that credentials are not misused or left unchanged. Integrating PAM with RBAC ensures that access is granted based on the user's role, further enhancing security.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 05 Security Program Management and Oversight.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Identity and Access Management."}, {"number": 470, "question": "Which of the following is a common data removal option for companies that want to wipe sensitive data from hard drives in a repeatable manner but allow the hard drives to be reused?", "options": ["Sanitization", "Formatting", "Degaussing", "Defragmentation"], "answer": "A", "explanation": ""}, {"number": 471, "question": "A network manager wants to protect the company's VPN by implementing multifactor authentication that uses:\n. Something you know\n. Something you have\n. Something you are\nWhich of the following would accomplish the manager's goal?", "options": ["Domain name, PKI, GeolP lookup", "VPN IP address, company ID, facial structure", "Password, authentication token, thumbprint", "Company URL, TLS certificate, home address"], "answer": "C", "explanation": "The correct answer is C. Password, authentication token, thumbprint. This combination of authentication factors satisfies the manager’s goal of implementing multifactor authentication that uses something you know, something you have, and something you are.\n\nSomething you know is a type of authentication factor that relies on the user’s knowledge of a secret or personal information, such as a password, a PIN, or a security question. A password is a common example of something you know that can be used to access a VPN12\n\nSomething you have is a type of authentication factor that relies on the user’s possession of a physical object or device, such as a smart card, a token, or a smartphone. An authentication token is a common example of something you have that can be used to generate a one-time password (OTP) or a code that can be used to access a VPN12\n\nSomething you are is a type of authentication factor that relies on the user’s biometric characteristics, such as a fingerprint, a face, or an iris. A thumbprint is a common example of something you are that can be used to scan and verify the user’s identity to access a VPN12"}, {"number": 472, "question": "Which of the following is an algorithm performed to verify that data has not been modified?", "options": ["Hash", "Code check", "Encryption", "Checksum"], "answer": "A", "explanation": "A hash is an algorithm used to verify data integrity by generating a fixed-size string of characters from input data. If even a single bit of the input data changes, the hash value will change, allowing users to detect any modification to the data. Hashing algorithms like SHA-256 and MD5 are commonly used to ensure data has not been altered."}, {"number": 473, "question": "An attacker submits a request containing unexpected characters in an attempt to gain unauthorized access to information within the underlying systems. Which of the following best describes this attack?", "options": ["Side loading", "Target of evaluation", "Resource reuse", "SQL injection"], "answer": "D", "explanation": ""}, {"number": 474, "question": "A systems administrator is redesigning now devices will perform network authentication. The following requirements need to be met:\n• An existing Internal certificate must be used.\n• Wired and wireless networks must be supported\n• Any unapproved device should be Isolated in a quarantine subnet\n• Approved devices should be updated before accessing resources\nWhich of the following would best meet the requirements?", "options": ["802.IX", "EAP", "RADIUS", "WPA2"], "answer": "A", "explanation": ""}, {"number": 475, "question": "A security manager is implementing MFA and patch management. Which of the following would best describe the control type and category? (Select two).", "options": ["Physical", "Managerial", "Detective", "Administrator", "Preventative", "Technical"], "answer": "E F", "explanation": "Multi-Factor Authentication (MFA) and patch management are both examples of preventative and technical controls. MFA prevents unauthorized access by requiring multiple forms of verification, and patch management ensures that systems are protected against vulnerabilities by applying updates. Both of these controls are implemented using technical methods, and they work to prevent security incidents before they occur."}, {"number": 476, "question": "A company processes and stores sensitive data on its own systems. Which of the following steps should the company take first to ensure compliance with privacy regulations?", "options": ["Implement access controls and encryption.", "Develop and provide training on data protection policies.", "Create incident response and disaster recovery plans.", "Purchase and install security software."], "answer": "A", "explanation": ""}, {"number": 477, "question": "Which of the following best protects sensitive data in transit across a geographically dispersed Infrastructure?", "options": ["Encryption", "Masking", "Tokenization", "Obfuscation"], "answer": "A", "explanation": ""}, {"number": 478, "question": "A small business uses kiosks on the sales floor to display product information for customers. A security team discovers the kiosks use end-of-life operating systems. Which of the following is the security team most likely to document as a security implication of the current architecture?", "options": ["Patch availability", "Product software compatibility", "Ease of recovery", "Cost of replacement"], "answer": "A", "explanation": "End-of-life operating systems are those that are no longer supported by the vendor or manufacturer, meaning they do not receive any security updates or patches. This makes them vulnerable to exploits and attacks that take advantage of known or unknown flaws in the software. Patch availability is the security implication of using end-of-life operating systems, as it affects the ability to fix or prevent security issues. Other factors, such as product software compatibility, ease of recovery, or cost of replacement, are not directly related to security, but rather to functionality, availability, or budget. References: CompTIA Security+ Study Guide:\n\nExam SY0-701, 9th Edition, page 29 1"}, {"number": 479, "question": "A penetration tester begins an engagement by performing port and service scans against the client environment according to the rules of engagement. Which of the following reconnaissance types is the tester performing?", "options": ["Active", "Passive", "Defensive", "Offensive"], "answer": "A", "explanation": "Active reconnaissance is a type of reconnaissance that involves sending packets or requests to a target and analyzing the responses. Active reconnaissance can reveal information such as open ports, services, operating systems, and vulnerabilities. However, active reconnaissance is also more likely to be detected by the target or its security devices, such as firewalls or intrusion detection systems. Port and service scans a
