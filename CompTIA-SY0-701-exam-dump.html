 ensures that any changes to the network are authorized, documented, and communicated, but it does not guarantee that the changes are error-free or functional. The technician still needs to test the policy before implementing it.\n\nDisabling any intrusion prevention signatures on the ‘deny any’ policy prior to enabling the new policy would not prevent the issue, and it could reduce the security of the network. Intrusion prevention signatures are patterns that identify malicious or unwanted traffic, and allow the firewall to block or alert on such traffic.\n\nDisabling these signatures would make the firewall less effective in detecting and preventing attacks, and it would not affect the reachability of the company servers.\n\nIncluding an ‘allow any’ policy above the ‘deny any’ policy would not prevent the issue, and it would render the ‘deny any’ policy useless. A firewall policy is processed from top to bottom, and the first matching rule is applied. An ‘allow any’ policy would match any traffic and allow it to pass through the firewall, regardless of the source, destination, or protocol. This would negate the purpose of the ‘deny any’ policy, which is to block any traffic that does not match any of the previous rules. Moreover, an ‘allow any’ policy would create a security risk, as it would allow any unauthorized or malicious traffic to enter or exit the network. References = CompTIA Security+ SY0-701 Certification Study Guide, page 204-205; Professor\n\nMesser’s CompTIA SY0-701 Security+ Training Course, video 2.1 - Network Security Devices, 8:00 - 10:00."}, {"number": 318, "question": "A newly appointed board member with cybersecurity knowledge wants the board of directors to receive a quarterly report detailing the number of incidents that impacted the organization. The systems administrator is creating a way to present the data to the board of directors. Which of the following should the systems administrator use?", "options": ["Packet captures", "Vulnerability scans", "Metadata", "Dashboard"], "answer": "D", "explanation": "A dashboard is a graphical user interface that provides a visual representation of key performance indicators, metrics, and trends related to security events and incidents. A dashboard can help the board of directors to understand the number and impact of incidents that affected the organization in a given period, as well as the status and effectiveness of the security controls and processes. A dashboard can also allow the board of directors to drill down into specific details or filter the data by various criteria12.\n\nA packet capture is a method of capturing and analyzing the network traffic that passes through a device or a network segment. A packet capture can provide detailed information about the source, destination, protocol, and content of each packet, but it is not a suitable way to present a summary of incidents to the board of directors13.\n\nA vulnerability scan is a process of identifying and assessing the weaknesses and exposures in a system or a network that could be exploited by attackers. A vulnerability scan can help the organization to prioritize and remediate the risks and improve the security posture, but it is not a relevant way to report the number of incidents that occurred in a quarter14.\n\nMetadata is data that describes other data, such as its format, origin, structure, or context. Metadata can provide useful information about the characteristics and properties of data, but it is not a meaningful way to communicate the impact and frequency of incidents to the board of directors. References = 1: CompTIA\n\nSecurity+ SY0-701 Certification Study Guide, page 3722: SIEM Dashboards – SY0-601 CompTIA Security+ : 4.3, video by Professor Messer3: CompTIA Security+ SY0-701 Certification Study Guide, page 3464:\n\nCompTIA Security+ SY0-701 Certification Study Guide, page 362. : CompTIA Security+ SY0-701\n\nCertification Study Guide, page 97."}, {"number": 319, "question": "Which of the following activities should a systems administrator perform to quarantine a potentially infected system?", "options": ["Move the device into an air-gapped environment.", "Disable remote log-in through Group Policy.", "Convert the device into a sandbox.", "Remote wipe the device using the MDM platform."], "answer": "A", "explanation": "Detailed Explanation:Quarantining a potentially infected system by placing it into an air-gapped environment physically disconnects it from the network. This prevents the spread of malware while maintaining the integrity of forensic evidence. Reference: CompTIA Security+ SY0-701 Study Guide, Domain 4: Security\n\nOperations, Section: \"Incident Response and Containment\"."}, {"number": 320, "question": "Which of the following agreements defines response time, escalation, and performance metrics?", "options": ["BPA", "MOA", "NDA", "SLA"], "answer": "D", "explanation": "An  or Service Level Agreement is a formal contract that defines , including SLA (D) performance standards , and other service-related metrics.response times, escalation procedures, uptime guarantees\n\nThis is referenced in  under Domain 5.2: Explain the importance of managing third-party risk\n\n“Agreements (e.g., SLA, NDA, MOU/MOA, BPA).”"}, {"number": 321, "question": "A company has a website in a server cluster. One server is experiencing very high usage, while others are nearly unused. Which of the following should the company configure to help distribute traffic quickly?", "options": ["Server multiprocessing", "Warm site", "Load balancer", "Proxy server"], "answer": "C", "explanation": "Comprehensive and Detailed In-Depth Explanation:\n\nA  distributes incoming traffic evenly across multiple servers to prevent any single server from load balancer becoming overloaded. This ensures  of the high availability, scalability, and optimal performance company's website.\n\nServer multiprocessing (A) refers to the use of multiple processors within a single server but does not distribute traffic across multiple servers.\n\nA warm site (B) is a disaster recovery strategy, not a method for balancing real-time traffic.\n\nA proxy server (D) acts as an intermediary between users and web services but does not distribute server load.\n\nUsing a  allows for .load balancer efficient traffic management and prevents server overload"}, {"number": 322, "question": "A security analyst is reviewing alerts in the SIEM related to potential malicious network traffic coming from an employee’s corporate laptop. The security analyst has determined that additional data about the executable running on the machine is necessary to continue the investigation. Which of the following logs should the analyst use as a data source?", "options": ["Application", "IPS/IDS", "Network", "Endpoint"], "answer": "D", "explanation": "An endpoint log is a file that contains information about the activities and events that occur on an end-user device, such as a laptop, desktop, tablet, or smartphone. Endpoint logs can provide valuable data for security analysts, such as the processes running on the device, the network connections established, the files accessed or modified, the user actions performed, and the applications installed or updated. Endpoint logs can also record the details of any executable files running on the device, such as the name, path, size, hash, signature, and permissions of the executable.\n\nAn application log is a file that contains information about the events that occur within a software application, such as errors, warnings, transactions, or performance metrics. Application logs can help developers and administrators troubleshoot issues, optimize performance, and monitor user behavior. However, application logs may not provide enough information about the executable files running on the device, especially if they are malicious or unknown.\n\nAn IPS/IDS log is a file that contains information about the network traffic that is monitored and analyzed by an intrusion prevention system (IPS) or an intrusion detection system (IDS). IPS/IDS logs can help security analysts identify and block potential attacks, such as exploit attempts, denial-of-service (DoS) attacks, or malicious scans. However, IPS/IDS logs may not provide enough information about the executable files running on the device, especially if they are encrypted, obfuscated, or use legitimate protocols.\n\nA network log is a file that contains information about the network activity and communication that occurs between devices, such as IP addresses, ports, protocols, packets, or bytes. Network logs can help security analysts understand the network topology, traffic patterns, and bandwidth usage. However, network logs may not provide enough information about the executable files running on the device, especially if they are hidden, spoofed, or use proxy servers.\n\nTherefore, the best log type to use as a data source for additional information about the executable running on the machine is the endpoint log, as it can provide the most relevant and detailed data about the executable file and its behavior.\n\nReferences =  https://www.crowdstrike.com/cybersecurity-101/observability/application-log/ https://owasp.org/www-project-proactive-controls/v3/en/c9-security-logging"}, {"number": 323, "question": "A company is considering an expansion of access controls for an application that contractors and internal employees use to reduce costs. Which of the following risk elements should the implementation team understand before granting access to the application?", "options": ["Threshold", "Appetite", "Tolerance", "Register"], "answer": "C", "explanation": ""}, {"number": 324, "question": "A systems administrator needs to encrypt all data on employee laptops. Which of the following encryption levels should be implemented?", "options": ["Volume", "Partition", "Full disk", "File"], "answer": "C", "explanation": ""}, {"number": 325, "question": "Which of the following is the best way to prevent an unauthorized user from plugging a laptop into an employee's phone network port and then using tools to scan for database servers?", "options": ["MAC filtering", "Segmentation", "Certification", "Isolation"], "answer": "A", "explanation": "Detailed Explanation:MAC filtering allows network administrators to control device access by specifying allowed MAC addresses. This prevents unauthorized devices, such as a laptop plugged into a network port, from gaining access. Reference: CompTIA Security+ SY0-701 Study Guide, Domain 2: Threats and\n\nVulnerabilities, Section: \"Network Access Control Methods\"."}, {"number": 326, "question": "After failing an audit twice, an organization has been ordered by a government regulatory agency to pay fines.\nWhich of the following caused this action?", "options": ["Non-compliance", "Contract violations", "Government sanctions", "Rules of engagement"], "answer": "A", "explanation": ""}, {"number": 327, "question": "A security analyst and the management team are reviewing the organizational performance of a recent phishing campaign. The user click-through rate exceeded the acceptable risk threshold, and the management team wants to reduce the impact when a user clicks on a link in a phishing message. Which of the following should the analyst do?", "options": ["Place posters around the office to raise awareness of common phishing activities.", "Implement email security filters to prevent phishing emails from being delivered", "Update the EDR policies to block automatic execution of downloaded programs.", "Create additional training for users to recognize the signs of phishing attempts."], "answer": "C", "explanation": "An endpoint detection and response (EDR) system is a security tool that monitors and analyzes the activities and behaviors of endpoints, such as computers, laptops, mobile devices, and servers. An EDR system can detect, prevent, and respond to various types of threats, such as malware, ransomware, phishing, and advanced persistent threats (APTs). One of the features of an EDR system is to block the automatic execution of downloaded programs, which can prevent malicious code from running on the endpoint when a user clicks on a link in a phishing message. This can reduce the impact of a phishing attack and protect the endpoint from compromise. Updating the EDR policies to block automatic execution of downloaded programs is a technical control that can mitigate the risk of phishing, regardless of the user’s awareness or behavior. Therefore, this is the best answer among the given options.\n\nThe other options are not as effective as updating the EDR policies, because they rely on administrative or physical controls that may not be sufficient to prevent or stop a phishing attack. Placing posters around the office to raise awareness of common phishing activities is a physical control that can increase the user’s knowledge of phishing, but it may not change their behavior or prevent them from clicking on a link in a phishing message. Implementing email security filters to prevent phishing emails from being delivered is an administrative control that can reduce the exposure to phishing, but it may not be able to block all phishing emails, especially if they are crafted to bypass the filters. Creating additional training for users to recognize the signs of phishing attempts is an administrative control that can improve the user’s skills of phishing detection, but it may not guarantee that they will always be vigilant or cautious when receiving an email.\n\nTherefore, these options are not the best answer for this question. References = Endpoint Detection and\n\nResponse – CompTIA Security+ SY0-701 – 2.2, video at 5:30; CompTIA Security+ SY0-701 Certification\n\nStudy Guide, page 163."}, {"number": 328, "question": "Which of the following describes the category of data that is most impacted when it is lost?", "options": ["Confidential", "Public", "Private", "Critical"], "answer": "D", "explanation": ""}, {"number": 329, "question": "A security engineer is working to address the growing risks that shadow IT services are introducing to the organization. The organization has taken a cloud-first approach end does not have an on-premises IT infrastructure. Which of the following would best secure the organization?", "options": ["Upgrading to a next-generation firewall", "Deploying an appropriate in-line CASB solution", "Conducting user training on software policies", "Configuring double key encryption in SaaS platforms"], "answer": "B", "explanation": "A Cloud Access Security Broker (CASB) solution is the most suitable option for securing an organization that has adopted a cloud-first strategy and does not have an on-premises IT infrastructure. CASBs provide visibility and control over shadow IT services, enforce security policies, and protect data across cloud services.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of cloud security and managing risks associated with shadow IT."}, {"number": 330, "question": "A company is required to use certified hardware when building networks. Which of the following best addresses the risks associated with procuring counterfeit hardware?", "options": ["A thorough analysis of the supply chain", "A legally enforceable corporate acquisition policy", "A right to audit clause in vendor contracts and SOWs", "An in-depth penetration test of all suppliers and vendors"], "answer": "A", "explanation": "Counterfeit hardware is hardware that is built or modified without the authorization of the original equipment manufacturer (OEM). It can pose serious risks to network quality, performance, safety, and reliability12. Counterfeit hardware can also contain malicious components that can compromise the security of the network and the data that flows through it3. To address the risks associated with procuring counterfeit hardware, a company should conduct a thorough analysis of the supply chain, which is the network of entities involved in the production, distribution, and delivery of the hardware. By analyzing the supply chain, the company can verify the origin, authenticity, and integrity of the hardware, and identify any potential sources of counterfeit or tampered products. A thorough analysis of the supply chain can include the following steps:\n\nEstablishing a trusted relationship with the OEM and authorized resellers\n\nRequesting documentation and certification of the hardware from the OEM or authorized resellers\n\nInspecting the hardware for any signs of tampering, such as mismatched labels, serial numbers, or components\n\nTesting the hardware for functionality, performance, and security\n\nImplementing a tracking system to monitor the hardware throughout its lifecycle\n\nReporting any suspicious or counterfeit hardware to the OEM and law enforcement agencies References = 1: Identify Counterfeit and Pirated Products - Cisco, 2: What Is Hardware Security?\n\nDefinition, Threats, and Best Practices, 3: Beware of Counterfeit Network Equipment - TechNewsWorld, :\n\nCounterfeit Hardware: The Threat and How to Avoid It"}, {"number": 331, "question": "A human resources (HR) employee working from home leaves their company laptop open on the kitchen table. A family member walking through the kitchen reads an email from the Chief Financial Officer addressed to the HR department. The email contains information referencing company layoffs. The family member posts the content of the email to social media. Which of the following policies will the HR employee most likely need to review after this incident?", "options": ["Hybrid work environment", "Operations security", "Data loss prevention", "Social engineering"], "answer": "B", "explanation": "Comprehensive and Detailed In-Depth Explanation:\n\nOperations security (OPSEC) focuses on identifying and protecting sensitive information to prevent unauthorized disclosure. In this scenario, the HR employee failed to safeguard confidential company information, leading to its exposure on social media.\n\nTraining in OPSEC would reinforce the need to maintain security best practices, such as locking screens when away from a device and ensuring that sensitive data is not exposed in unsecured locations.\n\nHybrid work environment policies relate to managing remote and in-office work but do not specifically cover security risks like unauthorized data exposure.\n\nData loss prevention (DLP) deals with technology-based solutions to prevent unauthorized data transfers but does not address physical security practices.\n\nSocial engineering refers to deceptive tactics used by attackers to manipulate individuals, which is not applicable to this situation.\n\nThe HR employee should review  policies to prevent similar incidents in the future.operations security"}, {"number": 332, "question": "Which of the following agreement types defines the time frame in which a vendor needs to respond?", "options": ["SOW", "SLA", "MOA", "MOU"], "answer": "B", "explanation": "A service level agreement (SLA) is a type of agreement that defines the expectations and responsibilities between a service provider and a customer. It usually includes the quality, availability, and performance metrics of the service, as well as the time frame in which the provider needs to respond to service requests, incidents, or complaints. An SLA can help ensure that the customer receives the desired level of service and that the provider is accountable for meeting the agreed-upon standards."}, {"number": 333, "question": "A visitor plugs a laptop into a network jack in the lobby and is able to connect to the company's network.\nWhich of the following should be configured on the existing network infrastructure to best prevent this activity?", "options": ["Port security", "Web application firewall", "Transport layer security", "Virtual private network"], "answer": "A", "explanation": "Port security is the best solution to prevent unauthorized devices, like a visitor's laptop, from connecting to the company’s network. Port security can limit the number of devices that can connect to a network switch port and block unauthorized MAC addresses, effectively stopping unauthorized access attempts.\n\nWeb application firewall (WAF) protects against web-based attacks, not unauthorized network access.\n\nTransport Layer Security (TLS) ensures encrypted communication but does not manage physical network access.\n\nVirtual Private Network (VPN) secures remote connections but does not control access through physical network ports."}, {"number": 334, "question": "A vendor needs to remotely and securely transfer files from one server to another using the command line.\nWhich of the following protocols should be Implemented to allow for this type of access? (Select two).", "options": ["SSH", "SNMP", "RDP", "S/MIME", "SMTP", "SFTP"], "answer": "A F", "explanation": "Secure Shell (SSH) is a protocol used for secure command-line access to remote systems, while Secure File\n\nTransfer Protocol (SFTP) is an extension of SSH used specifically for securely transferring files. Both SSH and SFTP ensure that data is encrypted during transmission, protecting it from interception or tampering.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 03 Security Architecture.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Secure Protocols and Encryption."}, {"number": 335, "question": "Which of the following best describes why me SMS DIP authentication method is more risky to implement than the TOTP method?", "options": ["The SMS OTP method requires an end user to have an active mobile telephone service and SIM card.", "Generally. SMS OTP codes are valid for up to 15 minutes while the TOTP time frame is 30 to 60 seconds", "The SMS OTP is more likely to be intercepted and lead to unauthorized disclosure of the code than the", "TOTP method.", "The algorithm used to generate on SMS OTP code is weaker than the one used to generate a TOTP code"], "answer": "C", "explanation": "The SMS OTP (One-Time Password) method is more vulnerable to interception compared to TOTP (Time- based One-Time Password) because SMS messages can be intercepted through various attack vectors like\n\nSIM swapping or SMS phishing. TOTP, on the other hand, generates codes directly on the device and does not rely on a communication channel like SMS, making it less susceptible to interception.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of identity and access management.\n\n==============="}, {"number": 336, "question": "The private key for a website was stolen, and a new certificate has been issued. Which of the following needs to be updated next?", "options": ["SCEP", "CRL", "OCSP", "CSR"], "answer": "B", "explanation": ""}, {"number": 337, "question": "An IT manager is increasing the security capabilities of an organization after a data classification initiative determined that sensitive data could be exfiltrated from the environment. Which of the following solutions would mitigate the risk?", "options": ["XDR", "SPF", "DLP", "DMARC"], "answer": "C", "explanation": "To mitigate the risk of sensitive data being exfiltrated from the environment, the IT manager should implement a Data Loss Prevention (DLP) solution. DLP monitors and controls the movement of sensitive data, ensuring that unauthorized transfers are blocked and potential data breaches are prevented.\n\nXDR (Extended Detection and Response) is useful for threat detection across multiple environments but doesn't specifically address data exfiltration.\n\nSPF (Sender Policy Framework) helps prevent email spoofing, not data exfiltration.\n\nDMARC (Domain-based Message Authentication, Reporting & Conformance) also addresses email security and spoofing, not data exfiltration."}, {"number": 338, "question": "A systems administrator needs to ensure the secure communication of sensitive data within the organization's private cloud. Which of the following is the best choice for the administrator to implement?", "options": ["IPSec", "SHA-1", "RSA", "TGT"], "answer": "A", "explanation": ""}, {"number": 339, "question": "Which of the following describes the procedures a penetration tester must follow while conducting a test?", "options": ["Rules of engagement", "Rules of acceptance", "Rules of understanding", "Rules of execution"], "answer": "A", "explanation": "Detailed Explanation:Rules of engagement specify the agreed-upon boundaries, scope, and procedures for a penetration test to ensure compliance and avoid disruption to the environment. Reference: CompTIA\n\nSecurity+ SY0-701 Study Guide, Domain 4: Security Operations, Section: \"Penetration Testing Procedures\"."}, {"number": 340, "question": "A penetration test has demonstrated that domain administrator accounts were vulnerable to pass-the-hash attacks. Which of the following would have been the best strategy to prevent the threat actor from using domain administrator accounts?", "options": ["Audit each domain administrator account weekly for password compliance.", "Implement a privileged access management solution.", "Create IDS policies to monitor domain controller access.", "Use Group Policy to enforce password expiration."], "answer": "B", "explanation": "Detailed Explanation:Privileged access management (PAM) solutions effectively mitigate pass-the-hash attacks by enforcing least privilege and session management for administrative accounts. These tools restrict how and when credentials can be accessed, thereby reducing attack surfaces. Reference: CompTIA Security+\n\nSY0-701 Study Guide, Domain 2: Vulnerabilities, Section: \"Mitigation Techniques\"."}, {"number": 341, "question": "Which of the following is the best way to secure an on-site data center against intrusion from an insider?", "options": ["Bollards", "Access badge", "Motion sensor", "Video surveillance"], "answer": "B", "explanation": ""}, {"number": 342, "question": "Users at a company are reporting they are unable to access the URL for a new retail website because it is flagged as gambling and is being blocked.\nWhich of the following changes would allow users to access the site?", "options": ["Creating a firewall rule to allow HTTPS traffic", "Configuring the IPS to allow shopping", "Tuning the DLP rule that detects credit card data", "Updating the categorization in the content filter"], "answer": "D", "explanation": "A content filter is a device or software that blocks or allows access to web content based on predefined rules or categories. In this case, the new retail website is mistakenly categorized as gambling by the content filter, which prevents users from accessing it. To resolve this issue, the content filter’s categorization needs to be updated to reflect the correct category of the website, such as shopping or retail. This will allow the content filter to allow access to the website instead of blocking it."}, {"number": 343, "question": "Various company stakeholders meet to discuss roles and responsibilities in the event of a security breach affecting offshore offices. Which of the following is this an example of?", "options": ["Tabletop exercise", "Penetration test", "Geographic dispersion", "Incident response"], "answer": "A", "explanation": "Detailed Explanation:\n\nA tabletop exercise is a discussion-based activity where stakeholders simulate a security breach scenario to identify gaps in response plans and clarify roles and responsibilities. Reference: CompTIA Security+ SY0- 701 Study Guide, Domain 5: Security Program Management, Section: \"Incident Response Planning and\n\nExercises\"."}, {"number": 344, "question": "Which of the following is the best way to consistently determine on a daily basis whether security settings on servers have been modified?", "options": ["Automation", "Compliance checklist", "Attestation", "Manual audit"], "answer": "A", "explanation": "Automation is the best way to consistently determine on a daily basis whether security settings on servers have been modified. Automation is the process of using software, hardware, or other tools to perform tasks that would otherwise require human intervention or manual effort. Automation can help to improve the efficiency, accuracy, and consistency of security operations, as well as reduce human errors and costs.\n\nAutomation can be used to monitor, audit, and enforce security settings on servers, such as firewall rules, encryption keys, access controls, patch levels, and configuration files. Automation can also alert security personnel of any changes or anomalies that may indicate a security breach or compromise12.\n\nThe other options are not the best ways to consistently determine on a daily basis whether security settings on servers have been modified:\n\nCompliance checklist: This is a document that lists the security requirements, standards, or best practices that an organization must follow or adhere to. A compliance checklist can help to ensure that the security settings on servers are aligned with the organizational policies and regulations, but it does not automatically detect or report any changes or modifications that may occur on a daily basis3.\n\nAttestation: This is a process of verifying or confirming the validity or accuracy of a statement, claim, or fact. Attestation can be used to provide assurance or evidence that the security settings on servers are correct and authorized, but it does not continuously monitor or audit any changes or modifications that may occur on a daily basis4.\n\nManual audit: This is a process of examining or reviewing the security settings on servers by human inspectors or auditors. A manual audit can help to identify and correct any security issues or discrepancies on servers, but it is time-consuming, labor-intensive, and prone to human errors. A manual audit may not be feasible or practical to perform on a daily basis.\n\nReferences = 1: CompTIA Security+ SY0-701 Certification Study Guide, page 1022: Automation and\n\nScripting – CompTIA Security+ SY0-701 – 5.1, video by Professor Messer3: CompTIA Security+ SY0-701\n\nCertification Study Guide, page 974: CompTIA Security+ SY0-701 Certification Study Guide, page 98. :\n\nCompTIA Security+ SY0-701 Certification Study Guide, page 99."}, {"number": 345, "question": "An engineer moved to another team and is unable to access the new team's shared folders while still being able to access the shared folders from the former team. After opening a ticket, the engineer discovers that the account was never moved to the new group. Which of the following access controls is most likely causing the lack of access?", "options": ["Role-based", "Discretionary", "Time of day", "Least privilege"], "answer": "A", "explanation": ""}, {"number": 346, "question": "An organization is looking to optimize its environment and reduce the number of patches necessary for operating systems. Which of the following will best help to achieve this objective?", "options": ["Microservices", "Virtualization", "Real-time operating system", "Containers"], "answer": "D", "explanation": ""}, {"number": 347, "question": "Security controls in a data center are being reviewed to ensure data is properly protected and that human life considerations are included. Which of the following best describes how the controls should be set up?", "options": ["Remote access points should fail closed.", "Logging controls should fail open.", "Safety controls should fail open.", "Logical security controls should fail closed."], "answer": "C", "explanation": "Safety controls are security controls that are designed to protect human life and physical assets from harm or damage. Examples of safety controls include fire alarms, sprinklers, emergency exits, backup generators, and surge protectors. Safety controls should fail open, which means that they should remain operational or allow access when a failure or error occurs. Failing open can prevent or minimize the impact of a disaster, such as a fire, flood, earthquake, or power outage, on human life and physical assets. For example, if a fire alarm fails, it should still trigger the sprinklers and unlock the emergency exits, rather than remain silent and locked.\n\nFailing open can also ensure that essential services, such as healthcare, transportation, or communication, are available during a crisis. Remote access points, logging controls, and logical security controls are other types of security controls, but they should not fail open in a data center. Remote access points are security controls that allow users or systems to access a network or a system from a remote location, such as a VPN, a web portal, or a wireless access point. Remote access points should fail closed, which means that they should deny access when a failure or error occurs. Failing closed can prevent unauthorized or malicious access to the data center’s network or systems, such as by hackers, malware, or rogue devices. Logging controls are security controls that record and monitor the activities and events that occur on a network or a system, such as user actions, system errors, security incidents, or performance metrics. Logging controls should also fail closed, which means that they should stop or suspend the activities or events when a failure or error occurs. Failing closed can prevent data loss, corruption, or tampering, as well as ensure compliance with regulations and standards. Logical security controls are security controls that use software or code to protect data and systems from unauthorized or malicious access, modification, or destruction, such as encryption, authentication, authorization, or firewall. Logical security controls should also fail closed, which means that they should block or restrict access when a failure or error occurs. Failing closed can prevent data breaches, cyberattacks, or logical flaws, as well as ensure confidentiality, integrity, and availability of data and systems. References:\n\nCompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 142-143, 372-373, 376-377"}, {"number": 348, "question": "An administrator is Investigating an incident and discovers several users’ computers were Infected with malware after viewing files mat were shared with them. The administrator discovers no degraded performance in the infected machines and an examination of the log files does not show excessive failed logins. Which of the following attacks Is most likely the cause of the malware?", "options": ["Malicious flash drive", "Remote access Trojan", "Brute-forced password", "Cryptojacking"], "answer": "D", "explanation": "Cryptojacking is the likely cause in this scenario. It involves malware that hijacks the resources of infected computers to mine cryptocurrency, usually without the user's knowledge. This type of attack doesn't typically degrade performance significantly or result in obvious system failures, which matches the situation described, where the machines showed no signs of degraded performance or excessive failed logins.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Cryptojacking is covered under types of malware attacks, highlighting its stealthy nature and impact on infected systems."}, {"number": 349, "question": "A network engineer is increasing the overall security of network devices and needs to harden the devices.\nWhich of the following will best accomplish this task?", "options": ["Configuring centralized logging", "Generating local administrator accounts", "Replacing Telnet with SSH", "Enabling HTTP administration"], "answer": "C", "explanation": ""}, {"number": 350, "question": "A security analyst discovers that a large number of employee credentials had been stolen and were being sold on the dark web. The analyst investigates and discovers that some hourly employee credentials were compromised, but salaried employee credentials were not affected.\nMost employees clocked in and out while they were Inside the building using one of the kiosks connected to the network. However, some clocked out and recorded their time after leaving to go home. Only those who clocked in and out while Inside the building had credentials stolen. Each of the kiosks are on different floors, and there are multiple routers, since the business segments environments for certain business functions.\nHourly employees are required to use a website called acmetimekeeping.com to clock in and out. This website is accessible from the internet. Which of the following Is the most likely reason for this compromise?", "options": ["A brute-force attack was used against the time-keeping website to scan for common passwords.", "A malicious actor compromised the time-keeping website with malicious code using an unpatched vulnerability on the site, stealing the credentials.", "The internal DNS servers were poisoned and were redirecting acmetimkeeping.com to malicious domain that intercepted the credentials and then passed them through to the real site", "ARP poisoning affected the machines in the building and caused the kiosks lo send a copy of all the submitted credentials to a machine.machine."], "answer": "B", "explanation": "The scenario suggests that only the employees who used the kiosks inside the building had their credentials compromised. Since the time-keeping website is accessible from the internet, it is possible that a malicious actor exploited an unpatched vulnerability in the site, allowing them to inject malicious code that captured the credentials of those who logged in from the kiosks. This is a common attack vector for stealing credentials from web applications.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: The course discusses web application vulnerabilities and how attackers can exploit them to steal credentials."}, {"number": 351, "question": "Which of the following consequences would a retail chain most likely face from customers in the event the retailer is non-compliant with PCI DSS?", "options": ["Contractual impacts", "Sanctions", "Fines", "Reputational damage"], "answer": "A", "explanation": ""}, {"number": 352, "question": "Which of the following is the best reason to complete an audit in a banking environment?", "options": ["Regulatory requirement", "Organizational change", "Self-assessment requirement", "Service-level requirement"], "answer": "A", "explanation": "A regulatory requirement is a mandate imposed by a government or an authority that must be followed by an organization or an individual. In a banking environment, audits are often required by regulators to ensure compliance with laws, standards, and policies related to security, privacy, and financial reporting. Audits help to identify and correct any gaps or weaknesses in the security posture and the internal controls of the organization."}, {"number": 353, "question": "A business received a small grant to migrate its infrastructure to an off-premises solution. Which of the following should be considered first?", "options": ["Security of cloud providers", "Cost of implementation", "Ability of engineers", "Security of architecture"], "answer": "D", "explanation": "Security of architecture is the process of designing and implementing a secure infrastructure that meets the business objectives and requirements. Security of architecture should be considered first when migrating to an off-premises solution, such as cloud computing, because it can help to identify and mitigate the potential risks and challenges associated with the migration, such as data security, compliance, availability, scalability, and performance. Security of architecture is different from security of cloud providers, which is the process of evaluating and selecting a trustworthy and reliable cloud service provider that can meet the security and operational needs of the business. Security of architecture is also different from cost of implementation, which is the amount of money required to migrate and maintain the infrastructure in the cloud. Security of architecture is also different from ability of engineers, which is the level of skill and knowledge of the IT staff who are responsible for the migration and management of the cloud infrastructure. References: CompTIA\n\nSecurity+ Study Guide: Exam SY0-701, 9th Edition, page 3491"}, {"number": 354, "question": "In a rush to meet an end-of-year business goal, the IT department was told to implement a new business application. The security engineer reviews the attributes of the application and decides the time needed to perform due diligence is insufficient from a cybersecurity perspective. Which of the following best describes the security engineer's response?", "options": ["Risk tolerance", "Risk acceptance", "Risk importance", "Risk appetite"], "answer": "D", "explanation": "Risk appetite refers to the level of risk that an organization is willing to accept in order to achieve its objectives. In this scenario, the security engineer is concerned that the timeframe for implementing a new application does not allow for sufficient cybersecurity due diligence. This reflects a situation where the organization’s risk appetite might be too high if it proceeds without the necessary security checks.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of risk management and understanding organizational risk appetite."}, {"number": 355, "question": "An employee clicked a malicious link in an email and downloaded malware onto the company's computer network. The malicious program exfiltrated thousands of customer records. Which of the following should the company implement to prevent this in the future?", "options": ["User awareness training", "Network monitoring", "Endpoint protection", "Data loss prevention"], "answer": "A", "explanation": "Comprehensive and Detailed In-Depth Explanation:\n\nUser awareness training is essential in preventing security incidents caused by human error, such as clicking on malicious links. Employees need to be educated on recognizing phishing attempts, verifying email senders, and avoiding suspicious downloads.\n\nNetwork monitoring detects and alerts on malicious activity but does not prevent employees from clicking on harmful links.\n\nEndpoint protection can mitigate malware infections but is not foolproof, especially if users continue to fall for phishing attacks.\n\nData loss prevention (DLP) can prevent data exfiltration but does not stop malware from being introduced into the system.\n\nBy training employees to recognize and avoid phishing scams, organizations can reduce the risk of malware\n\n.infections and data breaches"}, {"number": 356, "question": "An analyst is reviewing an incident in which a user clicked on a link in a phishing email. Which of the following log sources would the analyst utilize to determine whether the connection was successful?", "options": ["Network", "System", "Application", "Authentication"], "answer": "A", "explanation": "To determine whether the connection was successful after a user clicked on a link in a phishing email, the most relevant log source to analyze would be the network logs. These logs would provide information on outbound and inbound traffic, allowing the analyst to see if the user’s system connected to the remote server specified in the phishing link. Network logs can include details such as IP addresses, domains accessed, and the success or failure of connections, which are crucial for understanding the impact of the phishing attempt.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 04 Security Operations.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Incident Response."}, {"number": 357, "question": "An IT security team is concerned about the confidentiality of documents left unattended in MFPs. Which of the following should the security team do to mitigate the situation?", "options": ["Educate users about the importance of paper shredder devices.", "Deploy an authentication factor that requires ln-person action before printing.", "Install a software client m every computer authorized to use the MFPs.", "Update the management software to utilize encryption."], "answer": "B", "explanation": "To mitigate the risk of confidential documents being left unattended in Multi-Function Printers (MFPs), implementing an authentication factor that requires in-person action before printing (such as PIN codes or badge scanning) is the most effective measure. This ensures that documents are only printed when the authorized user is present to collect them, reducing the risk of sensitive information being exposed.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of physical security and access control."}, {"number": 358, "question": "During an investigation, an incident response team attempts to understand the source of an incident. Which of the following incident response activities describes this process?", "options": ["Analysis", "Lessons learned", "Detection", "Containment"], "answer": "A", "explanation": "Analysis is the incident response activity that describes the process of understanding the source of an incident. Analysis involves collecting and examining evidence, identifying the root cause, determining the scope and impact, and assessing the threat actor’s motives and capabilities. Analysis helps the incident response team to formulate an appropriate response strategy, as well as to prevent or mitigate future incidents.\n\nAnalysis is usually performed after detection and before containment, eradication, recovery, and lessons learned. References = CompTIA Security+ Study Guide with over 500 Practice Test Questions: Exam SY0- 701, 9th Edition, Chapter 6, page 223. CompTIA Security+ SY0-701 Exam Objectives, Domain 4.2, page 13."}, {"number": 359, "question": "A systems administrator is looking for a low-cost application-hosting solution that is cloud-based. Which of the following meets these requirements?", "options": ["Serverless framework", "Type 1 hvpervisor", "SD-WAN", "SDN"], "answer": "A", "explanation": "A serverless framework is a cloud-based application-hosting solution that meets the requirements of low-cost and cloud-based. A serverless framework is a type of cloud computing service that allows developers to run applications without managing or provisioning any servers. The cloud provider handles the server-side infrastructure, such as scaling, load balancing, security, and maintenance, and charges the developer only for the resources consumed by the application. A serverless framework enables developers to focus on the application logic and functionality, and reduces the operational costs and complexity of hosting applications.\n\nSome examples of serverless frameworks are AWS Lambda, Azure Functions, and Google Cloud Functions.\n\nA type 1 hypervisor, SD-WAN, and SDN are not cloud-based application-hosting solutions that meet the requirements of low-cost and cloud-based. A type 1 hypervisor is a software layer that runs directly on the hardware and creates multiple virtual machines that can run different operating systems and applications. A type 1 hypervisor is not a cloud-based service, but a virtualization technology that can be used to create private or hybrid clouds. A type 1 hypervisor also requires the developer to manage and provision the servers and the virtual machines, which can increase the operational costs and complexity of hosting applications.\n\nSome examples of type 1 hypervisors are VMware ESXi, Microsoft Hyper-V, and Citrix XenServer.\n\nSD-WAN (Software-Defined Wide Area Network) is a network architecture that uses software to dynamically route traffic across multiple WAN connections, such as broadband, LTE, or MPLS. SD-WAN is not a cloud- based service, but a network optimization technology that can improve the performance, reliability, and security of WAN connections. SD-WAN can be used to connect remote sites or users to cloud-based applications, but it does not host the applications itself. Some examples of SD-WAN vendors are Cisco,\n\nVMware, and Fortinet.\n\nSDN (Software-Defined Networking) is a network architecture that decouples the control plane from the data plane, and uses a centralized controller to programmatically manage and configure the network devices and traffic flows. SDN is not a cloud-based service, but a network automation technology that can enhance the scalability, flexibility, and efficiency of the network. SDN can be used to create virtual networks or network functions that can support cloud-based applications, but it does not host the applications itself. Some examples of SDN vendors are OpenFlow, OpenDaylight, and OpenStack.\n\nReferences = CompTIA Security+ SY0-701 Certification Study Guide, page 264-265; Professor Messer’s\n\nCompTIA SY0-701 Security+ Training Course, video 3.1 - Cloud and Virtualization, 7:40 - 10:00;\n\n[Serverless Framework]; [Type 1 Hypervisor]; [SD-WAN]; [SDN]."}, {"number": 360, "question": "Which of the following describes the maximum allowance of accepted risk?", "options": ["Risk indicator", "Risk level", "Risk score", "Risk threshold"], "answer": "D", "explanation": "Risk threshold is the maximum amount of risk that an organization is willing to accept for a given activity or decision. It is also known as risk appetite or risk tolerance. Risk threshold helps an organization to prioritize and allocate resources for risk management. Risk indicator, risk level, and risk score are different ways of measuring or expressing the likelihood and impact of a risk, but they do not describe the maximum allowance of accepted risk. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 34; Accepting Risk: Definition, How It Works, and Alternatives"}, {"number": 361, "question": "A software developer wishes to implement an application security technique that will provide assurance of the application's integrity. Which of the following techniques will achieve this?", "options": ["Secure cookies", "Input validation", "Static analysis", "Code signing"], "answer": "D", "explanation": "Code signing (D) uses  to confirm the  of cryptographic digital signatures integrity and authenticity software code. It ensures that the code has  after being signed, providing assurance that the not been altered application is trustworthy.\n\nThis aligns with , which CompTIA Security+ SY0-701 Domain 2.3: Application security techniques includes  as a method to validate .code signing code integrity"}, {"number": 362, "question": "Which of the following can be used to identify potential attacker activities without affecting production servers?", "options": ["Honey pot", "Video surveillance", "Zero Trust", "Geofencing"], "answer": "A", "explanation": "A honey pot is a system or a network that is designed to mimic a real production server and attract potential attackers. A honey pot can be used to identify the attacker’s methods, techniques, and objectives without affecting the actual production servers. A honey pot can also divert the attacker’s attention from the real targets and waste their time and resources12.\n\nThe other options are not effective ways to identify potential attacker activities without affecting production servers:\n\nVideo surveillance: This is a physical security technique that uses cameras and monitors to record and observe the activities in a certain area. Video surveillance can help to deter, detect, and investigate physical intrusions, but it does not directly identify the attacker’s activities on the network or the servers3.\n\nZero Trust: This is a security strategy that assumes that no user, device, or network is trustworthy by default and requires strict verification and validation for every request and transaction. Zero Trust can help to improve the security posture and reduce the attack surface of an organization, but it does not directly identify the attacker’s activities on the network or the servers4.\n\nGeofencing: This is a security technique that uses geographic location as a criterion to restrict or allow access to data or resources. Geofencing can help to protect the data sovereignty and compliance of an organization, but it does not directly identify the attacker’s activities on the network or the servers5.\n\nReferences = 1: CompTIA Security+ SY0-701 Certification Study Guide, page 542: Honeypots and\n\nDeception – SY0-601 CompTIA Security+ : 2.1, video by Professor Messer3: CompTIA Security+ SY0-701\n\nCertification Study Guide, page 974: CompTIA Security+ SY0-701 Certification Study Guide, page 985:\n\nCompTIA Security+ SY0-701 Certification Study Guide, page 99."}, {"number": 363, "question": "Which of the following can a security director use to prioritize vulnerability patching within a company's IT environment?", "options": ["SOAR", "CVSS", "SIEM", "CVE"], "answer": "B", "explanation": "The Common Vulnerability Scoring System (CVSS) is a standardized framework for assessing the severity of security vulnerabilities. It helps organizations prioritize vulnerability patching by providing a numerical score that reflects the potential impact and exploitability of a vulnerability. CVSS scores are used to gauge the urgency of patching vulnerabilities within a company’s IT environment.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 05 Security Program Management and Oversight.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Vulnerability Management."}, {"number": 364, "question": "Which of the following definitions best describes the concept of log co-relation?", "options": ["Combining relevant logs from multiple sources into ono location", "Searching end processing, data to identify patterns of malicious activity", "Making a record of the events that occur in the system", "Analyzing the log files of the system components"], "answer": "D", "explanation": ""}, {"number": 365, "question": "Which of the following would be the greatest concern for a company that is aware of the consequences of non- compliance with government regulations?", "options": ["Right to be forgotten", "Sanctions", "External compliance reporting", "Attestation"], "answer": "B", "explanation": "Detailed Explanation:\n\nSanctions imposed for non-compliance can include fines, legal actions, and loss of business licenses. These pose a significant financial and reputational risk to organizations. Reference: CompTIA Security+ SY0-701\n\nStudy Guide, Domain 5: Security Program Management, Section: \"Regulatory Compliance Risks\"."}, {"number": 366, "question": "The security operations center is researching an event concerning a suspicious IP address A security analyst looks at the following event logs and discovers that a significant portion of the user accounts have experienced faded log-In attempts when authenticating from the same IP address:\nWhich of the following most likely describes attack that took place?", "options": ["Spraying", "Brute-force", "Dictionary", "Rainbow table"], "answer": "A", "explanation": "Password spraying is a type of attack where an attacker tries a small number of commonly used passwords across a large number of accounts. The event logs showing failed login attempts for many user accounts from the same IP address are indicative of a password spraying attack, where the attacker is attempting to gain access by guessing common passwords.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of identity and access management and common attack vectors like password spraying."}, {"number": 367, "question": "Which of the following is an example of memory injection?", "options": ["Two processes access the same variable, allowing one to cause a privilege escalation.", "A process receives an unexpected amount of data, which causes malicious code to be executed.", "Malicious code is copied to the allocated space of an already running process.", "An executable is overwritten on the disk, and malicious code runs the next time it is executed."], "answer": "C", "explanation": "Memory injection occurs when , malicious code is written into the memory space of a running process allowing it to execute without writing anything to disk. This is often used in , fileless malware attacks making detection harder.\n\nA (privilege escalation) describes a race condition, not memory injection.\n\nB (unexpected data causing execution) describes a , not memory injection.buffer overflow attack\n\nD (overwriting an executable) is a , but it is not an example of in-memory persistence technique injection."}, {"number": 368, "question": "A systems administrator works for a local hospital and needs to ensure patient data is protected and secure.\nWhich of the following data classifications should be used to secure patient data?", "options": ["Private", "Critical", "Sensitive", "Public"], "answer": "C", "explanation": "Data classification is a process of categorizing data based on its level of sensitivity, value, and impact to the organization if compromised. Data classification helps to determine the appropriate security controls and policies to protect the data from unauthorized access, disclosure, or modification. Different organizations may use different data classification schemes, but a common one is the four-tier model, which consists of the following categories: public, private, sensitive, and critical.\n\nPublic data is data that is intended for public access and disclosure, and has no impact to the organization if compromised. Examples of public data include marketing materials, press releases, and public web pages.\n\nPrivate data is data that is intended for internal use only, and has a low to moderate impact to the organization if compromised. Examples of private data include employee records, financial reports, and internal policies.\n\nSensitive data is data that is intended for authorized use only, and has a high impact to the organization if compromised. Examples of sensitive data include personal information, health records, and intellectual property.\n\nCritical data is data that is essential for the organization’s operations and survival, and has a severe impact to the organization if compromised. Examples of critical data include encryption keys, disaster recovery plans, and system backups.\n\nPatient data is a type of sensitive data, as it contains personal and health information that is protected by law and ethical standards. Patient data should be used only by authorized personnel for legitimate purposes, and should be secured from unauthorized access, disclosure, or modification. Therefore, the systems administrator should use the sensitive data classification to secure patient data.\n\nReferences = CompTIA Security+ SY0-701 Certification Study Guide, page 90-91; Professor Messer’s\n\nCompTIA SY0-701 Security+ Training Course, video 5.5 - Data Classifications, 0:00 - 4:30."}, {"number": 369, "question": "An employee receives a text message from an unknown number claiming to be the company's Chief\nExecutive Officer and asking the employee to purchase several gift cards. Which of the following types of attacks does this describe?", "options": ["Vishing", "Smishing", "Pretexting", "Phishing"], "answer": "B", "explanation": "Smishing is a type of phishing attack that uses text messages or common messaging apps to trick victims into clicking on malicious links or providing personal information. The scenario in the question describes a smishing attack that uses pretexting, which is a form of social engineering that involves impersonating someone else to gain trust or access. The unknown number claims to be the company’s CEO and asks the employee to purchase gift cards, which is a common scam tactic. Vishing is a similar type of attack that uses phone calls or voicemails, while phishing is a broader term that covers any email-based attack. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 771; Smishing vs. Phishing: Understanding the Differences2"}, {"number": 370, "question": "Which of the following risk management strategies should an enterprise adopt first if a legacy application is critical to business operations and there are preventative controls that are not yet implemented?", "options": ["Mitigate", "Accept", "Transfer", "Avoid"], "answer": "A", "explanation": "Mitigate is the risk management strategy that involves reducing the likelihood or impact of a risk. If a legacy application is critical to business operations and there are preventative controls that are not yet implemented, the enterprise should adopt the mitigate strategy first to address the existing vulnerabilities and gaps in the application. This could involve applying patches, updates, or configuration changes to the application, or adding additional layers of security controls around the application. Accept, transfer, and avoid are other risk management strategies, but they are not the best options for this scenario. Accept means acknowledging the risk and accepting the consequences without taking any action. Transfer means shifting the risk to a third party, such as an insurance company or a vendor. Avoid means eliminating the risk by removing the source or changing the process. These strategies may not be feasible or desirable for a legacy application that is critical to business operations and has no preventative controls in place. References: CompTIA Security+ Study\n\nGuide: Exam SY0-701, 9th Edition, page 1221; A Risk-Based Framework for Legacy System Migration and\n\nDeprecation2"}, {"number": 371, "question": "Which of the following should an organization focus on the most when making decisions about vulnerability prioritization?", "options": ["Exposure factor", "CVSS", "CVE", "Industry impact"], "answer": "B", "explanation": "Detailed Explanation:The Common Vulnerability Scoring System (CVSS) is a standardized metric used to assess the severity of vulnerabilities, aiding organizations in prioritizing their response based on risk.\n\nReference: CompTIA Security+ SY0-701 Study Guide, Domain 2: Vulnerabilities, Section: \"Vulnerability\n\nPrioritization and Metrics\"."}, {"number": 372, "question": "Which of the following is the phase in the incident response process when a security analyst reviews roles and responsibilities?", "options": ["Preparation", "Recovery", "Lessons learned", "Analysis"], "answer": "A", "explanation": "Preparation is the phase in the incident response process when a security analyst reviews roles and responsibilities, as well as the policies and procedures for handling incidents. Preparation also involves gathering and maintaining the necessary tools, resources, and contacts for responding to incidents. Preparation can help a security analyst to be ready and proactive when an incident occurs, as well as to reduce the impact and duration of the incident.\n\nSome of the activities that a security analyst performs during the preparation phase are:\n\nDefining the roles and responsibilities of the incident response team members, such as the incident manager, the incident coordinator, the technical lead, the communications lead, and the legal advisor.\n\nEstablishing the incident response plan, which outlines the objectives, scope, authority, and procedures for responding to incidents, as well as the escalation and reporting mechanisms.\n\nDeveloping the incident response policy, which defines the types and categories of incidents, the severity levels, the notification and reporting requirements, and the roles and responsibilities of the stakeholders.\n\nCreating the incident response playbook, which provides the step-by-step guidance and checklists for handling specific types of incidents, such as denial-of-service, ransomware, phishing, or data breach.\n\nAcquiring and testing the incident response tools, such as network and host-based scanners, malware analysis tools, forensic tools, backup and recovery tools, and communication and collaboration tools.\n\nIdentifying and securing the incident response resources, such as the incident response team, the incident response location, the evidence storage, and the external support.\n\nBuilding and maintaining the incident response contacts, such as the internal and external stakeholders, the law enforcement agencies, the regulatory bodies, and the media."}, {"number": 373, "question": "Which of the following actions could a security engineer take to ensure workstations and servers are properly monitored for unauthorized changes and software?", "options": ["Configure all systems to log scheduled tasks.", "Collect and monitor all traffic exiting the network.", "Block traffic based on known malicious signatures.", "Install endpoint management software on all systems."], "answer": "D", "explanation": "Endpoint management software is a tool that allows security engineers to monitor and control the configuration, security, and performance of workstations and servers from a central console. Endpoint management software can help detect and prevent unauthorized changes and software installations, enforce policies and compliance, and provide reports and alerts on the status of the endpoints. The other options are not as effective or comprehensive as endpoint management software for this purpose. References: CompTIA\n\nSecurity+ Study Guide: Exam SY0-701, 9th Edition, page 137 1"}, {"number": 374, "question": "A company with a high-availability website is looking to harden its controls at any cost. The company wants to ensure that the site is secure by finding any possible issues. Which of the following would most likely achieve this goal?", "options": ["Permission restrictions", "Bug bounty program", "Vulnerability scan", "Reconnaissance"], "answer": "B", "explanation": "A  encourages ethical hackers to , helping organizations bug bounty program find and report vulnerabilities discover security flaws before they are exploited by malicious actors. Unlike , bug bounty vulnerability scans programs use .real-world testing techniques"}, {"number": 375, "question": "Which of the following describes the understanding between a company and a client about what will be provided and the accepted time needed to provide the company with the resources?", "options": ["SLA", "MOU", "MOA", "BPA"], "answer": "A", "explanation": "A Service Level Agreement (SLA) is a formal document between a service provider and a client that defines the expected level of service, including what resources will be provided and the agreed-upon time frames. It typically includes metrics to evaluate performance, uptime guarantees, and response times.\n\nMOU (Memorandum of Understanding) and MOA (Memorandum of Agreement) are less formal and may not specify the exact level of service.\n\nBPA (Business Partners Agreement) focuses more on the long-term relationship between partners."}, {"number": 376, "question": "Which of the following would help ensure a security analyst is able to accurately measure the overall risk to an organization when a new vulnerability is disclosed?", "options": ["A full inventory of all hardware and software", "Documentation of system classifications", "A list of system owners and their departments", "Third-party risk assessment documentation"], "answer": "A", "explanation": "A full inventory of all hardware and software is essential for measuring the overall risk to an organization when a new vulnerability is disclosed, because it allows the security analyst to identify which systems are affected by the vulnerability and prioritize the remediation efforts. Without a full inventory, the security analyst may miss some vulnerable systems or waste time and resources on irrelevant ones. Documentation of system classifications, a list of system owners and their departments, and third-party risk assessment documentation are all useful for risk management, but they are not sufficient to measure the impact of a new vulnerability. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 1221; Risk\n\nAssessment and Analysis Methods: Qualitative and Quantitative3"}, {"number": 377, "question": "A systems administrator is concerned about vulnerabilities within cloud computing instances Which of the following is most important for the administrator to consider when architecting a cloud computing environment?", "options": ["SQL injection", "TOC/TOU", "VM escape", "Tokenization", "Password spraying"], "answer": "C", "explanation": ""}, {"number": 378, "question": "A company is redesigning its infrastructure and wants to reduce the number of physical servers in use. Which of the following architectures is best suited for this goal?", "options": ["Isolation", "Segmentation", "Virtualization", "Redundancy"], "answer": "C", "explanation": ""}, {"number": 379, "question": "Which of the following has been implemented when a host-based firewall on a legacy Linux system allows connections from only specific internal IP addresses?", "options": ["Compensating control", "Network segmentation", "Transfer of risk", "SNMP traps"], "answer": "A", "explanation": "A compensating control is a security measure that is implemented to mitigate the risk of a vulnerability or a weakness that cannot be resolved by the primary control. A compensating control does not prevent or eliminate the vulnerability or weakness, but it can reduce the likelihood or impact of an attack. A host-based firewall on a legacy Linux system that allows connections from only specific internal IP addresses is an example of a compensating control, as it can limit the exposure of the system to potential threats from external or unauthorized sources. A host-based firewall is a software application that monitors and filters the incoming and outgoing network traffic on a single host, based on a set of rules or policies. A legacy Linux system is an older version of the Linux operating system that may not be compatible with the latest security updates or patches, and may have known vulnerabilities or weaknesses that could be exploited by attackers. References = Security Controls – SY0-601 CompTIA Security+ : 5.1, Security Controls –\n\nCompTIA Security+ SY0-501 – 5.7, CompTIA Security+ Study Guide with over 500 Practice Test Questions:\n\nExam SY0-701, 9th Edition, Chapter 5, page 240. CompTIA Security+ (SY0-701) Certification Exam\n\nObjectives, Domain 5.1, page 18."}, {"number": 380, "question": "The physical security team at a company receives reports that employees are not displaying their badges. The team also observes employees tailgating at controlled entrances. Which of the following topics will the security team most likely emphasize in upcoming security training?", "options": ["Social engineering", "Situational awareness", "Phishing", "Acceptable use policy"], "answer": "B", "explanation": "The issue described is related to a , such as badge usage lack of awareness about physical security protocols and preventing tailgating. The most appropriate training topic is , which involves situational awareness (B) being aware of surroundings and security risks.\n\nThis is covered in , which addresses , including Domain 5.1 of SY0-701 personnel training topics situational for physical security and human factors.awareness"}, {"number": 381, "question": "An external vendor recently visited a company's headquarters tor a presentation. Following the visit a member of the hosting team found a file that the external vendor left behind on a server. The file contained detailed architecture information and code snippets. Which of the following data types best describes this file?", "options": ["Government", "Public", "Proprietary", "Critical"], "answer": "C", "explanation": "The file left by the external vendor, containing detailed architecture information and code snippets, is best described as proprietary data. Proprietary data is information that is owned by a company and is essential to its competitive advantage. It includes sensitive business information such as trade secrets, intellectual property, and confidential data that should be protected from unauthorized access.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of data classification and protection."}, {"number": 382, "question": "Which of the following environments utilizes a subset of customer data and is most likely to be used to assess the impacts of major system upgrades and demonstrate system features?", "options": ["Development", "Test", "Production", "Staging"], "answer": "D", "explanation": "A staging environment is a controlled setting that closely mirrors the production environment but uses a subset of customer data. It is used to test major system upgrades, assess their impact, and demonstrate new features before they are rolled out to the live production environment. This ensures that any issues can be identified and addressed in a safe environment before affecting end-users.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of secure system development and testing environments."}, {"number": 383, "question": "Which of the following explains why an attacker cannot easily decrypt passwords using a rainbow table attack?", "options": ["Digital signatures", "Salting", "Hashing", "Perfect forward secrecy"], "answer": "B", "explanation": "Salting is a technique used to enhance the security of hashed passwords by adding a unique, random value\n\n(salt) to each password before hashing it. This prevents attackers from easily decrypting passwords using rainbow tables, which are precomputed tables for reversing cryptographic hash functions. Since each password has a unique salt, the same password will produce different hash values, making rainbow table attacks ineffective.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 04 Security Operations.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Cryptography and Hashing Techniques."}, {"number": 384, "question": "Which of the following involves an attempt to take advantage of database misconfigurations?", "options": ["Buffer overflow", "SQL injection", "VM escape", "Memory injection"], "answer": "B", "explanation": "SQL injection is a type of attack that exploits a database misconfiguration or a flaw in the application code that interacts with the database. An attacker can inject malicious SQL statements into the user input fields or the URL parameters that are sent to the database server. These statements can then execute unauthorized commands, such as reading, modifying, deleting, or creating data, or even taking over the database server. SQL injection can compromise the confidentiality, integrity, and availability of the data and the system. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 215 1"}, {"number": 385, "question": "Which of the following is the most relevant reason a DPO would develop a data inventory?", "options": ["To manage data storage requirements better", "To determine the impact in the event of a breach", "To extend the length of time data can be retained", "To automate the reduction of duplicated data"], "answer": "B", "explanation": ""}, {"number": 386, "question": "The Chief Information Security Officer (CISO) at a large company would like to gain an understanding of how the company's security policies compare to the requirements imposed by external regulators. Which of the following should the CISO use?", "options": ["Penetration test", "Internal audit", "Attestation", "External examination"], "answer": "D", "explanation": "An external examination (also known as an external audit or external review) is the best method for the Chief\n\nInformation Security Officer (CISO) to gain an understanding of how the company’s security policies compare to external regulatory requirements. External examinations are conducted by third-party entities that assess an organization’s compliance with laws, regulations, and industry standards.\n\nPenetration tests focus on identifying vulnerabilities, not compliance.\n\nInternal audits assess internal controls but are not impartial or focused on regulatory requirements.\n\nAttestation is a formal declaration but does not involve the actual evaluation of compliance."}, {"number": 387, "question": "Which of the following is a type of vulnerability that involves inserting scripts into web-based applications in order to take control of the client's web browser?", "options": ["SQL injection", "Cross-site scripting", "Zero-day exploit", "On-path attack"], "answer": "B", "explanation": "Cross-site scripting (XSS) vulnerabilities allow attackers to inject malicious scripts into a website, which are then executed in the user’s web browser, potentially leading to data theft or session hijacking.References:\n\nSecurity+ SY0-701 Course Content, Security+ SY0-601 Book."}, {"number": 388, "question": "A company's online shopping website became unusable shortly after midnight on January 30, 2023. When a security analyst reviewed the database server, the analyst noticed the following code used for backing up data:\nWhich of the following should the analyst do next?", "options": ["Check for recently terminated DBAs.", "Review WAF logs for evidence of command injection.", "Scan the database server for malware.", "Search the web server for ransomware notes."], "answer": "B", "explanation": ""}, {"number": 389, "question": "A bank insists all of its vendors must prevent data loss on stolen laptops. Which of the following strategies is the bank requiring?", "options": ["Encryption at rest", "Masking", "Data classification", "Permission restrictions"], "answer": "A", "explanation": "Encryption at rest is a strategy that protects data stored on a device, such as a laptop, by converting it into an unreadable format that can only be accessed with a decryption key or password. Encryption at rest can prevent data loss on stolen laptops by preventing unauthorized access to the data, even if the device is physically compromised. Encryption at rest can also help comply with data privacy regulations and standards that require data protection. Masking, data classification, and permission restrictions are other strategies that can help protect data, but they may not be sufficient or applicable for data stored on laptops. Masking is a technique that obscures sensitive data elements, such as credit card numbers, with random characters or symbols, but it is usually used for data in transit or in use, not at rest. Data classification is a process that assigns labels to data based on its sensitivity and business impact, but it does not protect the data itself. Permission restrictions are rules that define who can access, modify, or delete data, but they may not prevent unauthorized access if the laptop is stolen and the security controls are bypassed. References: CompTIA Security+ Study Guide:\n\nExam SY0-701, 9th Edition, page 17-18, 372-373"}, {"number": 390, "question": "Which of the following is a common source of unintentional corporate credential leakage in cloud environments?", "options": ["Code repositories", "Dark web", "Threat feeds", "State actors", "Vulnerability databases"], "answer": "A", "explanation": "Code repositories are a common source of unintentional corporate credential leakage, especially in cloud environments. Developers may accidentally commit and push sensitive information, such as API keys, passwords, and other credentials, to public or poorly secured repositories. These credentials can then be accessed by unauthorized users, leading to security breaches. Ensuring that repositories are properly secured and that sensitive data is never committed is critical for protecting against this type of leakage.\n\nRefer
