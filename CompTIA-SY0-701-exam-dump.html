<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompTIA Security+ SY0-701 Exam Dump</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --bg-card-hover: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #2dd4bf;
            --accent-dim: #0d9488;
            --accent-glow: rgba(45, 212, 191, 0.15);
            --correct-bg: rgba(34, 197, 94, 0.15);
            --correct-border: rgba(34, 197, 94, 0.4);
            --correct-text: #4ade80;
            --wrong-bg: rgba(248, 113, 113, 0.15);
            --wrong-border: rgba(248, 113, 113, 0.4);
            --wrong-text: #f87171;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease-in-out;
        }

        .header.header--hidden {
            transform: translateY(-100%);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
        }

        .header-branding {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-subtitle { 
            font-size: 0.75rem; 
            color: var(--text-secondary); 
        }

        .stats-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stat-value { 
            color: var(--accent); 
            font-weight: 600; 
            font-size: 0.9rem; 
        }

        .search-container { 
            position: relative; 
            width: 100%; 
            max-width: 320px; 
            flex-grow: 1;
        }

        .search-input {
            width: 100%;
            padding: 0.4rem 1rem 0.4rem 2.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 14px;
            height: 14px;
        }

        .search-clear {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0.2rem;
            display: none;
        }

        .search-clear:hover { color: var(--text-primary); }
        .search-clear.visible { display: block; }

        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 0.4rem 0.8rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        .btn.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }

        .progress-container { 
            position: absolute;
            bottom: -0.5rem;
            left: -1.5rem;
            right: -1.5rem;
            width: calc(100% + 3rem);
            max-width: none; 
            z-index: 101;
        }

        .progress-bar {
            height: 3px;
            background: transparent;
            border-radius: 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 0;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            display: none;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            display: none;
        }

        .no-results.visible { display: block; }
        .no-results-icon { font-size: 3rem; margin-bottom: 1rem; }

        .questions-grid { display: grid; gap: 1.5rem; }

        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s ease;
            scroll-margin-top: 120px;
        }

        .question-card:hover {
            border-color: var(--accent-dim);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .question-card.hidden { display: none; }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .question-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
            background: var(--accent-glow);
            border: 1px solid var(--accent-dim);
            border-radius: 8px;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.875rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .question-number:hover { background: var(--accent); color: var(--bg-primary); }

        .question-type-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            white-space: nowrap;
        }

        .question-type-badge.multiple {
            border-color: var(--warning);
            color: var(--warning);
            background: rgba(251, 191, 36, 0.1);
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.7;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .option {
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .option:hover:not(.revealed) {
            border-color: var(--accent-dim);
            background: var(--bg-card-hover);
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .option-text {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
            padding-top: 0.15rem;
        }

        .option.revealed { cursor: default; pointer-events: none; }
        .option.revealed:hover { border-color: var(--border-color); }

        .option.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
        }

        .option.correct .option-letter {
            background: var(--correct-text);
            color: var(--bg-primary);
            border-color: var(--correct-text);
        }

        .option.correct .option-text {
            color: var(--correct-text);
            font-weight: 500;
        }

        .option.wrong {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
        }

        .option.wrong .option-letter {
            background: var(--wrong-text);
            color: var(--bg-primary);
            border-color: var(--wrong-text);
        }

        .option.wrong .option-text {
            color: var(--wrong-text);
            font-weight: 500;
        }

        .option-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 0.25rem;
            display: grid;
            place-content: center;
        }

        .option-checkbox::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            background: var(--accent);
            border-radius: 2px;
        }

        .option-checkbox:checked::before { transform: scale(1); }
        .option-checkbox:checked { border-color: var(--accent); }

        .hidden { display: none !important; }

        .answer-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 3px solid var(--accent);
        }

        .answer-section.hidden { display: none; }

        .answer-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .answer-value { font-size: 1rem; font-weight: 700; color: var(--correct-text); }

        .result-message {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .result-message.hidden { display: none; }

        .result-message.correct-msg {
            background: var(--correct-bg);
            border-left: 3px solid var(--correct-border);
            color: var(--correct-text);
        }

        .result-message.wrong-msg {
            background: var(--wrong-bg);
            border-left: 3px solid var(--wrong-border);
            color: var(--wrong-text);
        }

        .explanation {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            border-left: 3px solid var(--info);
        }

        .explanation.hidden { display: none; }

        .explanation-header {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--info);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .explanation-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .explanation-text p { margin-bottom: 0.75rem; }
        .explanation-text p:last-child { margin-bottom: 0; }

        .submit-btn {
            padding: 0.625rem 1.25rem;
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            margin-bottom: 1rem;
        }

        .submit-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .highlight {
            background: var(--accent-glow);
            padding: 0.1rem 0.25rem;
            border-radius: 3px;
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .header { padding: 0.5rem 1rem; }
            .header-row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
            .stats-bar {
                justify-content: space-between;
                gap: 0.5rem;
            }
            .search-container {
                max-width: none;
            }
            .controls {
                justify-content: space-between;
                gap: 0.25rem;
            }
            .btn {
                flex-grow: 1;
                text-align: center;
                padding: 0.3rem 0.6rem;
                font-size: 0.75rem;
            }
            .progress-container {
                left: -1rem;
                right: -1rem;
                width: calc(100% + 2rem);
            }
            .main-content { padding: 1rem; }
            .question-card { padding: 1rem; }
            .question-header { flex-direction: column; align-items: flex-start; }
        }

        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 48px;
            height: 48px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 100;
            font-size: 1.25rem;
            opacity: 0;
            pointer-events: none;
        }

        .scroll-top.visible { opacity: 1; pointer-events: auto; }
        .scroll-top:hover { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: var(--text-secondary); font-size: 0.95rem; }
        .loading-count { color: var(--accent); font-weight: 600; font-size: 1.25rem; margin-top: 0.5rem; }
    </style>
</head>

    <script>
        const EXAM_DATA = [{"number": 1, "question": "Which of the following is prevented by proper data sanitization?", "options": ["Hackers' ability to obtain data from used hard drives", "Devices reaching end-of-life and losing support", "Disclosure of sensitive data through incorrect classification", "Incorrect inventory data leading to a laptop shortage"], "answer": "A", "explanation": "Detailed Explanation:Proper data sanitization ensures that sensitive data is securely erased from storage devices, preventing unauthorized access or recovery when the devices are disposed of or reused. Reference:\n\nCompTIA Security+ SY0-701 Study Guide, Domain 5: Security Program Management, Section: \"Data\n\nSanitization and Disposal Methods\"."}, {"number": 2, "question": "Which of the following organizational documents is most often used to establish and communicate expectations associated with integrity and ethical behavior within an organization?", "options": ["AUP", "SLA", "EULA", "MOA"], "answer": "A", "explanation": ""}, {"number": 3, "question": "A U.S.-based cloud-hosting provider wants to expand its data centers to new international locations. Which of the following should the hosting provider consider first?", "options": ["Local data protection regulations", "Risks from hackers residing in other countries", "Impacts to existing contractual obligations", "Time zone differences in log correlation"], "answer": "A", "explanation": "Local data protection regulations are the first thing that a cloud-hosting provider should consider before expanding its data centers to new international locations. Data protection regulations are laws or standards that govern how personal or sensitive data is collected, stored, processed, and transferred across borders.\n\nDifferent countries or regions may have different data protection regulations, such as the General Data\n\nProtection Regulation (GDPR) in the European Union, the Personal Information Protection and Electronic\n\nDocuments Act (PIPEDA) in Canada, or the California Consumer Privacy Act (CCPA) in the United States.\n\nA cloud-hosting provider must comply with the local data protection regulations of the countries or regions where it operates or serves customers, or else it may face legal penalties, fines, or reputational damage.\n\nTherefore, a cloud-hosting provider should research and understand the local data protection regulations of the new international locations before expanding its data centers there. References = CompTIA Security+\n\nStudy Guide with over 500 Practice Test Questions: Exam SY0-701, 9th Edition, Chapter 7, page 269.\n\nCompTIA Security+ SY0-701 Exam Objectives, Domain 5.1, page 14."}, {"number": 4, "question": "Two companies are in the process of merging. The companies need to decide how to standardize their information security programs. Which of the following would best align the security programs?", "options": ["Shared deployment of CIS baselines", "Joint cybersecurity best practices", "Both companies following the same CSF", "Assessment of controls in a vulnerability report"], "answer": "C", "explanation": "A Cybersecurity Framework (CSF) provides a structured approach to standardizing and aligning security programs across different organizations. By both companies adopting the same CSF, they can ensure that their security measures, policies, and practices are consistent, which is essential during a merger when aligning two different security programs.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: The course discusses the importance of adopting standardized cybersecurity frameworks (CSF) for aligning security programs during mergers and acquisitions."}, {"number": 5, "question": "A systems administrator wants to prevent users from being able to access data based on their responsibilities.\nThe administrator also wants to apply the required access structure via a simplified format. Which of the following should the administrator apply to the site recovery resource group?", "options": ["RBAC", "ACL", "SAML", "GPO"], "answer": "A", "explanation": "RBAC stands for Role-Based Access Control, which is a method of restricting access to data and resources based on the roles or responsibilities of users. RBAC simplifies the management of permissions by assigning roles to users and granting access rights to roles, rather than to individual users. RBAC can help enforce the principle of least privilege and reduce the risk of unauthorized access or data leakage. The other options are not as suitable for the scenario as RBAC, as they either do not prevent access based on responsibilities, or do not apply a simplified format. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 133 1"}, {"number": 6, "question": "During a SQL update of a database, a temporary field that was created was replaced by an attacker in order to allow access to the system. Which of the following best describes this type of vulnerability?", "options": ["Race condition", "Memory injection", "Malicious update", "Side loading"], "answer": "A", "explanation": ""}, {"number": 7, "question": "A user needs to complete training at https://comptiatraining.com. After manually entering the URL, the user sees that the accessed website is noticeably different from the standard company website. Which of the following is the most likely explanation for the difference?", "options": ["Cross-site scripting", "Pretexting", "Typosquatting", "Vishing"], "answer": "C", "explanation": "Typosquatting (also known as ) is a type of attack where cybercriminals register domain URL hijacking names similar to legitimate sites but with slight misspellings (e.g., comptiatraning.com instead of comptiatraining.com). Attackers use these fake sites to . Since the steal credentials or distribute malware user manually entered the URL and reached an unexpected website, this strongly indicates a typosquatting\n\n.attack"}, {"number": 8, "question": "A company is planning a disaster recovery site and needs to ensure that a single natural disaster would not result in the complete loss of regulated backup data. Which of the following should the company consider?", "options": ["Geographic dispersion", "Platform diversity", "Hot site", "Load balancing"], "answer": "A", "explanation": "Geographic dispersion is the practice of having backup data stored in different locations that are far enough apart to minimize the risk of a single natural disaster affecting both sites. This ensures that the company can recover its regulated data in case of a disaster at the primary site. Platform diversity, hot site, and load balancing are not directly related to the protection of backup data from natural disasters. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 449; Disaster\n\nRecovery Planning: Geographic Diversity"}, {"number": 9, "question": "Which of the following methods would most likely be used to identify legacy systems?", "options": ["Bug bounty program", "Vulnerability scan", "Package monitoring", "Dynamic analysis"], "answer": "B", "explanation": "A vulnerability scan is the most likely method to identify legacy systems. These scans assess an organization's network and systems for known vulnerabilities, including outdated or unsupported software (i.e., legacy systems) that may pose a security risk. The scan results can highlight systems that are no longer receiving updates, helping IT teams address these risks.\n\nBug bounty programs are used to incentivize external researchers to find security flaws, but they are less effective at identifying legacy systems.\n\nPackage monitoring tracks installed software packages for updates or issues but is not as comprehensive for identifying legacy systems.\n\nDynamic analysis is typically used for testing applications during runtime to find vulnerabilities, but not for identifying legacy systems."}, {"number": 10, "question": "Which of the following control types involves restricting IP connectivity to a router's web management interface to protect it from being exploited by a vulnerability?", "options": ["Corrective", "Physical", "Preventive", "Managerial"], "answer": "C", "explanation": "Restricting access to a router's web management interface is a . This type of control is preventive control (C) implemented  to reduce the likelihood of exploitation.before a threat occurs\n\nCompTIA Security+ SY0-701 lists  such as  under preventive controls IP whitelisting, ACLs, and firewalls\n\n.Domain 1.4: Security controls"}, {"number": 11, "question": "A security consultant is working with a client that wants to physically isolate its secure systems. Which of the following best describes this architecture?", "options": ["SDN", "Air gapped", "Containerized", "Highly available"], "answer": "B", "explanation": ""}, {"number": 12, "question": "The Chief Information Security Officer wants to discuss options for a disaster recovery site that allows the business to resume operations as quickly as possible. Which of the following solutions meets this requirement?", "options": ["Hot site", "Cold site", "Geographic dispersion", "Warm site"], "answer": "A", "explanation": ""}, {"number": 13, "question": "Which of the following security concepts is the best reason for permissions on a human resources fileshare to follow the principle of least privilege?", "options": ["Integrity", "Availability", "Confidentiality", "Non-repudiation"], "answer": "C", "explanation": "Confidentiality is the security concept that ensures data is protected from unauthorized access or disclosure.\n\nThe principle of least privilege is a technique that grants users or systems the minimum level of access or permissions that they need to perform their tasks, and nothing more. By applying the principle of least privilege to a human resources fileshare, the permissions can be restricted to only those who have a legitimate need to access the sensitive data, such as HR staff, managers, or auditors. This can prevent unauthorized users, such as hackers, employees, or contractors, from accessing, copying, modifying, or deleting the data.\n\nTherefore, the principle of least privilege can enhance the confidentiality of the data on the fileshare.\n\nIntegrity, availability, and non-repudiation are other security concepts, but they are not the best reason for permissions on a human resources fileshare to follow the principle of least privilege. Integrity is the security concept that ensures data is accurate and consistent, and protected from unauthorized modification or corruption. Availability is the security concept that ensures data is accessible and usable by authorized users or systems when needed. Non-repudiation is the security concept that ensures the authenticity and accountability of data and actions, and prevents the denial of involvement or responsibility. While these concepts are also important for data security, they are not directly related to the level of access or permissions granted to users or systems. References: CompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, page 16-17, 372-373"}, {"number": 14, "question": "A security analyst is prioritizing vulnerability scan results using a risk-based approach. Which of the following is the most efficient resource for the analyst to use?", "options": ["Business impact analysis", "Common Vulnerability Scoring System", "Risk register", "Exposure factor"], "answer": "B", "explanation": "The  is a Common Vulnerability Scoring System (CVSS) standardized framework for assessing the\n\n. It provides a numerical score (0-10) based on factors such as severity of vulnerabilities exploitability, , helping security analysts .impact, and complexity prioritize remediation efforts based on risk\n\nBusiness impact analysis (A) helps identify  but does not specifically critical business functions\n\n.prioritize vulnerabilities\n\nRisk register (C) tracks identified risks but does not classify vulnerabilities.\n\nExposure factor (D) is used in  but is not an industry standard for quantitative risk assessment vulnerability prioritization."}, {"number": 15, "question": "A security analyst scans a company's public network and discovers a host is running a remote desktop that can be used to access the production network. Which of the following changes should the security analyst recommend?", "options": ["Changing the remote desktop port to a non-standard number", "Setting up a VPN and placing the jump server inside the firewall", "Using a proxy for web connections from the remote desktop server", "Connecting the remote server to the domain and increasing the password length"], "answer": "B", "explanation": "A VPN is a virtual private network that creates a secure tunnel between two or more devices over a public network. A VPN can encrypt and authenticate the data, as well as hide the IP addresses and locations of the devices. A jump server is a server that acts as an intermediary between a user and a target server, such as a production server. A jump server can provide an additional layer of security and access control, as well as logging and auditing capabilities. A firewall is a device or software that filters and blocks unwanted network traffic based on predefined rules. A firewall can protect the internal network from external threats and limit the exposure of sensitive services and ports. A security analyst should recommend setting up a VPN and placing the jump server inside the firewall to improve the security of the remote desktop access to the production network. This way, the remote desktop service will not be exposed to the public network, and only authorized users with VPN credentials can access the jump server and then the production server. References:\n\nCompTIA Security+ Study Guide: Exam SY0-701, 9th Edition, Chapter 8: Secure Protocols and Services, page 382-383 1; Chapter 9: Network Security, page 441-442 1"}, {"number": 16, "question": "A business uses Wi-Fi with content filleting enabled. An employee noticed a coworker accessed a blocked sue from a work computer and repotted the issue. While Investigating the issue, a security administrator found another device providing internet access to certain employees. Which of the following best describes the security risk?", "options": ["The host-based security agent Is not running on all computers.", "A rogue access point Is allowing users to bypass controls.", "Employees who have certain credentials are using a hidden SSID.", "A valid access point is being jammed to limit availability."], "answer": "B", "explanation": "The presence of another device providing internet access that bypasses the content filtering system indicates the existence of a rogue access point. Rogue access points are unauthorized devices that can create a backdoor into the network, allowing users to bypass security controls like content filtering. This presents a significant security risk as it can expose the network to unauthorized access and potential data breaches.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Rogue access points are highlighted as a major security risk, allowing unauthorized access to the network and bypassing security measures."}, {"number": 17, "question": "A security analyst is creating base for the server team to follow when hardening new devices for deployment.\nWhich of the following beet describes what the analyst is creating?", "options": ["Change management procedure", "Information security policy", "Cybersecurity framework", "Secure configuration guide"], "answer": "D", "explanation": "The security analyst is creating a \"secure configuration guide,\" which is a set of instructions or guidelines used to configure devices securely before deployment. This guide ensures that the devices are set up according to best practices to minimize vulnerabilities and protect against potential security threats.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 03 Security Architecture.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on System Hardening and Secure Configuration."}, {"number": 18, "question": "A systems administrate wants to implement a backup solution. the solution needs to allow recovery of the entire system, including the operating system, in case of a disaster. Which of the following backup types should the administrator consider?", "options": ["Incremental", "Storage area network", "Differential", "Image"], "answer": "D", "explanation": "An image backup, also known as a full system backup, captures the entire contents of a system, including the operating system, applications, settings, and all data. This type of backup allows for a complete recovery of the system in case of a disaster, as it includes everything needed to restore the system to its previous state.\n\nThis makes it the ideal choice for a systems administrator who needs to ensure the ability to recover the entire system, including the OS.\n\nReferences = CompTIA Security+ SY0-701 study materials, domain on Security Operations."}, {"number": 19, "question": "Which of the following best describes the practice of researching laws and regulations related to information security operations within a specific industry?", "options": ["Compliance reporting", "GDPR", "Due diligence", "Attestation"], "answer": "C", "explanation": "Due diligence refers to the process of researching and understanding the laws, regulations, and best practices that govern information security within a specific industry. Organizations are required to conduct due diligence to ensure compliance with legal and regulatory requirements, which helps mitigate risks and avoid penalties.\n\nCompliance reporting involves generating reports to demonstrate adherence to legal or regulatory standards.\n\nGDPR is a specific regulation governing data privacy in the EU, not a general practice of researching laws.\n\nAttestation is a formal declaration that an organization is compliant with a set of standards but is not the act of researching the laws."}, {"number": 20, "question": "An employee in the accounting department receives an email containing a demand for payment tot services performed by a vendor However, the vendor is not in the vendor management database. Which of the following in this scenario an example of?", "options": ["Pretexting", "Impersonation", "Ransomware", "Invoice scam"], "answer": "D", "explanation": "The scenario describes an instance where an employee receives a fraudulent invoice from a vendor that is not recognized in the company's vendor management system. This is a classic example of an invoice scam, where attackers attempt to trick organizations into making payments for fake or non-existent services. These scams often rely on social engineering tactics to bypass financial controls.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the context of social engineering attacks and common scams."}, {"number": 21, "question": "Which of the following is used to validate a certificate when it is presented to a user?", "options": ["OCSP", "CSR", "CA", "CRC"], "answer": "A", "explanation": "OCSP stands for Online Certificate Status Protocol. It is a protocol that allows applications to check the revocation status of a certificate in real-time. It works by sending a query to an OCSP responder, which is a server that maintains a database of revoked certificates. The OCSP responder returns a response that indicates whether the certificate is valid, revoked, or unknown. OCSP is faster and more efficient than downloading and parsing Certificate Revocation Lists (CRLs), which are large files that contain the serial numbers of all revoked certificates issued by a Certificate Authority (CA). References: CompTIA Security+ Study Guide:\n\nExam SY0-701, 9th Edition, page 337 1"}, {"number": 22, "question": "A company requires hard drives to be securely wiped before sending decommissioned systems to recycling.\nWhich of the following best describes this policy?", "options": ["Enumeration", "Sanitization", "Destruction", "Inventory"], "answer": "B", "explanation": "Sanitization is the process of removing sensitive data from a storage device or a system before it is disposed of or reused. Sanitization can be done by using software tools or hardware devices that overwrite the data with random patterns or zeros, making it unrecoverable. Sanitization is different from destruction, which is the physical damage of the storage device to render it unusable. Sanitization is also different from enumeration, which is the identification of network resources or devices, and inventory, which is the tracking of assets and their locations. The policy of securely wiping hard drives before sending decommissioned systems to recycling is an example of sanitization, as it ensures that no confidential data can be retrieved from the recycled devices. References = Secure Data Destruction – SY0-601 CompTIA Security+ : 2.7, video at 1: 00; CompTIA Security+ SY0-701 Certification Study Guide, page 387."}, {"number": 23, "question": "Which of the following is the most common data loss path for an air-gapped network?", "options": ["Bastion host", "Unsecured Bluetooth", "Unpatched OS", "Removable devices"], "answer": "D", "explanation": "An air-gapped network is a network that is physically isolated from other networks, such as the internet, to prevent unauthorized access and data leakage. However, an air-gapped network can still be compromised by removable devices, such as USB drives, CDs, DVDs, or external hard drives, that are used to transfer data between the air-gapped network and other networks. Removable devices can carry malware, spyware, or other malicious code that can infect the air-gapped network or exfiltrate data from it. Therefore, removable devices are the most common data loss path for an air-gapped network. References: CompTIA Security+ Study\n\nGuide: Exam SY0-701, 9th Edition, Chapter 9: Network Security, page 449 1"}, {"number": 24, "question": "The internal audit team determines a software application is no longer in scope for external reporting requirements. Which of the following will confirm management’s perspective that the application is no longer applicable?", "options": ["Data inventory and retention", "Right to be forgotten", "Due care and due diligence", "Acknowledgement and attestation"], "answer": "D", "explanation": "Acknowledgement and attestation involve  that an application is no longer in scope formal confirmation for compliance, auditing, or reporting requirements. This typically includes documentation signed by relevant stakeholders confirming that the software no longer processes, stores, or transmits relevant data.\n\nData inventory and retention (A) is related to managing data assets, not software scope confirmation.\n\nRight to be forgotten (B) pertains to , allowing individuals to request data privacy laws (e.g., GDPR) deletion.\n\nDue care and due diligence (C) focus on security best practices rather than software applicability."}, {"number": 25, "question": "A systems administrator receives the following alert from a file integrity monitoring tool:\nThe hash of the cmd.exe file has changed.\nThe systems administrator checks the OS logs and notices that no patches were applied in the last two months.\nWhich of the following most likely occurred?", "options": ["The end user changed the file permissions.", "A cryptographic collision was detected.", "A snapshot of the file system was taken.", "A rootkit was deployed."], "answer": "D", "explanation": "A rootkit is a type of malware that modifies or replaces system files or processes to hide its presence and activity. A rootkit can change the hash of the cmd.exe file, which is a command-line interpreter for Windows systems, to avoid detection by antivirus or file integrity monitoring tools. A rootkit can also grant the attacker remote access and control over the infected system, as well as perform malicious actions such as stealing data, installing backdoors, or launching attacks on other systems. A rootkit is one of the most difficult types of malware to remove, as it can persist even after rebooting or reinstalling the OS. References = CompTIA\n\nSecurity+ Study Guide with over 500 Practice Test Questions: Exam SY0-701, 9th Edition, Chapter 4, page 147. CompTIA Security+ SY0-701 Exam Objectives, Domain 1.2, page 9."}, {"number": 26, "question": "Which of the following activities should be performed first to compile a list of vulnerabilities in an environment?", "options": ["Automated scanning", "Penetration testing", "Threat hunting", "Log aggregation", "Adversarial emulation"], "answer": "A", "explanation": "Automated vulnerability scanning is the . These scans first step in identifying system weaknesses systematically check for outdated software, misconfigurations, and known vulnerabilities in a network.\n\nPenetration testing (B) is conducted after vulnerabilities are identified.\n\nThreat hunting (C) focuses on detecting unknown threats, not listing vulnerabilities."}, {"number": 27, "question": "Which of the following security concepts is accomplished with the installation of a RADIUS server?", "options": ["CIA", "AA", "ACL", "PEM"], "answer": "B", "explanation": ""}, {"number": 28, "question": "A business needs a recovery site but does not require immediate failover. The business also wants to reduce the workload required to recover from an outage. Which of the following recovery sites is the best option?", "options": ["Hot", "Cold", "Warm", "Geographically dispersed"], "answer": "C", "explanation": "A warm site is the best option for a business that does not require immediate failover but wants to reduce the workload required for recovery. A warm site has some pre-installed equipment and data, allowing for quicker recovery than a cold site, but it still requires some setup before becoming fully operational.\n\nHot sites provide immediate failover but are more expensive and require constant maintenance.\n\nCold sites require significant time and effort to get up and running after an outage.\n\nGeographically dispersed sites refer to a specific location strategy rather than the readiness of the recovery site."}, {"number": 29, "question": "A company wants to ensure employees are allowed to copy files from a virtual desktop during the workday but are restricted during non-working hours. Which of the following security measures should the company set up?", "options": ["Digital rights management", "Role-based access control", "Time-based access control", "Network access control"], "answer": "C", "explanation": ""}, {"number": 30, "question": "Which of the following activities are associated with vulnerability management? (Select two).", "options": ["Reporting", "Prioritization", "Exploiting", "Correlation", "Containment", "Tabletop exercise"], "answer": "A B", "explanation": ""}, {"number": 31, "question": "An employee recently resigned from a company. The employee was responsible for managing and supporting weekly batch jobs over the past five years. A few weeks after the employee resigned. one of the batch jobs talked and caused a major disruption. Which of the following would work best to prevent this type of incident from reoccurring?", "options": ["Job rotation", "Retention", "Outsourcing", "Separation of duties"], "answer": "A", "explanation": "Job rotation is a security control that involves regularly moving employees to different roles within an organization. This practice helps prevent incidents where a single employee has too much control or knowledge about a specific job function, reducing the risk of disruption when an employee leaves. It also helps in identifying any hidden issues or undocumented processes that could cause problems after an employee's departure."}, {"number": 32, "question": "Which of the following roles, according to the shared responsibility model, is responsible for securing the company’s database in an IaaS model for a cloud environment?", "options": ["Client", "Third-party vendor", "Cloud provider", "DBA"], "answer": "A", "explanation": "According to the shared responsibility model, the client and the cloud provider have different roles and responsibilities for securing the cloud environment, depending on the service model. In an IaaS (Infrastructure as a Service) model, the cloud provider is responsible for securing the physical infrastructure, such as the servers, storage, and network devices, while the client is responsible for securing the operating systems, applications, and data that run on the cloud infrastructure. Therefore, the client is responsible for securing the company’s database in an IaaS model for a cloud environment, as the database is an application that stores data. The client can use various security controls, such as encryption, access control, backup, and auditing, to protect the database from unauthorized access, modification, or loss. The third-party vendor and the DBA\n\n(Database Administrator) are not roles defined by the shared responsibility model, but they may be involved in the implementation or management of the database security. References = CompTIA Security+ SY0-701\n\nCertification Study Guide, page 263-264; Professor Messer’s CompTIA SY0-701 Security+ Training Course, video 3.1 - Cloud and Virtualization, 5:00 - 7:40."}, {"number": 33, "question": "Which of the following is a possible consequence of a VM escape?", "options": ["Malicious instructions can be inserted into memory and give the attacker elevated permissions.", "An attacker can access the hypervisor and compromise other VMs.", "Unencrypted data can be read by a user in a separate environment.", "Users can install software that is not on the manufacturer's approved list."], "answer": "B", "explanation": "Detailed Explanation:A VM escape occurs when an attacker breaks out of a virtual machine's isolation to access the hypervisor. This compromise can allow control of the hypervisor and all other VMs on the host, posing significant security risks. Reference: CompTIA Security+ SY0-701 Study Guide, Domain 3: Security\n\nArchitecture, Section: \"Virtualization Risks and Mitigation\"."}, {"number": 34, "question": "Which of the following incident response activities ensures evidence is properly handied?", "options": ["E-discovery", "Chain of custody", "Legal hold", "Preservation"], "answer": "B", "explanation": "Chain of custody is the process of documenting and preserving the integrity of evidence collected during an incident response. It involves recording the details of each person who handled the evidence, the time and date of each transfer, and the location where the evidence was stored. Chain of custody ensures that the evidence is admissible in legal proceedings and can be traced back to its source. E-discovery, legal hold, and preservation are related concepts, but they do not ensure evidence is properly handled. References: CompTIA\n\nSecurity+ Study Guide: Exam SY0-701, 9th Edition, page 487; NIST SP 800-61: 3.2. Evidence Gathering and\n\nHandling"}, {"number": 35, "question": "A Chief Information Security Officer (CISO) has developed information security policies that relate to the software development methodology. Which of the following would the CISO most likely include in the organization's documentation?", "options": ["Peer review requirements", "Multifactor authentication", "Branch protection tests", "Secrets management configurations"], "answer": "A", "explanation": ""}, {"number": 36, "question": "An important patch for a critical application has just been released, and a systems administrator is identifying all of the systems requiring the patch. Which of the following must be maintained in order to ensure that all systems requiring the patch are updated?", "options": ["Asset inventory", "Network enumeration", "Data certification", "Procurement process"], "answer": "A", "explanation": "To ensure that all systems requiring the patch are updated, the systems administrator must maintain an accurate asset inventory. This inventory lists all hardware and software assets within the organization, allowing the administrator to identify which systems are affected by the patch and ensuring that none are missed during the update process.\n\nNetwork enumeration is used to discover devices on a network but doesn't track software that requires patching.\n\nData certification and procurement process are unrelated to tracking systems for patching purposes."}, {"number": 37, "question": "Which of the following can best protect against an employee inadvertently installing malware on a company system?", "options": ["Host-based firewall", "System isolation", "Least privilege", "Application allow list"], "answer": "D", "explanation": "An application allow list is a security technique that specifies which applications are authorized to run on a system and blocks all other applications. An application allow list can best protect against an employee inadvertently installing malware on a company system because it prevents the execution of any unauthorized or malicious software, such as viruses, worms, trojans, ransomware, or spyware. An application allow list can also reduce the attack surface and improve the performance of the system. References: CompTIA Security+\n\nStudy Guide: Exam SY0-701, 9th Edition, Chapter 11: Secure Application Development, page 551 1"}, {"number": 38, "question": "A security analyst is reviewing the following logs:\nWhich of the following attacks is most likely occurring?", "options": ["Password spraying", "Account forgery", "Pass-t he-hash", "Brute-force"], "answer": "A", "explanation": "Password spraying is a type of brute force attack that tries common passwords across several accounts to find a match. It is a mass trial-and-error approach that can bypass account lockout protocols. It can give hackers access to personal or business accounts and information. It is not a targeted attack, but a high-volume attack tactic that uses a dictionary or a list of popular or weak passwords12.\n\nThe logs show that the attacker is using the same password (\"password123\") to attempt to log in to different accounts (\"admin\", \"user1\", \"user2\", etc.) on the same web server. This is a typical pattern of password spraying, as the attacker is hoping that at least one of the accounts has a weak password that matches the one they are trying. The attacker is also using a tool called Hydra, which is one of the most popular brute force tools, often used in cracking passwords for network authentication3.\n\nAccount forgery is not the correct answer, because it involves creating fake accounts or credentials to impersonate legitimate users or entities. There is no evidence of account forgery in the logs, as the attacker is not creating any new accounts or using forged credentials.\n\nPass-the-hash is not the correct answer, because it involves stealing a hashed user credential and using it to create a new authenticated session on the same network. Pass-the-hash does not require the attacker to know or crack the password, as they use the stored version of the password to initiate a new session4. The logs show that the attacker is using plain text passwords, not hashes, to try to log in to the web server.\n\nBrute-force is not the correct answer, because it is a broader term that encompasses different types of attacks that involve trying different variations of symbols or words until the correct password is found. Password spraying is a specific type of brute force attack that uses a single common password against multiple accounts5. The logs show that the attacker is using password spraying, not brute force in general, to try to gain access to the web server. References = 1: Password spraying: An overview of password spraying attacks\n\n… - Norton, 2: Security: Credential Stuffing vs. Password Spraying - Baeldung, 3: Brute Force Attack: A definition + 6 types to know | Norton, 4: What is a Pass-the-Hash Attack? - CrowdStrike, 5: What is a Brute\n\nForce Attack? | Definition, Types & How It Works - Fortinet"}, {"number": 39, "question": "A security administrator recently reset local passwords and the following values were recorded in the system:\nWhich of the following in the security administrator most likely protecting against?", "options": ["Account sharing", "Weak password complexity", "Pass-the-hash attacks", "Password compromise"], "answer": "C", "explanation": ""}, {"number": 40, "question": "A security team is setting up a new environment for hosting the organization's on-premises software application as a cloud-based service. Which of the following should the team ensure is in place in order for the organization to follow security best practices?", "options": ["Visualization and isolation of resources", "Network segmentation", "Data encryption", "Strong authentication policies"], "answer": "A", "explanation": "When hosting an on-premises software application in a cloud-based service, ensuring visualization and isolation of resources is crucial for maintaining security best practices. This involves using virtualization techniques to create isolated environments (e.g., virtual machines or containers) for different applications and services, reducing the risk of cross-tenant attacks or resource leakage.\n\nNetwork segmentation is important but pertains more to securing network traffic rather than isolating computing resources.\n\nData encryption is also essential but doesn’t specifically address resource isolation in a cloud environment.\n\nStrong authentication policies are critical for access control but do not address the need for isolating resources within the cloud environment."}, {"number": 41, "question": "A company recently decided to allow employees to work remotely. The company wants to protect us data without using a VPN. Which of the following technologies should the company Implement?", "options": ["Secure web gateway", "Virtual private cloud end point", "Deep packet Inspection", "Next-gene ration firewall"], "answer": "A", "explanation": "A Secure Web Gateway (SWG) protects users by filtering unwanted software/malware from user-initiated web traffic and enforcing corporate and regulatory policy compliance. This technology allows the company to secure remote users' data and web traffic without relying on a VPN, making it ideal for organizations supporting remote work.\n\nReferences = CompTIA Security+ SY0-701 study materials, particularly in the domain of network security and remote access technologies."}, {"number": 42, "question": "An organization implemented cloud-managed IP cameras to monitor building entry points and sensitive areas.\nThe service provider enables direct TCP/IP connection to stream live video footage from each camera. The organization wants to ensure this stream is encrypted and authenticated. Which of the following protocols should be implemented to best meet this objective?", "options": ["SSH", "SRTP", "S/MIME", "PPTP"], "answer": "B", "explanation": "Secure Real-Time Transport Protocol (SRTP) is a security protocol used to encrypt and authenticate the streaming of audio and video over IP networks. It ensures that the video streams from the IP cameras are both encrypted to prevent unauthorized access and authenticated to verify the integrity of the stream, making it the ideal choice for securing video surveillance."}, {"number": 43, "question": "Which of the following factors are the most important to address when formulating a training curriculum plan for a security awareness program? (Select two).", "options": ["Channels by which the organization communicates with customers", "The reporting mechanisms for ethics violations", "Threat vectors based on the industry in which the organization operates", "Secure software development training for all personnel", "Cadence and duration of training events", "Retraining requirements for individuals who fail phishing simulations"], "answer": "C E", "explanation": "A training curriculum plan for a security awareness program should address the following factors:\n\nThe threat vectors based on the industry in which the organization operates. This will help the employees to understand the specific risks and challenges that their organization faces, and how to protect themselves and the organization from cyberattacks. For example, a healthcare organization may face different threat vectors than a financial organization, such as ransomware, data breaches, or medical device hacking1.\n\nThe cadence and duration of training events. This will help the employees to retain the information and skills they learn, and to keep up with the changing security landscape. The training events should be frequent enough to reinforce the key concepts and behaviors, but not too long or too short to lose the attention or interest of the employees. For example, a security awareness program may include monthly newsletters, quarterly webinars, annual workshops, or periodic quizzes2."}, {"number": 44, "question": "An administrator must replace an expired SSL certificate. Which of the following does the administrator need to create the new SSL certificate?", "options": ["CSR", "OCSP", "Key", "CRL"], "answer": "A", "explanation": "A Certificate Signing Request (CSR) is a request sent to a certificate authority (CA) to issue an SSL certificate. The CSR contains information like the public key, which will be part of the certificate.References:\n\nSecurity+ SY0-701 Course Content, Security+ SY0-601 Book."}, {"number": 45, "question": "Which of the following can be used to compromise a system that is running an RTOS?", "options": ["Cross-site scripting", "Memory injection", "Replay attack", "Ransomware"], "answer": "B", "explanation": ""}, {"number": 46, "question": "An organization disabled unneeded services and placed a firewall in front of a business-critical legacy system.\nWhich of the following best describes the actions taken by the organization?", "options": ["Exception", "Segmentation", "Risk transfer", "Compensating controls"], "answer": "D", "explanation": "Compensating controls are alternative security measures that are implemented when the primary controls are not feasible, cost-effective, or sufficient to mitigate the risk. In this case, the organization used compensating controls to protect the legacy system from potential attacks by disabling unneeded services and placing a firewall in front of it. This reduced the attack surface and the likelihood of exploitation."}, {"number": 47, "question": "An IT administrator needs to ensure data retention standards are implemented on an enterprise application.\nWhich of the Mowing describes the administrator's role?", "options": ["Processor", "Custodian", "Privacy officer", "Owner"], "answer": "D", "explanation": ""}, {"number": 48, "question": "A company's marketing department collects, modifies, and stores sensitive customer data. The infrastructure team is responsible for securing the data while in transit and at rest. Which of the following data roles describes the customer?", "options": ["Processor", "Custodian", "Subject", "Owner"], "answer": "C", "explanation": "According to the CompTIA Security+ SY0-701 Certification Study Guide, data subjects are the individuals whose personal data is collected, processed, or stored by an organization. Data subjects have certain rights and expectations regarding how their data is handled, such as the right to access, correct, delete, or restrict their data. Data subjects are different from data owners, who are the individuals or entities that have the authority and responsibility to determine how data is classified, protected, and used. Data subjects are also different from data processors, who are the individuals or entities that perform operations on data on behalf of the data owner, such as collecting, modifying, storing, or transmitting data. Data subjects are also different from data custodians, who are the individuals or entities that implement the security controls and procedures specified by the data owner to protect data while in transit and at rest.\n\nReferencesCompTIA Security+ SY0-701 Certification Study Guide, Chapter 2: Data Security, page 511"}, {"number": 49, "question": "A systems administrator is creating a script that would save time and prevent human error when performing account creation for a large number of end users. Which of the following would be a good use case for this task?", "options": ["Off-the-shelf software", "Orchestration", "Baseline", "Policy enforcement"], "answer": "B", "explanation": "Orchestration is the process of automating multiple tasks across different systems and applications. It can help save time and reduce human error by executing predefined workflows and scripts. In this case, the systems administrator can use orchestration to create accounts for a large number of end users without having to manually enter their information and assign permissions. References: CompTIA Security+ Study Guide:\n\nExam SY0-701, 9th Edition, page 457 1"}, {"number": 50, "question": "Which of the following is the most effective way to protect an application server running software that is no longer supported from network threats?", "options": ["Air gap", "Barricade", "Port security", "Screen subnet"], "answer": "A", "explanation": "Air-gapping is the most effective way to protect an application server running unsupported software from network threats. By physically isolating the server from any network connection (no wired or wireless communication), it is protected from external cyber threats. While other options like port security or a screened subnet can provide some level of protection, an air gap offers the highest level of security by preventing any network-based attacks entirely.\n\nReferences =\n\nCompTIA Security+ SY0-701 Course Content: Domain 03 Security Architecture.\n\nCompTIA Security+ SY0-601 Study Guide: Chapter on Secure System Design."}, {"number": 51, "question": "In order to strengthen a password and prevent a hacker from cracking it, a random string of 36 characters was added to the password. Which of the following best describes this technique?", "options": ["Key stretching", "Tokenization", "Data masking", "Salting"], "answer": "D", "explanation": "Adding a random string of characters, known as a \"salt,\" to a password before hashing it is known as salting.\n\nThis technique strengthens passwords by ensuring that even if two users have the same password, their hashes will be different due to the unique salt, making it much harder for attackers to crack passwords using precomputed tables.References: CompTIA Security+ SY0-701 course content and official CompTIA study resources."}, {"number": 52, "question": "The local administrator account for a company's VPN appliance was unexpectedly used to log in to the remote management interface. Which of the following would have most likely prevented this from happening'?", "options": ["Using least privilege", "Changing the default password", "Assigning individual user IDs", "Reviewing logs more frequently"], "answer": "B", "explanation": "Changing the default password for the local administrator account on a VPN appliance is a basic security measure that would have most likely prevented the unexpected login to the remote management interface.\n\nDefault passwords are often easy to guess or publicly available, and attackers can use them to gain unauthorized access to devices and systems. Changing the default password to a strong and unique one reduces the risk of brute-force attacks and credential theft. Using least privilege, assigning individual user\n\nIDs, and reviewing logs more frequently are also good security practices, but they are not as effective as changing the default password in preventing the unexpected login. References: CompTIA Security+ Study\n\nGuide: Exam SY0-701, 9th Edition, page 116; Local Admin Accounts - Security Risks and Best Practices\n\n(Part 1)"}, {"number": 53, "question": "Which of the following is the main consideration when a legacy system that is a critical part of a company's infrastructure cannot be replaced?", "options": ["Resource provisioning", "Cost", "Single point of failure", "Complexity"], "answer": "C", "explanation": ""}, {"number": 54, "question": "Which of the following documents details how to accomplish a technical security task?", "options": ["Standard", "Policy", "Guideline", "Procedure"], "answer": "D", "explanation": "A  provides step-by-step instructions on how to complete a specific security task, ensuring procedure consistency and accuracy. Unlike policies, which define high-level security expectations, procedures are\n\n. For example, a  would outline the exact steps IT detailed and operational password reset procedure support must follow when assisting users.\n\nPolicy: Defines security objectives and rules (e.g., \"All passwords must be complex\").\n\nStandard: Specifies required technologies or configurations.\n\nGuideline: Provides recommendations but is not mandatory.\n\nProcedure: Gives exact instructions to perform tasks."}, {"number": 55, "question": "Which of the following threat actors is the most likely to use large financial resources to attack critical systems located in other countries?", "options": ["Insider", "Unskilled attacker", "Nation-state", "Hacktivist"], "answer": "C", "explanation": "A nation-state is a threat actor that is sponsored by a government or a political entity to conduct cyberattacks against other countries or organizations. Nation-states have large financial resources, advanced technical skills, and strategic objectives that may target critical systems such as military, energy, or infrastructure. Nation-states are often motivated by espionage, sabotage, or warfare12. References = 1:\n\nCompTIA Security+ SY0-701 Certification Study Guide, page 542: Threat Actors – CompTIA Security+\n\nSY0-701 – 2.1, video by Professor Messer."}, {"number": 56, "question": "A security analyst has determined that a security breach would have a financial impact of $15,000 and is expected to occur twice within a three-year period. Which of the following is the ALE for this risk?", "options": ["$7,500 $10,000 $15,000 $30,000"], "answer": "B", "explanation": ""}, {"number": 57, "question": "A security operations center determines that the malicious activity detected on a server is normal. Which of the following activities describes the act of ignoring detected activity in the future?", "options": ["Tuning", "Aggregating", "Quarantining", "Archiving"], "answer": "A", "explanation": "Tuning is the activity of adjusting the configuration or parameters of a security tool or system to optimize its performance and reduce false positives or false negatives. Tuning can help to filter out the normal or benign activity that is detected by the security tool or system, and focus on the malicious or anomalous activity that requires further investigation or response. Tuning can also help to improve the efficiency and effectiveness of the security operations center by reducing the workload and alert fatigue of the analysts. Tuning is different from aggregating, which is the activity of collecting and combining data from multiple sources or sensors to provide a comprehensive view of the security posture. Tuning is also different from quarantining, which is the activity of isolating a potentially infected or compromised device or system from the rest of the network to prevent further damage or spread. Tuning is also different from archiving, which is the activity of storing and preserving historical data or records for future reference or compliance. The act of ignoring detected activity in the future that is deemed normal by the security operations center is an example of tuning, as it involves modifying the settings or rules of the security tool or system to exclude the activity from the detection scope.\n\nTherefore, this is the best answer among the given options. References = Security Alerting and Monitoring\n\nConcepts and Tools – CompTIA Security+ SY0-701: 4.3, video at 7:00; CompTIA Security+ SY0-701\n\nCertification Study Guide, page 191."}, {"number": 58, "question": "A security team created a document that details the order in which critical systems should be through back online after a major outage. Which of the following documents did the team create?", "options": ["Communication plan", "Incident response plan", "Data retention policy", "Disaster recovery plan"], "answer": "D", "explanation": "The document described in the question is a Disaster Recovery Plan (DRP). A DRP outlines the process and procedures for restoring critical systems and operations after a major disruption or outage. It includes the order in which systems should be brought back online to ensure minimal impact on business operations, prioritizing the most critical systems to recover first."}, {"number": 59, "question": "Which of the following is the stage in an investigation when forensic images are obtained?", "options": ["Acquisition", "Preservation", "Reporting", "E-discovery"], "answer": "A", "explanation": "Detailed Explanation:The acquisition phase involves creating forensic images (exact replicas) of storage devices or memory to ensure data integrity for further analysis. Reference: CompTIA Security+ SY0-701\n\nStudy Guide, Domain 4: Security Operations, Section: \"Forensic Imaging and Chain of Custody\"."}, {"number": 60, "question": "A security professional discovers a folder containing an employee's personal information on the enterprise's shared drive. Which of the following best describes the data type the security professional should use to identify organizational policies and standards concerning the storage of employees' personal information?", "options": ["Legal", "Financial", "Privacy", "Intellectual property"], "answer": "C", "explanation": "Detailed Explanation:Privacy data includes information such as Personally Identifiable Information (PII), which relates to employees' or customers' personal data. Organizations often maintain policies and standards specifically addressing how such sensitive information should be handled. Reference: CompTIA Security+\n\nSY0-701 Study Guide, Domain 5: Security Program Management, Section: \"Data Types and Classifications\"."}, {"number": 61, "question": "Which of the following must be considered when designing a high-availability network? (Select two).", "options": ["Ease of recovery", "Ability to patch", "Physical isolation", "Responsiveness", "Attack surface", "Extensible authentication"], "answer": "A E", "explanation": "A high-availability network is a network that is designed to minimize downtime and ensure continuous operation of critical services and applications. To achieve this goal, a high-availability network must consider two important factors: ease of recovery and attack surface.\n\nEase of recovery refers to the ability of a network to quickly restore normal functionality after a failure, disruption, or disaster. A high-availability network should have mechanisms such as redundancy, failover, backup, and restore to ensure that any single point of failure does not cause a complete network outage. A high-availability network should also have procedures and policies for incident response, disaster recovery, and business continuity to minimize the impact of any network issue on the organization’s operations and reputation.\n\nAttack surface refers to the exposure of a network to potential threats and vulnerabilities. A high-availability network should have measures such as encryption, authentication, authorization, firewall, intrusion detection and prevention, and patch management to protect the network from unauthorized access, data breaches, malware, denial-of-service attacks, and other cyberattacks. A high-availability network should also have processes and tools for risk assessment, threat intelligence, vulnerability scanning, and penetration testing to identify and mitigate any weaknesses or gaps in the network security."}, {"number": 62, "question": "Which of the following is the most likely outcome if a large bank fails an internal PCI DSS compliance assessment?", "options": ["Fines", "Audit findings", "Sanctions", "Reputation damage"], "answer": "A", "explanation": "PCI DSS is the Payment Card Industry Data Security Standard, which is a set of security requirements for organizations that store, process, or transmit cardholder data. PCI DSS aims to protect the confidentiality, integrity, and availability of cardholder data and prevent fraud, identity theft, and data breaches. PCI DSS is enforced by the payment card brands, such as Visa, Mastercard, American Express, Discover, and JCB, and applies to all entities involved in the payment card ecosystem, such as merchants, acquirers, issuers, processors, service providers, and payment applications.\n\nIf a large bank fails an internal PCI DSS compliance assessment, the most likely outcome is that the bank will face fines from the payment card brands. An internal PCI DSS compliance assessment is a self-assessment that the bank performs to evaluate its own compliance with the PCI DSS requirements. The bank must submit the results of the internal assessment to the payment card brands or their designated agents, such as acquirers or qualified security assessors (QSAs). If the internal assessment reveals that the bank is not compliant with the PCI DSS requirements, the payment card brands may impose fines on the bank as a penalty for violating the PCI DSS contract. The amount and frequency of the fines may vary depending on the severity and duration of the non-compliance, the number and type of cardholder data compromised, and the level of cooperation and remediation from the bank. The fines can range from thousands to millions of dollars per month, and can increase over time if the non-compliance is not resolved.\n\nThe other options are not correct because they are not the most likely outcomes if a large bank fails an internal\n\nPCI DSS compliance assessment. B. Audit findings. Audit findings are the results of an external PCI DSS compliance assessment that is performed by a QSA or an approved scanning vendor (ASV). An external assessment is required for certain entities that handle a large volume of cardholder data or have a history of non-compliance. An external assessment may also be triggered by a security incident or a request from the payment card brands. Audit findings may reveal the gaps and weaknesses in the bank’s security controls and recommend corrective actions to achieve compliance. However, audit findings are not the outcome of an internal assessment, which is performed by the bank itself. C. Sanctions. Sanctions are the measures that the payment card brands may take against the bank if the bank fails to pay the fines or comply with the PCI DSS requirements. Sanctions may include increasing the fines, suspending or terminating the bank’s ability to accept or process payment cards, or revoking the bank’s PCI DSS certification. Sanctions are not the immediate outcome of an internal assessment, but rather the possible consequence of prolonged or repeated non-compliance. D. Reputation damage. Reputation damage is the loss of trust and credibility that the bank may suffer from its customers, partners, regulators, and the public if the bank fails an internal PCI DSS compliance assessment. Reputation damage may affect the bank’s brand image, customer loyalty, market share, and profitability. Reputation damage is not a direct outcome of an internal assessment, but rather a potential risk that the bank may face if the non-compliance is exposed or exploited by malicious actors. References = CompTIA Security+ Study Guide (SY0-701), Chapter 8: Governance, Risk, and\n\nCompliance, page 388. Professor Messer’s CompTIA SY0-701 Security+ Training Course, Section 8.2:\n\nCompliance and Controls, video: PCI DSS (5:12). PCI Security Standards Council, PCI DSS Quick Reference\n\nGuide, page 4. PCI Security Standards Council, PCI DSS FAQs, question 8. PCI Security Standards Council,\n\nPCI DSS FAQs, question 9. [PCI Security Standards Council], PCI DSS FAQs, question 10. [PCI Security\n\nStandards Council], PCI DSS FAQs, question 11. [PCI Security Standards Council], PCI DSS FAQs, question 12. [PCI Security Standards Council], PCI DSS FAQs, question 13. [PCI Security Standards Council], PCI\n\nDSS FAQs, question 14. [PCI Security Standards Council], PCI DSS FAQs, question 15. [PCI Security\n\nStandards Council], PCI DSS FAQs, question 16. [PCI Security Standards Council], PCI DSS FAQs, question 17. [PCI Security Standards Council], PCI DSS FAQs, question 18. [PCI Security Standards Council], PCI\n\nDSS FAQs, question 19. [PCI Security Standards Council], PCI DSS FAQs, question 20. [PCI Security\n\nStandards Council], PCI DSS FAQs, question 21. [PCI Security Standards Council], PCI DSS FAQs, question 22. [PCI Security Standards Council], PCI DSS FAQs, question 23. [PCI Security Standards Council], PCI\n\nDSS FAQs, question 24. [PCI Security Standards Council], PCI DSS FAQs, question 25. [PCI Security\n\nStandards Council], PCI DSS FAQs, question 26. [PCI Security Standards Council], PCI DSS FAQs, question 27. [PCI Security Standards Council], PCI DSS FAQs, question 28. [PCI Security Standards Council], PCI\n\nDSS FAQs, question 29. [PCI Security Standards Council], PCI DSS FAQs, question 30. [PCI Security\n\nStandards Council]"}, {"number": 63, "question": "An unexpected and out-of-character email message from a Chief Executive Officer’s corporate account asked an employee to provide financial information and to change the recipient's contact number. Which of the following attack vectors is most lik
